<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>샘플 검수 테스트 — 공공콘텐츠마켓</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@600;700&family=JetBrains+Mono:wght@400;500&display=swap');
:root{
  --bg:#f4f2ed;--surface:#fff;--surface2:#f9f8f5;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);
  --text:#1a1f2e;--text2:#4a5568;--text3:#8492a6;
  --accent:#1a6b4a;--accent2:#2d9e72;--accent-light:#e8f5ef;
  --purple:#6b46c1;--purple-light:#f3effe;
  --amber:#b45309;--amber-light:#fef3c7;
  --red:#dc3545;--red-light:#fce8e6;
  --serif:'Noto Serif KR',serif;--sans:'Noto Sans KR',sans-serif;
  --mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;min-height:100vh;}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.logo{display:flex;align-items:center;gap:10px;cursor:pointer;}
.logo-mark{width:28px;height:28px;background:var(--purple);border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-weight:700;font-size:12px;color:#fff;}
.logo-name{font-family:var(--serif);font-size:14px;font-weight:700;}
.btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:none;font-family:var(--sans);transition:all .15s;display:inline-flex;align-items:center;gap:6px;}
.btn-purple{background:var(--purple);color:#fff;}
.btn-purple:hover{background:#5a38a8;}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--text2);}
.btn-ghost:hover{background:var(--surface2);}
.btn-sm{padding:5px 12px;font-size:12px;}

/* 진행 바 */
.progress-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 24px;}
.pb-inner{max-width:860px;margin:0 auto;display:flex;align-items:center;gap:14px;}
.pb-label{font-size:12px;font-weight:600;white-space:nowrap;}
.pb-track{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
.pb-fill{height:100%;background:var(--purple);border-radius:3px;transition:width .4s ease;}
.pb-score{font-family:var(--mono);font-size:14px;font-weight:700;color:var(--purple);}
.pb-status{font-size:11px;color:var(--text3);}

.main{max-width:860px;margin:0 auto;padding:28px 24px 60px;display:grid;grid-template-columns:1fr 320px;gap:20px;}

/* 샘플 콘텐츠 패널 */
.sample-panel{display:flex;flex-direction:column;gap:14px;}
.sp-header{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 20px;}
.sp-title{font-family:var(--serif);font-size:18px;font-weight:700;margin-bottom:4px;}
.sp-sub{font-size:12px;color:var(--text3);}
.sp-meta{display:flex;gap:12px;margin-top:10px;flex-wrap:wrap;}
.sp-tag{font-size:11px;background:var(--purple-light);color:var(--purple);border-radius:5px;padding:2px 8px;font-weight:500;}

/* 샘플 이미지 (카드뉴스 시뮬레이션) */
.sample-content{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.sc-nav{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);background:var(--surface2);}
.sc-slide{aspect-ratio:1;display:flex;align-items:center;justify-content:center;position:relative;background:#f0f4f8;overflow:hidden;}
.slide-content{text-align:center;padding:20px;}
.sc-indicators{display:flex;justify-content:center;gap:5px;padding:10px;}
.sci{width:8px;height:8px;border-radius:50%;background:var(--border2);cursor:pointer;transition:all .13s;}
.sci.active{background:var(--purple);width:20px;border-radius:4px;}
.sc-zoom{position:absolute;top:10px;right:10px;background:rgba(255,255,255,.9);border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-size:11px;cursor:pointer;}

/* 오른쪽 — 체크리스트 */
.check-panel{position:sticky;top:118px;}
.cp-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:14px;}
.cp-title{font-size:14px;font-weight:700;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border);}
.check-list{display:flex;flex-direction:column;gap:6px;}
.cl-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border:1.5px solid var(--border);border-radius:9px;cursor:pointer;transition:all .15s;}
.cl-item:hover{border-color:var(--purple);}
.cl-item.pass{border-color:var(--accent);background:var(--accent-light);}
.cl-item.fail{border-color:var(--red);background:var(--red-light);}
.cl-item.na{border-color:var(--border2);background:var(--surface2);}
.cl-icon{font-size:16px;flex-shrink:0;margin-top:1px;}
.cl-info{flex:1;}
.cl-label{font-size:12px;font-weight:600;margin-bottom:2px;}
.cl-desc{font-size:11px;color:var(--text3);}
.cl-btns{display:flex;gap:4px;margin-top:6px;}
.clb{padding:3px 10px;border-radius:5px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid;transition:all .13s;font-family:var(--sans);}
.clb-pass{border-color:var(--accent);color:var(--accent);background:transparent;}
.clb-pass.active, .cl-item.pass .clb-pass{background:var(--accent);color:#fff;}
.clb-fail{border-color:var(--red);color:var(--red);background:transparent;}
.clb-fail.active, .cl-item.fail .clb-fail{background:var(--red);color:#fff;}
.clb-na{border-color:var(--border2);color:var(--text3);background:transparent;}
.clb-na.active, .cl-item.na .clb-na{background:var(--text3);color:#fff;}

/* 코멘트 */
textarea{background:var(--surface2);border:1.5px solid var(--border2);border-radius:8px;color:var(--text);font-family:var(--sans);font-size:12px;padding:10px 12px;outline:none;width:100%;resize:vertical;min-height:70px;transition:border-color .15s;}
textarea:focus{border-color:var(--purple);}
textarea::placeholder{color:var(--text3);}

/* 점수 미터 */
.score-meter{text-align:center;padding:16px 0;}
.sm-val{font-family:var(--mono);font-size:40px;font-weight:700;line-height:1;}
.sm-label{font-size:11px;color:var(--text3);margin-top:4px;}
.sm-gauge{width:80px;height:80px;margin:0 auto 8px;position:relative;}
.sm-svg{transform:rotate(-90deg);}

/* 결과 카드 */
.result-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:36px;text-align:center;}
.rc-anim{font-size:52px;display:block;animation:pop .5s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes pop{from{opacity:0;transform:scale(.5)}to{opacity:1;transform:scale(1)}}

@media(max-width:768px){.main{grid-template-columns:1fr;}.check-panel{position:static;}}

/* ── 다크모드 ── */
[data-theme="dark"]{
  --bg:#0d1117;--surface:#161b27;--surface2:#1c2333;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --text:#e8eaf2;--text2:#8b92b3;--text3:#4a5270;
}
[data-theme="dark"] .logo-name,[data-theme="dark"] .page-title{color:var(--text);}
[data-theme="dark"] input,[data-theme="dark"] select,[data-theme="dark"] textarea{background:var(--surface2);color:var(--text);border-color:var(--border2);}
[data-theme="dark"] .header{background:var(--surface);border-color:var(--border);}
/* ── END 다크모드 ── */

</style>
<script>
/* ================================================================
   PCM.js — 공공콘텐츠마켓 공통 상태 관리 모듈 v3
   모든 HTML에서 <\x3cscript src="pcm.js"><\/script>로 로드
   ================================================================ */

const PCM = (() => {
  /* ── 기본 스토리지 ── */
  const KEY = k => 'pcm_' + k;
  const set  = (k, v)  => { try { sessionStorage.setItem(KEY(k), JSON.stringify(v)); } catch(e) {} };
  const get  = (k, d=null) => { try { const v = sessionStorage.getItem(KEY(k)); return v != null ? JSON.parse(v) : d; } catch(e) { return d; } };
  const del  = k => sessionStorage.removeItem(KEY(k));

  /* ── 금액 계산 ── */
  const breakdown = vatIncl => {
    const supply = Math.round(vatIncl / 1.1);
    return { vatIncl, supply, vat: vatIncl - supply, comm: Math.round(supply * 0.05), biz: Math.round(supply * 0.95) };
  };
  const fw  = v => Math.round(v).toLocaleString() + '원';
  const fmw = v => (Math.round(v) / 10000).toLocaleString() + '만원';

  /* ── 과업 / 견적 공유 ── */
  const saveTask   = t => set('currentTask', t);
  const getTask    = ()  => get('currentTask', null);
  const saveQuote  = q => set('latestQuote', q);
  const getQuote   = ()  => get('latestQuote', null);
  const getConfirmedAmount = () => get('confirmedAmount', null);

  /* ── 프로젝트 목록 ── */
  const getProjects = () => get('projects', []);
  const saveProject = p => {
    const list = getProjects();
    const idx = list.findIndex(x => x.id === p.id);
    if (idx >= 0) list[idx] = p; else list.unshift(p);
    set('projects', list.slice(0, 50));
  };

  /* ── 알림 시스템 ── */
  const pushNotif = n => {
    const list = get('notifs', []);
    list.unshift({ id: 'n-' + Date.now(), unread: true, time: '방금', ...n });
    set('notifs', list.slice(0, 50));
    _updateBadge();
  };
  const getNotifs  = () => get('notifs', []);
  const markRead   = () => { set('notifs', getNotifs().map(n => ({ ...n, unread: false }))); _updateBadge(); };
  const unreadCount = () => getNotifs().filter(n => n.unread).length;
  const _updateBadge = () => {
    const cnt = unreadCount();
    document.querySelectorAll('[data-notif-badge]').forEach(el => {
      el.textContent = cnt || '';
      el.style.display = cnt ? '' : 'none';
    });
  };

  /* ── 로딩 버튼 ── */
  const showLoading = (btn, text = '처리 중...') => {
    if (!btn) return;
    btn._origHTML = btn.innerHTML;
    btn.disabled = true;
    if (!document.getElementById('pcmSpinStyle')) {
      const s = document.createElement('style');
      s.id = 'pcmSpinStyle';
      s.textContent = '@keyframes pcmSpin{to{transform:rotate(360deg)}}';
      document.head.appendChild(s);
    }
    btn.innerHTML = `<span style="display:inline-block;width:14px;height:14px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:pcmSpin .7s linear infinite;vertical-align:middle;margin-right:6px;"></span>${text}`;
  };
  const hideLoading = btn => {
    if (btn && btn._origHTML != null) { btn.disabled = false; btn.innerHTML = btn._origHTML; }
  };

  /* ── 토스트 ── */
  const toast = (msg, type = 'info') => {
    const colors = { info: '#1a1f2e', success: '#1a6b4a', error: '#dc3545', warn: '#b45309' };
    const icons  = { info: 'ℹ️', success: '✅', error: '❌', warn: '⚠️' };
    let t = document.getElementById('pcmToast');
    if (!t) {
      t = document.createElement('div');
      t.id = 'pcmToast';
      t.style.cssText = 'position:fixed;bottom:24px;right:24px;border-radius:10px;padding:12px 18px;font-size:13px;font-family:sans-serif;z-index:9999;transition:all .3s;opacity:0;transform:translateY(60px);display:flex;align-items:center;gap:8px;max-width:340px;box-shadow:0 4px 24px rgba(0,0,0,.22);color:#fff;pointer-events:none;';
      document.body.appendChild(t);
    }
    t.style.background = colors[type] || colors.info;
    t.innerHTML = `<span style="flex-shrink:0;">${icons[type] || ''}</span><span>${msg}</span>`;
    t.style.opacity = '1';
    t.style.transform = 'translateY(0)';
    clearTimeout(t._timer);
    t._timer = setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateY(60px)'; }, 3400);
  };

  /* ── 폼 유효성 검사 ── */
  const validate = rules => {
    let ok = true;
    rules.forEach(({ id, label, required, minLen, type: ftype }) => {
      const el = document.getElementById(id);
      if (!el) return;
      const v = (el.value || '').trim();
      let msg = '';
      if (required && !v) msg = `${label}을(를) 입력해주세요.`;
      else if (minLen && v.length < minLen) msg = `${label}은(는) ${minLen}자 이상이어야 합니다.`;
      else if (ftype === 'email' && v && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v)) msg = '올바른 이메일 형식이 아닙니다.';
      let errEl = document.getElementById(id + '-err');
      if (!errEl) {
        errEl = document.createElement('div');
        errEl.id = id + '-err';
        errEl.style.cssText = 'font-size:11px;color:#dc3545;margin-top:3px;';
        if (el.parentNode) el.parentNode.appendChild(errEl);
      }
      if (msg) { ok = false; errEl.textContent = msg; el.style.setProperty('border-color', '#dc3545', 'important'); }
      else { errEl.textContent = ''; el.style.removeProperty('border-color'); }
    });
    return ok;
  };

  /* ── 폼 자동 임시저장 ── */
  const autoSave = (formId, storageKey) => {
    const form = document.getElementById(formId);
    if (!form) return;
    const save = () => {
      const data = {};
      form.querySelectorAll('input, select, textarea').forEach(el => { if (el.id) data[el.id] = el.value; });
      set(storageKey, data);
    };
    form.addEventListener('input', save);
    form.addEventListener('change', save);
    // 새로고침 경고
    window.addEventListener('beforeunload', e => {
      const saved = get(storageKey, {});
      if (Object.values(saved).some(v => v)) {
        e.preventDefault();
        e.returnValue = '작성 중인 내용이 있습니다. 페이지를 떠나시겠습니까?';
      }
    });
    // 기존 임시저장 복원
    const saved = get(storageKey, {});
    if (saved) {
      Object.entries(saved).forEach(([k, v]) => {
        const el = document.getElementById(k);
        if (el && !el.value) el.value = v;
      });
    }
  };

  /* ── 로그아웃 (세션 완전 정리) ── */
  const logout = () => {
    // PCM 키 전부 삭제
    const keys = Object.keys(sessionStorage).filter(k => k.startsWith('pcm_'));
    keys.forEach(k => sessionStorage.removeItem(k));
    // 기타 앱 키
    ['userType', 'userEmail', 'onboarded', 'onboarding_from'].forEach(k => sessionStorage.removeItem(k));
    window.location.href = '로그인.html';
  };

  /* ── 알림 렌더 헬퍼 (마이페이지 등에서 사용) ── */
  const renderNotifList = (containerId) => {
    const el = document.getElementById(containerId);
    if (!el) return;
    const notifs = getNotifs();
    markRead();
    if (!notifs.length) {
      el.innerHTML = '<div style="text-align:center;padding:32px;color:#8492a6;font-size:13px;">알림이 없습니다</div>';
      return;
    }
    el.innerHTML = notifs.slice(0, 20).map(n => `
      <div style="display:flex;gap:12px;padding:14px 0;border-bottom:1px solid rgba(0,0,0,0.08);cursor:pointer;">
        <div style="font-size:20px;flex-shrink:0;">${n.icon || '🔔'}</div>
        <div style="flex:1;">
          <div style="font-size:13px;font-weight:500;margin-bottom:2px;">${n.title || ''}</div>
          <div style="font-size:12px;color:#8492a6;">${n.sub || ''}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
          <div style="font-size:11px;color:#8492a6;white-space:nowrap;">${n.time || ''}</div>
          ${n.unread ? '<div style="width:8px;height:8px;border-radius:50%;background:#1a6b4a;flex-shrink:0;"></div>' : ''}
        </div>
      </div>`).join('');
  };

  /* ── 공개 API ── */
  return {
    set, get, del,
    breakdown, fw, fmw,
    saveTask, getTask, saveQuote, getQuote, getConfirmedAmount,
    saveProject, getProjects,
    pushNotif, getNotifs, markRead, unreadCount, renderNotifList,
    showLoading, hideLoading,
    toast, validate, autoSave, logout,
    _updateBadge,
  };
})();

/* 페이지 로드 시 뱃지 갱신 */
document.addEventListener('DOMContentLoaded', () => PCM._updateBadge());

</script>
</head>
<body>
<div class="header">
  <div class="logo" onclick="nav('마이페이지_전문가.html')">
    <div class="logo-mark">전</div>
    <div class="logo-name">공공콘텐츠마켓</div>
  </div>
  <button class="btn btn-ghost btn-sm" onclick="nav('마이페이지_전문가.html')">← 마이페이지</button>
</div>

<div class="progress-bar">
  <div class="pb-inner">
    <span class="pb-label">샘플 검수 테스트</span>
    <div class="pb-track"><div class="pb-fill" id="pb-fill" style="width:0%"></div></div>
    <span class="pb-score" id="pb-score">0점</span>
    <span class="pb-status" id="pb-status">0/6 항목</span>
  </div>
</div>

<div class="main" id="main"></div>

<script>
function nav(p){window.location.href=p;}

/* ── 다크모드 토글 ── */
(function(){
  var saved = localStorage.getItem('pcm_theme') || 'light';
  document.documentElement.setAttribute('data-theme', saved);
})();
function toggleDarkMode(){
  var cur = document.documentElement.getAttribute('data-theme')||'light';
  var next = cur==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('pcm_theme', next);
  var btn = document.getElementById('dark-toggle');
  if(btn) btn.textContent = next==='dark'?'☀️':'🌙';
}
/* ── END 다크모드 ── */


let currentSlide = 0;
let submitted = false;

const SLIDES = [
  {bg:'#e8f5ef', title:'탄소중립 2050', subtitle:'우리가 만드는 지속가능한 미래', icon:'🌿', note:'슬라이드 1/5 — 표지'},
  {bg:'#e8f0fe', title:'2030 NDC 목표', subtitle:'2018년 대비 온실가스 40% 감축', icon:'📊', note:'슬라이드 2/5 — 목표'},
  {bg:'#fef3c7', title:'실천 방법 ①', subtitle:'대중교통 이용시 CO₂ 68% 절감', icon:'🚌', note:'슬라이드 3/5 — 실천 (수치 오류 포함)'},
  {bg:'#f3effe', title:'실천 방법 ②', subtitle:'에너지 절약으로 연간 15만원 절감', icon:'💡', note:'슬라이드 4/5 — 실천'},
  {bg:'#fce8e6', title:'환경부 공식 발표', subtitle:'출처: 환경부 2023 온실가스 인벤토리', icon:'🏛', note:'슬라이드 5/5 — 출처 (저작권 이미지 포함 주의)'},
];

const CHECKS = [
  {id:'lang', icon:'📝', label:'공공언어 가이드라인 준수', desc:'쉬운 말, 짧은 문장, 전문용어 설명'},
  {id:'design', icon:'🎨', label:'정부 시각디자인 규정', desc:'정부24 UI 가이드 색상·서체 기준'},
  {id:'copyright', icon:'⚖️', label:'저작권 이미지 사용', desc:'무료 이미지 또는 직접 제작 여부'},
  {id:'typo', icon:'🔍', label:'오탈자 및 수치 검증', desc:'통계 수치의 출처 및 정확성'},
  {id:'access', icon:'♿', label:'색상 접근성', desc:'명도비 4.5:1 이상 (WCAG AA)'},
  {id:'message', icon:'📣', label:'메시지 효과성', desc:'타깃 독자 대비 이해도·흥미도'},
];

let results = {};

function render(){
  const el = document.getElementById('main');
  if(submitted){ el.innerHTML = renderResult(); return; }
  el.innerHTML = `
    <div class="sample-panel">
      <div class="sp-header">
        <div class="sp-title">샘플 검수: 탄소중립 SNS 카드뉴스</div>
        <div class="sp-sub">환경부 의뢰 · 5장 · 카드뉴스</div>
        <div class="sp-meta">
          <span class="sp-tag">공공언어 검수</span>
          <span class="sp-tag">정부 디자인</span>
          <span class="sp-tag">저작권 확인</span>
        </div>
      </div>
      <div class="sample-content">
        <div class="sc-nav">
          <button class="btn btn-ghost btn-sm" onclick="prevSlide()">← 이전</button>
          <span style="font-size:12px;color:var(--text3);">${currentSlide+1} / ${SLIDES.length}</span>
          <button class="btn btn-ghost btn-sm" onclick="nextSlide()">다음 →</button>
        </div>
        <div class="sc-slide" style="background:${SLIDES[currentSlide].bg};">
          <div class="slide-content">
            <div style="font-size:48px;margin-bottom:12px;">${SLIDES[currentSlide].icon}</div>
            <div style="font-size:18px;font-weight:700;color:#1a1f2e;margin-bottom:6px;">${SLIDES[currentSlide].title}</div>
            <div style="font-size:13px;color:#4a5568;">${SLIDES[currentSlide].subtitle}</div>
          </div>
          <div class="sc-zoom" onclick="alert('실제 서비스에서는 고해상도 원본을 확인할 수 있습니다.')" title="크게 보기">🔍 확대</div>
          <div style="position:absolute;bottom:8px;left:10px;font-size:10px;color:#8492a6;">${SLIDES[currentSlide].note}</div>
        </div>
        <div class="sc-indicators">
          ${SLIDES.map((s,i)=>`<div class="sci ${i===currentSlide?'active':''}" onclick="goSlide(${i})"></div>`).join('')}
        </div>
      </div>
      <div style="background:var(--amber-light);border:1px solid rgba(180,83,9,.15);border-radius:10px;padding:12px 14px;font-size:12px;color:var(--amber);">
        ⚠ 검수 팁: 3번 슬라이드의 CO₂ 절감률 수치를 특히 주의해서 확인하세요. 출처 자료와 비교 검증이 필요합니다.
      </div>
    </div>

    <div class="check-panel">
      <div class="cp-card">
        <div class="cp-title">검수 체크리스트</div>
        <div class="check-list">
          ${CHECKS.map(ch=>`
            <div class="cl-item ${results[ch.id]||''}" id="cli-${ch.id}">
              <div class="cl-icon">${ch.icon}</div>
              <div class="cl-info">
                <div class="cl-label">${ch.label}</div>
                <div class="cl-desc">${ch.desc}</div>
                <div class="cl-btns">
                  <button class="clb clb-pass ${results[ch.id]==='pass'?'active':''}" onclick="setResult('${ch.id}','pass')">✓ 통과</button>
                  <button class="clb clb-fail ${results[ch.id]==='fail'?'active':''}" onclick="setResult('${ch.id}','fail')">✗ 문제</button>
                  <button class="clb clb-na ${results[ch.id]==='na'?'active':''}" onclick="setResult('${ch.id}','na')">— 해당없음</button>
                </div>
              </div>
            </div>`).join('')}
        </div>
      </div>
      <div class="cp-card">
        <div class="cp-title">검수 의견</div>
        <textarea id="review-comment" placeholder="검수 중 발견한 문제점, 개선 제안, 전반적 의견을 작성해주세요." oninput="updateScore()"></textarea>
      </div>
      <button class="btn btn-purple" style="width:100%;justify-content:center;padding:12px;" onclick="submitTest()">
        📋 검수 결과 제출
      </button>
    </div>`;

  updateScore();
}

function setResult(id, val){
  results[id] = val;
  render();
}

function updateScore(){
  const total = CHECKS.length;
  const done  = Object.keys(results).length;
  const pass  = Object.values(results).filter(v=>v==='pass').length;
  const fail  = Object.values(results).filter(v=>v==='fail').length;
  const na    = Object.values(results).filter(v=>v==='na').length;
  const score = done > 0 ? Math.round((pass / (pass+fail||1)) * 100) : 0;
  const pct   = done/total*100;

  const fill  = document.getElementById('pb-fill');
  const sc    = document.getElementById('pb-score');
  const st    = document.getElementById('pb-status');
  if(fill) fill.style.width = pct+'%';
  if(sc)   sc.textContent  = score+'점';
  if(st)   st.textContent  = `${done}/${total} 항목`;
}

function prevSlide(){ currentSlide = Math.max(0,currentSlide-1); render(); }
function nextSlide(){ currentSlide = Math.min(SLIDES.length-1,currentSlide+1); render(); }
function goSlide(i){ currentSlide=i; render(); }

function submitTest(){
  const done = Object.keys(results).length;
  if(done < CHECKS.length){
    alert(`모든 항목을 평가해주세요. (${done}/${CHECKS.length})`); return;
  }
  submitted = true;
  render();
  window.scrollTo(0,0);
}

function renderResult(){
  const pass = Object.values(results).filter(v=>v==='pass').length;
  const fail = Object.values(results).filter(v=>v==='fail').length;
  const na   = Object.values(results).filter(v=>v==='na').length;
  const score = Math.round((pass/(pass+fail||1))*100);
  const passed = score >= 70;

  // 세션에 저장
  try{
    if(typeof PCM !== 'undefined') PCM.set('expertTestResult',{score,pass,fail,na,passed,date:new Date().toISOString()});
    if(typeof PCM !== 'undefined' && passed) PCM.pushNotif({icon:'🎉',title:'샘플 테스트 통과!',sub:'최종 승인 후 패널 등록이 완료됩니다.',time:'방금'});
  }catch(e){}

  return `<div style="grid-column:1/-1;">
    <div class="result-card">
      <span class="rc-anim">${passed?'🎉':'📋'}</span>
      <div style="font-family:var(--serif);font-size:24px;font-weight:700;margin-bottom:6px;">${passed?'테스트 통과!':'보완 필요'}</div>
      <div style="font-family:var(--mono);font-size:48px;font-weight:700;color:${passed?'var(--accent)':'var(--amber)'};margin:12px 0;">${score}점</div>
      <div style="font-size:13px;color:var(--text2);margin-bottom:24px;">${passed?'합격 기준(70점) 이상입니다. 최종 심사 후 패널 등록이 완료됩니다.':'합격 기준(70점) 미달입니다. 검수 가이드라인을 다시 확인 후 재응시하세요.'}</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:24px;text-align:center;">
        <div style="background:var(--accent-light);border-radius:10px;padding:14px;">
          <div style="font-size:24px;font-weight:700;color:var(--accent);">${pass}</div>
          <div style="font-size:11px;color:var(--text3);">통과</div>
        </div>
        <div style="background:var(--red-light);border-radius:10px;padding:14px;">
          <div style="font-size:24px;font-weight:700;color:var(--red);">${fail}</div>
          <div style="font-size:11px;color:var(--text3);">문제</div>
        </div>
        <div style="background:var(--surface2);border-radius:10px;padding:14px;">
          <div style="font-size:24px;font-weight:700;color:var(--text3);">${na}</div>
          <div style="font-size:11px;color:var(--text3);">해당없음</div>
        </div>
      </div>
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
        <button class="btn btn-purple" onclick="nav('마이페이지_전문가.html')">마이페이지로 이동</button>
        ${!passed?`<button class="btn btn-ghost" onclick="submitted=false;results={};render()">다시 시도</button>`:''}
      </div>
    </div>
  </div>`;
}

render();
</script>
</body>
</html>
