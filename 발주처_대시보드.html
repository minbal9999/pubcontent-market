<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>공공콘텐츠마켓 — 발주처 대시보드</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@600;700&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
  --bg: #f4f2ed;
  --surface: #ffffff;
  --surface2: #f9f8f5;
  --border: rgba(0,0,0,0.07);
  --border2: rgba(0,0,0,0.12);
  --text: #1a1f2e;
  --text2: #4a5568;
  --text3: #8492a6;
  --accent: #1a6b4a;
  --accent2: #2d9e72;
  --accent-light: #e8f5ef;
  --red: #d93025;
  --red-light: #fce8e6;
  --amber: #b45309;
  --amber-light: #fef3c7;
  --blue: #1a56db;
  --blue-light: #e8f0fe;
  --serif: 'Noto Serif KR', serif;
  --sans: 'Noto Sans KR', sans-serif;
  --mono: 'JetBrains Mono', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; line-height: 1.6; min-height: 100vh; }

/* HEADER */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 28px;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 50;
}

.logo { display: flex; align-items: center; gap: 10px; }
.logo-mark {
  width: 30px; height: 30px;
  background: var(--accent);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--serif);
  font-weight: 700; font-size: 13px; color: #fff;
}
.logo-name { font-family: var(--serif); font-size: 15px; font-weight: 700; color: var(--text); }
.logo-role { font-size: 11px; color: var(--text3); margin-left: 8px; padding: 2px 8px; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; }

.header-right { display: flex; align-items: center; gap: 12px; }
.user-info { display: flex; align-items: center; gap: 8px; }
.user-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--accent-light); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: var(--accent); }
.user-name { font-size: 13px; font-weight: 500; }
.user-dept { font-size: 11px; color: var(--text3); }

.btn {
  padding: 8px 16px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  border: none;
  font-family: var(--sans);
  transition: all 0.15s;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent2); }
.btn-ghost { background: transparent; border: 1px solid var(--border2); color: var(--text2); }
.btn-ghost:hover { background: var(--surface2); }
.btn-sm { padding: 5px 12px; font-size: 12px; }

/* LAYOUT */
.layout { display: grid; grid-template-columns: 220px 1fr; min-height: calc(100vh - 60px); }

.sidebar {
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 20px 0;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 20px;
  font-size: 13px;
  color: var(--text2);
  cursor: pointer;
  transition: all 0.15s;
  border-left: 3px solid transparent;
}
.nav-item:hover { background: var(--surface2); color: var(--text); }
.nav-item.active { background: var(--accent-light); color: var(--accent); border-left-color: var(--accent); font-weight: 500; }
.nav-icon { width: 16px; text-align: center; font-size: 14px; }

.nav-section-label {
  font-size: 10px;
  font-weight: 500;
  color: var(--text3);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 16px 20px 6px;
}

/* MAIN */
.main { padding: 28px; overflow-y: auto; }

.page-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
}

.page-title { font-family: var(--serif); font-size: 22px; font-weight: 700; color: var(--text); }
.page-sub { font-size: 13px; color: var(--text3); margin-top: 2px; }

/* STATS */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-bottom: 24px;
}

.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
}

.stat-label { font-size: 12px; color: var(--text3); margin-bottom: 8px; }
.stat-val { font-family: var(--serif); font-size: 28px; font-weight: 700; color: var(--text); line-height: 1; }
.stat-val span { font-size: 14px; color: var(--text3); font-family: var(--sans); font-weight: 400; }
.stat-change { font-size: 11px; margin-top: 6px; }
.sc-up { color: var(--accent); }
.sc-down { color: var(--red); }

/* PROJECTS */
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}

.section-title-sm {
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  margin-bottom: 20px;
}

.table-header {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr 1.2fr 1fr 120px;
  gap: 12px;
  padding: 10px 20px;
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
  font-size: 11px;
  font-weight: 500;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.table-row {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr 1.2fr 1fr 120px;
  gap: 12px;
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  align-items: center;
  transition: background 0.1s;
  cursor: pointer;
}
.table-row:last-child { border-bottom: none; }
.table-row:hover { background: var(--surface2); }

.proj-name { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 2px; }
.proj-maker { font-size: 11px; color: var(--text3); }

.budget-val { font-size: 13px; font-weight: 500; font-family: var(--mono); }
.deadline-val { font-size: 12px; color: var(--text2); }

.status-pill {
  font-size: 11px;
  font-weight: 500;
  padding: 3px 10px;
  border-radius: 10px;
  display: inline-block;
  white-space: nowrap;
}

.sp-review { background: var(--amber-light); color: var(--amber); }
.sp-ai { background: var(--blue-light); color: var(--blue); }
.sp-done { background: var(--accent-light); color: var(--accent); }
.sp-wait { background: var(--surface2); color: var(--text3); border: 1px solid var(--border); }
.sp-revision { background: var(--red-light); color: var(--red); }

/* DETAIL PANEL */
.detail-layout {
  display: grid;
  grid-template-columns: 1fr 360px;
  gap: 20px;
}

.detail-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px;
}

.detail-title { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
.detail-meta { font-size: 12px; color: var(--text3); margin-bottom: 20px; }

/* REVIEW PROGRESS */
.review-track {
  background: var(--surface2);
  border-radius: 10px;
  padding: 20px;
  margin-bottom: 20px;
}

.review-steps {
  display: flex;
  align-items: center;
  gap: 0;
}

.rstep {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.rstep-circle {
  width: 36px; height: 36px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700;
  border: 2px solid var(--border2);
  background: var(--surface);
  color: var(--text3);
  position: relative;
  z-index: 1;
  transition: all 0.2s;
}

.rstep-circle.done { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }
.rstep-circle.active { background: var(--blue-light); border-color: var(--blue); color: var(--blue); box-shadow: 0 0 0 4px rgba(26,86,219,0.1); }

.rstep-label { font-size: 11px; color: var(--text3); margin-top: 8px; text-align: center; font-weight: 500; }
.rstep-label.done { color: var(--accent); }
.rstep-label.active { color: var(--blue); }
.rstep-line { flex: 1; height: 2px; background: var(--border2); margin-top: -20px; }
.rstep-line.done { background: var(--accent); }

/* AI REPORT */
.ai-report {
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 16px;
}

.ai-report-head {
  background: var(--blue-light);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.ai-report-title { font-size: 12px; font-weight: 700; color: var(--blue); display: flex; align-items: center; gap: 6px; }
.ai-score-badge {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 500;
  padding: 3px 10px;
  border-radius: 8px;
  background: var(--surface);
}
.asb-good { color: var(--accent); }
.asb-warn { color: var(--amber); }

.ai-report-body { padding: 14px 16px; }
.ai-check-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 5px 0;
  font-size: 12px;
  color: var(--text2);
  border-bottom: 1px solid var(--border);
}
.ai-check-item:last-child { border-bottom: none; }
.aci-icon {
  width: 16px; height: 16px;
  border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 700; flex-shrink: 0;
}
.aci-pass { background: var(--accent-light); color: var(--accent); }
.aci-warn { background: var(--amber-light); color: var(--amber); }
.aci-fail { background: var(--red-light); color: var(--red); }

/* EXPERT REPORT */
.expert-report {
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 16px;
}

.expert-report-head {
  background: var(--amber-light);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.expert-report-title { font-size: 12px; font-weight: 700; color: var(--amber); display: flex; align-items: center; gap: 6px; }

.expert-report-body { padding: 14px 16px; }
.expert-comment-text { font-size: 12px; color: var(--text2); line-height: 1.7; margin-bottom: 12px; }
.expert-reviewer {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  color: var(--text3);
}
.er-avatar {
  width: 20px; height: 20px;
  border-radius: 50%;
  background: var(--amber-light);
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 700; color: var(--amber);
}

/* ACTION PANEL */
.action-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  height: fit-content;
}

.action-title { font-size: 13px; font-weight: 700; margin-bottom: 16px; color: var(--text); }

.action-info-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  font-size: 12px;
}
.action-info-row:last-of-type { border-bottom: none; margin-bottom: 16px; }
.air-label { color: var(--text3); }
.air-val { font-weight: 500; color: var(--text); }

.action-btns { display: flex; flex-direction: column; gap: 8px; }
.btn-approve { background: var(--accent); color: #fff; width: 100%; justify-content: center; padding: 12px; font-size: 14px; border-radius: 10px; }
.btn-approve:hover { background: var(--accent2); }
.btn-request { background: var(--red-light); color: var(--red); border: 1px solid rgba(217,48,37,0.2); width: 100%; justify-content: center; padding: 10px; border-radius: 10px; }
.btn-request:hover { background: rgba(217,48,37,0.15); }

.escrow-box {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px;
  margin-bottom: 16px;
  text-align: center;
}
.escrow-label { font-size: 11px; color: var(--text3); margin-bottom: 4px; }
.escrow-val { font-family: var(--serif); font-size: 22px; font-weight: 700; color: var(--text); }
.escrow-note { font-size: 11px; color: var(--accent); margin-top: 2px; }

/* REQUEST MODAL */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.4);
  display: flex; align-items: center; justify-content: center;
  z-index: 200;
  opacity: 0; pointer-events: none;
  transition: opacity 0.2s;
}
.modal-overlay.show { opacity: 1; pointer-events: all; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 16px;
  padding: 28px;
  width: 460px;
  max-width: 90vw;
  transform: scale(0.96);
  transition: transform 0.2s;
}
.modal-overlay.show .modal { transform: scale(1); }
.modal-title { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
.modal-sub { font-size: 13px; color: var(--text2); margin-bottom: 20px; line-height: 1.6; }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 16px; }

textarea, input[type="text"] {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 8px;
  color: var(--text);
  font-family: var(--sans);
  font-size: 13px;
  padding: 10px 12px;
  outline: none;
  margin-bottom: 10px;
}
textarea { resize: vertical; min-height: 100px; }
textarea:focus, input:focus { border-color: var(--accent); }
textarea::placeholder, input::placeholder { color: var(--text3); }

label { font-size: 12px; font-weight: 500; color: var(--text2); display: block; margin-bottom: 4px; }

.toast {
  position: fixed;
  bottom: 24px; right: 24px;
  background: var(--text);
  color: #fff;
  border-radius: 10px;
  padding: 12px 18px;
  font-size: 13px;
  display: flex; align-items: center; gap: 10px;
  transform: translateY(60px); opacity: 0;
  transition: all 0.3s; z-index: 300;
}
.toast.show { transform: translateY(0); opacity: 1; }

.tab-bar { display: flex; gap: 4px; margin-bottom: 20px; border-bottom: 1px solid var(--border); }
.tab { padding: 8px 16px; font-size: 13px; color: var(--text2); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; background: none; border-top: none; border-left: none; border-right: none; font-family: var(--sans); }
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 500; }

.new-request-form { display: flex; flex-direction: column; gap: 14px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-group { display: flex; flex-direction: column; gap: 4px; }

select {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 8px;
  color: var(--text);
  font-family: var(--sans);
  font-size: 13px;
  padding: 10px 12px;
  outline: none;
  cursor: pointer;
}
select:focus { border-color: var(--accent); }

/* ── 모바일 반응형 ── */
@media(max-width:768px){
  .layout, .main-layout { grid-template-columns:1fr!important; }
  .sidebar { position:static!important; height:auto!important; border-right:none!important; border-bottom:1px solid var(--border); }
  .preview-panel,.right-panel { display:none; }
  .main,.left-panel,.main-area { padding:16px!important; }
  .stat-row { grid-template-columns:1fr 1fr!important; }
  .header { padding:0 14px!important; }
  .nav-links { display:none!important; }
  .mob-menu-btn { display:flex!important; }
  .form-grid, .spec-grid { grid-template-columns:1fr!important; }
  .type-grid { grid-template-columns:repeat(2,1fr)!important; }
  .score-grid { grid-template-columns:1fr!important; }
  .compare-table { font-size:11px; }
  .compare-table th, .compare-table td { padding:8px 8px!important; }
  .eb-options { grid-template-columns:1fr!important; }
  .sign-grid { grid-template-columns:1fr!important; gap:20px!important; }
  .chat-layout { grid-template-columns:1fr!important; }
  .file-preview-grid { grid-template-columns:1fr 1fr!important; }
  .podium { grid-template-columns:1fr!important; }
  .makers-grid { grid-template-columns:1fr!important; }
  .summary-grid { grid-template-columns:1fr 1fr!important; }
  .ql-grid { grid-template-columns:1fr!important; }
  .filter-panel { display:none; }
  .page { grid-template-columns:1fr!important; }
}
@media(max-width:480px){
  .stat-row { grid-template-columns:1fr!important; }
  .summary-grid { grid-template-columns:1fr!important; }
  .hero-title { font-size:24px!important; }
  .btn { padding:7px 12px!important; font-size:12px!important; }
}
/* ── END 모바일 ── */


/* ── 다크모드 ── */
[data-theme="dark"]{
  --bg:#0d1117;--surface:#161b27;--surface2:#1c2333;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --text:#e8eaf2;--text2:#8b92b3;--text3:#4a5270;
}
[data-theme="dark"] .logo-name,[data-theme="dark"] .page-title{color:var(--text);}
[data-theme="dark"] input,[data-theme="dark"] select,[data-theme="dark"] textarea{background:var(--surface2);color:var(--text);border-color:var(--border2);}
[data-theme="dark"] .header{background:var(--surface);border-color:var(--border);}
/* ── END 다크모드 ── */

</style>

<script>
/* ================================================================
   PCM.js — 공공콘텐츠마켓 공통 상태 관리 모듈 v3
   모든 HTML에서 <\x3cscript src="pcm.js"><\/script>로 로드
   ================================================================ */

const PCM = (() => {
  /* ── 기본 스토리지 ── */
  const KEY = k => 'pcm_' + k;
  const set  = (k, v)  => { try { sessionStorage.setItem(KEY(k), JSON.stringify(v)); } catch(e) {} };
  const get  = (k, d=null) => { try { const v = sessionStorage.getItem(KEY(k)); return v != null ? JSON.parse(v) : d; } catch(e) { return d; } };
  const del  = k => sessionStorage.removeItem(KEY(k));

  /* ── 금액 계산 ── */
  const breakdown = vatIncl => {
    const supply = Math.round(vatIncl / 1.1);
    return { vatIncl, supply, vat: vatIncl - supply, comm: Math.round(supply * 0.05), biz: Math.round(supply * 0.95) };
  };
  const fw  = v => Math.round(v).toLocaleString() + '원';
  const fmw = v => (Math.round(v) / 10000).toLocaleString() + '만원';

  /* ── 과업 / 견적 공유 ── */
  const saveTask   = t => set('currentTask', t);
  const getTask    = ()  => get('currentTask', null);
  const saveQuote  = q => set('latestQuote', q);
  const getQuote   = ()  => get('latestQuote', null);
  const getConfirmedAmount = () => get('confirmedAmount', null);

  /* ── 프로젝트 목록 ── */
  const getProjects = () => get('projects', []);
  const saveProject = p => {
    const list = getProjects();
    const idx = list.findIndex(x => x.id === p.id);
    if (idx >= 0) list[idx] = p; else list.unshift(p);
    set('projects', list.slice(0, 50));
  };

  /* ── 알림 시스템 ── */
  const pushNotif = n => {
    const list = get('notifs', []);
    list.unshift({ id: 'n-' + Date.now(), unread: true, time: '방금', ...n });
    set('notifs', list.slice(0, 50));
    _updateBadge();
  };
  const getNotifs  = () => get('notifs', []);
  const markRead   = () => { set('notifs', getNotifs().map(n => ({ ...n, unread: false }))); _updateBadge(); };
  const unreadCount = () => getNotifs().filter(n => n.unread).length;
  const _updateBadge = () => {
    const cnt = unreadCount();
    document.querySelectorAll('[data-notif-badge]').forEach(el => {
      el.textContent = cnt || '';
      el.style.display = cnt ? '' : 'none';
    });
  };

  /* ── 로딩 버튼 ── */
  const showLoading = (btn, text = '처리 중...') => {
    if (!btn) return;
    btn._origHTML = btn.innerHTML;
    btn.disabled = true;
    if (!document.getElementById('pcmSpinStyle')) {
      const s = document.createElement('style');
      s.id = 'pcmSpinStyle';
      s.textContent = '@keyframes pcmSpin{to{transform:rotate(360deg)}}';
      document.head.appendChild(s);
    }
    btn.innerHTML = `<span style="display:inline-block;width:14px;height:14px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:pcmSpin .7s linear infinite;vertical-align:middle;margin-right:6px;"></span>${text}`;
  };
  const hideLoading = btn => {
    if (btn && btn._origHTML != null) { btn.disabled = false; btn.innerHTML = btn._origHTML; }
  };

  /* ── 토스트 ── */
  const toast = (msg, type = 'info') => {
    const colors = { info: '#1a1f2e', success: '#1a6b4a', error: '#dc3545', warn: '#b45309' };
    const icons  = { info: 'ℹ️', success: '✅', error: '❌', warn: '⚠️' };
    let t = document.getElementById('pcmToast');
    if (!t) {
      t = document.createElement('div');
      t.id = 'pcmToast';
      t.style.cssText = 'position:fixed;bottom:24px;right:24px;border-radius:10px;padding:12px 18px;font-size:13px;font-family:sans-serif;z-index:9999;transition:all .3s;opacity:0;transform:translateY(60px);display:flex;align-items:center;gap:8px;max-width:340px;box-shadow:0 4px 24px rgba(0,0,0,.22);color:#fff;pointer-events:none;';
      document.body.appendChild(t);
    }
    t.style.background = colors[type] || colors.info;
    t.innerHTML = `<span style="flex-shrink:0;">${icons[type] || ''}</span><span>${msg}</span>`;
    t.style.opacity = '1';
    t.style.transform = 'translateY(0)';
    clearTimeout(t._timer);
    t._timer = setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateY(60px)'; }, 3400);
  };

  /* ── 폼 유효성 검사 ── */
  const validate = rules => {
    let ok = true;
    rules.forEach(({ id, label, required, minLen, type: ftype }) => {
      const el = document.getElementById(id);
      if (!el) return;
      const v = (el.value || '').trim();
      let msg = '';
      if (required && !v) msg = `${label}을(를) 입력해주세요.`;
      else if (minLen && v.length < minLen) msg = `${label}은(는) ${minLen}자 이상이어야 합니다.`;
      else if (ftype === 'email' && v && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v)) msg = '올바른 이메일 형식이 아닙니다.';
      let errEl = document.getElementById(id + '-err');
      if (!errEl) {
        errEl = document.createElement('div');
        errEl.id = id + '-err';
        errEl.style.cssText = 'font-size:11px;color:#dc3545;margin-top:3px;';
        if (el.parentNode) el.parentNode.appendChild(errEl);
      }
      if (msg) { ok = false; errEl.textContent = msg; el.style.setProperty('border-color', '#dc3545', 'important'); }
      else { errEl.textContent = ''; el.style.removeProperty('border-color'); }
    });
    return ok;
  };

  /* ── 폼 자동 임시저장 ── */
  const autoSave = (formId, storageKey) => {
    const form = document.getElementById(formId);
    if (!form) return;
    const save = () => {
      const data = {};
      form.querySelectorAll('input, select, textarea').forEach(el => { if (el.id) data[el.id] = el.value; });
      set(storageKey, data);
    };
    form.addEventListener('input', save);
    form.addEventListener('change', save);
    // 새로고침 경고
    window.addEventListener('beforeunload', e => {
      const saved = get(storageKey, {});
      if (Object.values(saved).some(v => v)) {
        e.preventDefault();
        e.returnValue = '작성 중인 내용이 있습니다. 페이지를 떠나시겠습니까?';
      }
    });
    // 기존 임시저장 복원
    const saved = get(storageKey, {});
    if (saved) {
      Object.entries(saved).forEach(([k, v]) => {
        const el = document.getElementById(k);
        if (el && !el.value) el.value = v;
      });
    }
  };

  /* ── 로그아웃 (세션 완전 정리) ── */
  const logout = () => {
    // PCM 키 전부 삭제
    const keys = Object.keys(sessionStorage).filter(k => k.startsWith('pcm_'));
    keys.forEach(k => sessionStorage.removeItem(k));
    // 기타 앱 키
    ['userType', 'userEmail', 'onboarded', 'onboarding_from'].forEach(k => sessionStorage.removeItem(k));
    window.location.href = '로그인.html';
  };

  /* ── 알림 렌더 헬퍼 (마이페이지 등에서 사용) ── */
  const renderNotifList = (containerId) => {
    const el = document.getElementById(containerId);
    if (!el) return;
    const notifs = getNotifs();
    markRead();
    if (!notifs.length) {
      el.innerHTML = '<div style="text-align:center;padding:32px;color:#8492a6;font-size:13px;">알림이 없습니다</div>';
      return;
    }
    el.innerHTML = notifs.slice(0, 20).map(n => `
      <div style="display:flex;gap:12px;padding:14px 0;border-bottom:1px solid rgba(0,0,0,0.08);cursor:pointer;">
        <div style="font-size:20px;flex-shrink:0;">${n.icon || '🔔'}</div>
        <div style="flex:1;">
          <div style="font-size:13px;font-weight:500;margin-bottom:2px;">${n.title || ''}</div>
          <div style="font-size:12px;color:#8492a6;">${n.sub || ''}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
          <div style="font-size:11px;color:#8492a6;white-space:nowrap;">${n.time || ''}</div>
          ${n.unread ? '<div style="width:8px;height:8px;border-radius:50%;background:#1a6b4a;flex-shrink:0;"></div>' : ''}
        </div>
      </div>`).join('');
  };

  /* ── 공개 API ── */
  return {
    set, get, del,
    breakdown, fw, fmw,
    saveTask, getTask, saveQuote, getQuote, getConfirmedAmount,
    saveProject, getProjects,
    pushNotif, getNotifs, markRead, unreadCount, renderNotifList,
    showLoading, hideLoading,
    toast, validate, autoSave, logout,
    _updateBadge,
  };
})();

/* 페이지 로드 시 뱃지 갱신 */
document.addEventListener('DOMContentLoaded', () => PCM._updateBadge());

</script>

<script>

var currentPage = 'dashboard';

var PROJECTS = [

    budgetVAT:19800000, deadline:'2025.05.10', progress:75, aiScore:94 },
  { id:2, icon:'📊', title:'환경정책 인포그래픽 5종', org:'환경부 정책기획과',
    maker:'비주얼팩토리', status:'done', statusLabel:'정산 완료',
    budgetVAT:9680000, deadline:'2025.04.28', progress:100, aiScore:98 },
  { id:3, icon:'📣', title:'청년 주거복지 캠페인 기획', org:'국토부 주거복지기획과',
    maker:'캠페인하우스', status:'making', statusLabel:'제작 중',
    budgetVAT:27500000, deadline:'2025.07.01', progress:30, aiScore:null },
];

function fmtW(n) {
  if (!n && n !== 0) return '0';
  return Math.round(n / 10000).toLocaleString();
}

function statusBadge(status, label) {
  var colors = {
    review: 'background:#e8f0fe;color:#1a56db;',
    done:   'background:#e8f5ef;color:#1a6b4a;',
    making: 'background:#fef3c7;color:#b45309;',
    wait:   'background:#f9f8f5;color:#8492a6;'
  };
  var style = colors[status] || colors.wait;
  return '<span style="font-size:11px;font-weight:600;padding:2px 8px;border-radius:5px;' + style + '">' + label + '</span>';
}

function showPage(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(function(el) {
    el.classList.remove('active');
  });
  var target = document.querySelector('.nav-item[data-page="' + page + '"]');
  if (target) target.classList.add('active');
  render();
}

function render() {
  var area = document.getElementById('main-area');
  if (!area) { console.error('main-area 없음'); return; }
  try {
    if (currentPage === 'dashboard') {
      area.innerHTML = renderDashboard();
    } else if (currentPage === 'projects') {
      area.innerHTML = renderProjects();
    } else if (currentPage === 'new') {
      area.innerHTML = '<div style="padding:32px;text-align:center;"><div style="font-size:44px;margin-bottom:14px;">📋</div><p style="margin-bottom:20px;">과업지시서 생성기로 이동합니다.</p><button class="btn btn-primary" onclick="nav(\'과업지시서_생성기_v3.html\')">과업지시서 작성 →</button></div>';
    } else {
      area.innerHTML = '<div style="padding:32px;text-align:center;color:var(--text3);">준비 중입니다.</div>';
    }
  } catch(err) {
    console.error('render 오류:', err);
    area.innerHTML = '<div style="padding:32px;color:red;">오류: ' + err.message + '</div>';

}

function renderDashboard() {
  var html = '';
  html += '<div class="page-header">';
  html += '<div><div class="page-title">대시보드</div>';
  html += '<div class="page-sub">환경부 홍보기획과 · 2025년 2분기</div></div>';
  html += '<button class="btn btn-primary" onclick="nav('과업지시서_생성기_v3.html')">+ 새 의뢰 등록</button>';

  html += '<div class="stat-card"><div class="stat-label">완료</div><div class="stat-val">1<span>건</span></div></div>';
  html += '<div class="stat-card"><div class="stat-label">AI 평균 점수</div><div class="stat-val">96<span>점</span></div></div>';

  // 프로젝트 목록

  html += '<button class="btn btn-ghost btn-sm" onclick="showPage('projects')">전체 보기</button></div>';
  html += '<div class="table-wrap">';

  for (var i = 0; i < PROJECTS.length; i++) {

    html += '<div style="font-size:11px;color:var(--text3);margin-top:3px;">' + (p.aiScore ? 'AI ' + p.aiScore + '점' : '검수 전') + '</div>';
    html += '</div>';

  html += '</div></div>';

  // 빠른 액션

  var actions = [
    {icon:'📋', label:'새 의뢰 등록', href:'과업지시서_생성기_v3.html'},

}

function renderProjects() {
  var html = '<div class="page-header"><div><div class="page-title">프로젝트 목록</div>';
  html += '<div class="page-sub">전체 ' + PROJECTS.length + '건</div></div>';

function showDetail(id) {
  var p = null;

    + '</div>';

}

function closeModal() {
  var m = document.getElementById('modal-overlay');
  if (m) m.style.display = 'none';
}

function showToast(msg) {
  try { PCM.toast(msg, 'info'); } catch(e) {}
}

// 초기화
document.addEventListener('DOMContentLoaded', function() {
  mergeSessionProjects();
  render();
});

function mergeSessionProjects() {
  try {
    var sp = PCM.getProjects ? PCM.getProjects() : [];
    for (var i = 0; i < sp.length; i++) {
      var found = false;
      for (var j = 0; j < PROJECTS.length; j++) {
        if (PROJECTS[j].id === sp[i].id) { found = true; break; }
      }
      if (!found) PROJECTS.unshift(sp[i]);
    }
  } catch(e) {}
}

</script>

<script>
function nav(p){window.location.href=p;}

/* ── 다크모드 토글 ── */
(function(){
  var saved = localStorage.getItem('pcm_theme') || 'light';
  document.documentElement.setAttribute('data-theme', saved);
})();

(function() {
  const projects = JSON.parse(sessionStorage.getItem('pcm_projects')||'[]');
  if (projects.length === 0) {
    // 빈 상태 처리 — 페이지 로드 후 실행
    window.addEventListener('DOMContentLoaded', function() {

          }

    });

})();
