<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>비밀번호 찾기 — 공공콘텐츠마켓</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@600;700&family=JetBrains+Mono:wght@400;500&display=swap');
:root{
  --bg:#f4f2ed;--surface:#fff;--surface2:#f9f8f5;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);
  --text:#1a1f2e;--text2:#4a5568;--text3:#8492a6;
  --accent:#1a6b4a;--accent2:#2d9e72;--accent-light:#e8f5ef;
  --amber:#b45309;--amber-light:#fef3c7;
  --red:#dc3545;
  --serif:'Noto Serif KR',serif;--sans:'Noto Sans KR',sans-serif;
  --mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;min-height:100vh;display:flex;flex-direction:column;}

.header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 32px;height:58px;display:flex;align-items:center;justify-content:space-between;}
.logo{display:flex;align-items:center;gap:10px;cursor:pointer;}
.logo-mark{width:28px;height:28px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-weight:700;font-size:12px;color:#fff;}
.logo-name{font-family:var(--serif);font-size:15px;font-weight:700;color:var(--text);}
.back-link{font-size:13px;color:var(--text2);cursor:pointer;display:flex;align-items:center;gap:5px;}
.back-link:hover{color:var(--accent);}

.main{flex:1;display:flex;align-items:center;justify-content:center;padding:48px 24px;}
.wrap{width:100%;max-width:420px;}

.card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:36px 32px;}

/* STEP INDICATOR */
.step-dots{display:flex;justify-content:center;gap:8px;margin-bottom:28px;}
.sd{width:8px;height:8px;border-radius:50%;background:var(--border2);transition:all .25s;}
.sd.active{background:var(--accent);width:24px;border-radius:4px;}
.sd.done{background:var(--accent-light);}

.card-icon{width:56px;height:56px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 16px;}
.icon-mail{background:var(--accent-light);}
.icon-lock{background:var(--amber-light);}
.icon-check{background:var(--accent-light);}

.card-title{font-family:var(--serif);font-size:22px;font-weight:700;text-align:center;margin-bottom:6px;}
.card-sub{font-size:13px;color:var(--text2);text-align:center;margin-bottom:28px;line-height:1.65;font-weight:300;}
.card-sub strong{color:var(--text);font-weight:600;}

/* FORM */
.form-group{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;}
label{font-size:12px;font-weight:500;color:var(--text2);}
input{background:var(--surface2);border:1.5px solid var(--border2);border-radius:10px;color:var(--text);font-family:var(--sans);font-size:14px;padding:13px 15px;outline:none;width:100%;transition:border-color .15s;}
input:focus{border-color:var(--accent);background:var(--surface);}
input::placeholder{color:var(--text3);}
input.otp-input{font-family:var(--mono);font-size:22px;font-weight:700;text-align:center;letter-spacing:.3em;padding:14px;}
input.otp-input:focus{border-color:var(--accent);}

.btn-submit{width:100%;padding:14px;border-radius:10px;border:none;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--sans);background:var(--accent);color:#fff;transition:all .15s;margin-top:4px;}
.btn-submit:hover{background:var(--accent2);}
.btn-submit:disabled{background:var(--border2);color:var(--text3);cursor:not-allowed;}

.btn-ghost{width:100%;padding:11px;border-radius:10px;border:1.5px solid var(--border2);background:transparent;color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;font-family:var(--sans);transition:all .15s;margin-top:8px;}
.btn-ghost:hover{background:var(--surface2);}

/* OTP */
.otp-section{margin-bottom:20px;}
.otp-timer{text-align:center;font-size:13px;color:var(--text3);margin-top:10px;}
.otp-timer strong{font-family:var(--mono);color:var(--amber);font-size:15px;}
.resend-link{color:var(--accent);cursor:pointer;text-decoration:underline;text-underline-offset:2px;}

/* PW STRENGTH */
.pw-rows{display:flex;gap:4px;margin-top:6px;}
.pw-row{flex:1;height:4px;border-radius:2px;background:var(--border);transition:background .2s;}
.pw-row.w{background:var(--red);}
.pw-row.m{background:var(--amber);}
.pw-row.s{background:var(--accent);}
.pw-hint{font-size:11px;margin-top:4px;}

/* SUCCESS */
.success-wrap{text-align:center;}
.success-anim{font-size:64px;margin-bottom:16px;display:block;animation:pop .5s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes pop{from{opacity:0;transform:scale(.5)}to{opacity:1;transform:scale(1)}}

/* DIVIDER */
.divider{display:flex;align-items:center;gap:10px;margin:18px 0;}
.dl{flex:1;height:1px;background:var(--border);}
.dt{font-size:11px;color:var(--text3);}

/* ERROR */
.err-box{background:#fce8e6;border:1px solid rgba(220,53,69,.2);border-radius:8px;padding:10px 13px;font-size:12px;color:var(--red);margin-bottom:14px;display:none;}
.err-box.show{display:block;}

.login-link{text-align:center;margin-top:20px;font-size:13px;color:var(--text2);}
.login-link a{color:var(--accent);text-decoration:none;font-weight:500;cursor:pointer;}

@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
.shake{animation:shake .4s ease;}

/* ── 모바일 반응형 ── */
@media(max-width:768px){
  .layout, .main-layout { grid-template-columns:1fr!important; }
  .sidebar { position:static!important; height:auto!important; border-right:none!important; border-bottom:1px solid var(--border); }
  .preview-panel,.right-panel { display:none; }
  .main,.left-panel,.main-area { padding:16px!important; }
  .stat-row { grid-template-columns:1fr 1fr!important; }
  .header { padding:0 14px!important; }
  .nav-links { display:none!important; }
  .mob-menu-btn { display:flex!important; }
  .form-grid, .spec-grid { grid-template-columns:1fr!important; }
  .type-grid { grid-template-columns:repeat(2,1fr)!important; }
  .score-grid { grid-template-columns:1fr!important; }
  .compare-table { font-size:11px; }
  .compare-table th, .compare-table td { padding:8px 8px!important; }
  .eb-options { grid-template-columns:1fr!important; }
  .sign-grid { grid-template-columns:1fr!important; gap:20px!important; }
  .chat-layout { grid-template-columns:1fr!important; }
  .file-preview-grid { grid-template-columns:1fr 1fr!important; }
  .podium { grid-template-columns:1fr!important; }
  .makers-grid { grid-template-columns:1fr!important; }
  .summary-grid { grid-template-columns:1fr 1fr!important; }
  .ql-grid { grid-template-columns:1fr!important; }
  .filter-panel { display:none; }
  .page { grid-template-columns:1fr!important; }
}
@media(max-width:480px){
  .stat-row { grid-template-columns:1fr!important; }
  .summary-grid { grid-template-columns:1fr!important; }
  .hero-title { font-size:24px!important; }
  .btn { padding:7px 12px!important; font-size:12px!important; }
}
/* ── END 모바일 ── */


/* ── 다크모드 ── */
[data-theme="dark"]{
  --bg:#0d1117;--surface:#161b27;--surface2:#1c2333;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --text:#e8eaf2;--text2:#8b92b3;--text3:#4a5270;
}
[data-theme="dark"] .logo-name,[data-theme="dark"] .page-title{color:var(--text);}
[data-theme="dark"] input,[data-theme="dark"] select,[data-theme="dark"] textarea{background:var(--surface2);color:var(--text);border-color:var(--border2);}
[data-theme="dark"] .header{background:var(--surface);border-color:var(--border);}
/* ── END 다크모드 ── */

</style>

<script>
/* ================================================================
   PCM.js — 공공콘텐츠마켓 공통 상태 관리 모듈 v3
   모든 HTML에서 <\x3cscript src="pcm.js"><\/script>로 로드
   ================================================================ */

const PCM = (() => {
  /* ── 기본 스토리지 ── */
  const KEY = k => 'pcm_' + k;
  const set  = (k, v)  => { try { sessionStorage.setItem(KEY(k), JSON.stringify(v)); } catch(e) {} };
  const get  = (k, d=null) => { try { const v = sessionStorage.getItem(KEY(k)); return v != null ? JSON.parse(v) : d; } catch(e) { return d; } };
  const del  = k => sessionStorage.removeItem(KEY(k));

  /* ── 금액 계산 ── */
  const breakdown = vatIncl => {
    const supply = Math.round(vatIncl / 1.1);
    return { vatIncl, supply, vat: vatIncl - supply, comm: Math.round(supply * 0.05), biz: Math.round(supply * 0.95) };
  };
  const fw  = v => Math.round(v).toLocaleString() + '원';
  const fmw = v => (Math.round(v) / 10000).toLocaleString() + '만원';

  /* ── 과업 / 견적 공유 ── */
  const saveTask   = t => set('currentTask', t);
  const getTask    = ()  => get('currentTask', null);
  const saveQuote  = q => set('latestQuote', q);
  const getQuote   = ()  => get('latestQuote', null);
  const getConfirmedAmount = () => get('confirmedAmount', null);

  /* ── 프로젝트 목록 ── */
  const getProjects = () => get('projects', []);
  const saveProject = p => {
    const list = getProjects();
    const idx = list.findIndex(x => x.id === p.id);
    if (idx >= 0) list[idx] = p; else list.unshift(p);
    set('projects', list.slice(0, 50));
  };

  /* ── 알림 시스템 ── */
  const pushNotif = n => {
    const list = get('notifs', []);
    list.unshift({ id: 'n-' + Date.now(), unread: true, time: '방금', ...n });
    set('notifs', list.slice(0, 50));
    _updateBadge();
  };
  const getNotifs  = () => get('notifs', []);
  const markRead   = () => { set('notifs', getNotifs().map(n => ({ ...n, unread: false }))); _updateBadge(); };
  const unreadCount = () => getNotifs().filter(n => n.unread).length;
  const _updateBadge = () => {
    const cnt = unreadCount();
    document.querySelectorAll('[data-notif-badge]').forEach(el => {
      el.textContent = cnt || '';
      el.style.display = cnt ? '' : 'none';
    });
  };

  /* ── 로딩 버튼 ── */
  const showLoading = (btn, text = '처리 중...') => {
    if (!btn) return;
    btn._origHTML = btn.innerHTML;
    btn.disabled = true;
    if (!document.getElementById('pcmSpinStyle')) {
      const s = document.createElement('style');
      s.id = 'pcmSpinStyle';
      s.textContent = '@keyframes pcmSpin{to{transform:rotate(360deg)}}';
      document.head.appendChild(s);
    }
    btn.innerHTML = `<span style="display:inline-block;width:14px;height:14px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:pcmSpin .7s linear infinite;vertical-align:middle;margin-right:6px;"></span>${text}`;
  };
  const hideLoading = btn => {
    if (btn && btn._origHTML != null) { btn.disabled = false; btn.innerHTML = btn._origHTML; }
  };

  /* ── 토스트 ── */
  const toast = (msg, type = 'info') => {
    const colors = { info: '#1a1f2e', success: '#1a6b4a', error: '#dc3545', warn: '#b45309' };
    const icons  = { info: 'ℹ️', success: '✅', error: '❌', warn: '⚠️' };
    let t = document.getElementById('pcmToast');
    if (!t) {
      t = document.createElement('div');
      t.id = 'pcmToast';
      t.style.cssText = 'position:fixed;bottom:24px;right:24px;border-radius:10px;padding:12px 18px;font-size:13px;font-family:sans-serif;z-index:9999;transition:all .3s;opacity:0;transform:translateY(60px);display:flex;align-items:center;gap:8px;max-width:340px;box-shadow:0 4px 24px rgba(0,0,0,.22);color:#fff;pointer-events:none;';
      document.body.appendChild(t);
    }
    t.style.background = colors[type] || colors.info;
    t.innerHTML = `<span style="flex-shrink:0;">${icons[type] || ''}</span><span>${msg}</span>`;
    t.style.opacity = '1';
    t.style.transform = 'translateY(0)';
    clearTimeout(t._timer);
    t._timer = setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateY(60px)'; }, 3400);
  };

  /* ── 폼 유효성 검사 ── */
  const validate = rules => {
    let ok = true;
    rules.forEach(({ id, label, required, minLen, type: ftype }) => {
      const el = document.getElementById(id);
      if (!el) return;
      const v = (el.value || '').trim();
      let msg = '';
      if (required && !v) msg = `${label}을(를) 입력해주세요.`;
      else if (minLen && v.length < minLen) msg = `${label}은(는) ${minLen}자 이상이어야 합니다.`;
      else if (ftype === 'email' && v && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v)) msg = '올바른 이메일 형식이 아닙니다.';
      let errEl = document.getElementById(id + '-err');
      if (!errEl) {
        errEl = document.createElement('div');
        errEl.id = id + '-err';
        errEl.style.cssText = 'font-size:11px;color:#dc3545;margin-top:3px;';
        if (el.parentNode) el.parentNode.appendChild(errEl);
      }
      if (msg) { ok = false; errEl.textContent = msg; el.style.setProperty('border-color', '#dc3545', 'important'); }
      else { errEl.textContent = ''; el.style.removeProperty('border-color'); }
    });
    return ok;
  };

  /* ── 폼 자동 임시저장 ── */
  const autoSave = (formId, storageKey) => {
    const form = document.getElementById(formId);
    if (!form) return;
    const save = () => {
      const data = {};
      form.querySelectorAll('input, select, textarea').forEach(el => { if (el.id) data[el.id] = el.value; });
      set(storageKey, data);
    };
    form.addEventListener('input', save);
    form.addEventListener('change', save);
    // 새로고침 경고
    window.addEventListener('beforeunload', e => {
      const saved = get(storageKey, {});
      if (Object.values(saved).some(v => v)) {
        e.preventDefault();
        e.returnValue = '작성 중인 내용이 있습니다. 페이지를 떠나시겠습니까?';
      }
    });
    // 기존 임시저장 복원
    const saved = get(storageKey, {});
    if (saved) {
      Object.entries(saved).forEach(([k, v]) => {
        const el = document.getElementById(k);
        if (el && !el.value) el.value = v;
      });
    }
  };

  /* ── 로그아웃 (세션 완전 정리) ── */
  const logout = () => {
    // PCM 키 전부 삭제
    const keys = Object.keys(sessionStorage).filter(k => k.startsWith('pcm_'));
    keys.forEach(k => sessionStorage.removeItem(k));
    // 기타 앱 키
    ['userType', 'userEmail', 'onboarded', 'onboarding_from'].forEach(k => sessionStorage.removeItem(k));
    window.location.href = '로그인.html';
  };

  /* ── 알림 렌더 헬퍼 (마이페이지 등에서 사용) ── */
  const renderNotifList = (containerId) => {
    const el = document.getElementById(containerId);
    if (!el) return;
    const notifs = getNotifs();
    markRead();
    if (!notifs.length) {
      el.innerHTML = '<div style="text-align:center;padding:32px;color:#8492a6;font-size:13px;">알림이 없습니다</div>';
      return;
    }
    el.innerHTML = notifs.slice(0, 20).map(n => `
      <div style="display:flex;gap:12px;padding:14px 0;border-bottom:1px solid rgba(0,0,0,0.08);cursor:pointer;">
        <div style="font-size:20px;flex-shrink:0;">${n.icon || '🔔'}</div>
        <div style="flex:1;">
          <div style="font-size:13px;font-weight:500;margin-bottom:2px;">${n.title || ''}</div>
          <div style="font-size:12px;color:#8492a6;">${n.sub || ''}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
          <div style="font-size:11px;color:#8492a6;white-space:nowrap;">${n.time || ''}</div>
          ${n.unread ? '<div style="width:8px;height:8px;border-radius:50%;background:#1a6b4a;flex-shrink:0;"></div>' : ''}
        </div>
      </div>`).join('');
  };

  /* ── 공개 API ── */
  return {
    set, get, del,
    breakdown, fw, fmw,
    saveTask, getTask, saveQuote, getQuote, getConfirmedAmount,
    saveProject, getProjects,
    pushNotif, getNotifs, markRead, unreadCount, renderNotifList,
    showLoading, hideLoading,
    toast, validate, autoSave, logout,
    _updateBadge,
  };
})();

/* 페이지 로드 시 뱃지 갱신 */
document.addEventListener('DOMContentLoaded', () => PCM._updateBadge());

</script>
</head>
<body>

<div class="header">
  <div class="logo" onclick="nav('로그인.html')">
    <div class="logo-mark">공</div>
    <div class="logo-name">공공콘텐츠마켓</div>
  </div>
  <div class="back-link" onclick="nav('로그인.html')">← 로그인으로</div>
</div>

<div class="main">
  <div class="wrap">
    <div class="card" id="card"></div>
    <div class="login-link">계정이 기억났나요? <a onclick="nav('로그인.html')">로그인하기</a></div>
  </div>
</div>

<script>
function nav(p){window.location.href=p;}

/* ── 다크모드 토글 ── */
(function(){
  var saved = localStorage.getItem('pcm_theme') || 'light';
  document.documentElement.setAttribute('data-theme', saved);
})();
function toggleDarkMode(){
  var cur = document.documentElement.getAttribute('data-theme')||'light';
  var next = cur==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('pcm_theme', next);
  var btn = document.getElementById('dark-toggle');
  if(btn) btn.textContent = next==='dark'?'☀️':'🌙';
}
/* ── END 다크모드 ── */


let step = 1; // 1:이메일입력 2:OTP확인 3:새비밀번호 4:완료
let email = '';
let timer = null;
let timeLeft = 180;

function render(){
  const card = document.getElementById('card');
  const dots = [1,2,3,4].map(i =>
    `<div class="sd ${i<step?'done':i===step?'active':''}"></div>`
  ).join('');

  if(step===1) card.innerHTML = renderStep1(dots);
  else if(step===2) card.innerHTML = renderStep2(dots);
  else if(step===3) card.innerHTML = renderStep3(dots);
  else card.innerHTML = renderStep4();
}

function renderStep1(dots){
  return `
    <div class="step-dots">${dots}</div>
    <div class="card-icon icon-mail">📧</div>
    <div class="card-title">비밀번호 찾기</div>
    <div class="card-sub">가입 시 등록한 이메일 주소를 입력하면<br>인증 코드를 보내드립니다.</div>
    <div class="err-box" id="err">이메일 주소를 확인해주세요.</div>
    <div class="form-group">
      <label>이메일 주소</label>
      <input type="email" id="email-input" placeholder="hong@moenv.go.kr" onkeydown="if(event.key==='Enter')sendOtp()">
    </div>
    <button class="btn-submit" onclick="sendOtp()">인증 코드 발송</button>
    <div class="divider"><div class="dl"></div><div class="dt">또는</div><div class="dl"></div></div>
    <div style="text-align:center;font-size:13px;color:var(--text2);">
      가입한 이메일이 기억나지 않으신가요?<br>
      <a href="mailto:support@pubcontent.kr" style="color:var(--accent);text-decoration:none;">support@pubcontent.kr</a>로 문의해주세요.
    </div>`;
}

function renderStep2(dots){
  return `
    <div class="step-dots">${dots}</div>
    <div class="card-icon icon-mail">📬</div>
    <div class="card-title">인증 코드 확인</div>
    <div class="card-sub"><strong>${email}</strong>으로 발송된<br>6자리 인증 코드를 입력해주세요.</div>
    <div class="err-box" id="err">인증 코드가 올바르지 않습니다.</div>
    <div class="otp-section">
      <input type="text" class="otp-input" id="otp-input" placeholder="000000" maxlength="6" oninput="autoConfirm(this.value)" onkeydown="if(event.key==='Enter')confirmOtp()">
      <div class="otp-timer">남은 시간: <strong id="timer-val">3:00</strong> &nbsp;·&nbsp; <span class="resend-link" onclick="resendOtp()">재발송</span></div>
    </div>
    <button class="btn-submit" id="otp-btn" onclick="confirmOtp()" disabled>확인</button>
    <button class="btn-ghost" onclick="step=1;render()">← 이메일 다시 입력</button>`;
}

function renderStep3(dots){
  return `
    <div class="step-dots">${dots}</div>
    <div class="card-icon icon-lock">🔐</div>
    <div class="card-title">새 비밀번호 설정</div>
    <div class="card-sub">새로운 비밀번호를 입력해주세요.<br>영문, 숫자, 특수문자를 조합한 8자 이상.</div>
    <div class="err-box" id="err">비밀번호가 일치하지 않습니다.</div>
    <div class="form-group">
      <label>새 비밀번호</label>
      <input type="password" id="pw1" placeholder="8자 이상, 영문+숫자+특수문자" oninput="checkPw(this.value)" onkeydown="if(event.key==='Enter')confirmPw()">
      <div class="pw-rows"><div class="pw-row" id="pr1"></div><div class="pw-row" id="pr2"></div><div class="pw-row" id="pr3"></div></div>
      <div class="pw-hint" id="pw-hint" style="color:var(--text3);"></div>
    </div>
    <div class="form-group">
      <label>비밀번호 확인</label>
      <input type="password" id="pw2" placeholder="비밀번호를 다시 입력" onkeydown="if(event.key==='Enter')confirmPw()">
    </div>
    <button class="btn-submit" onclick="confirmPw()">비밀번호 변경 완료</button>`;
}

function renderStep4(){
  return `
    <div class="success-wrap">
      <span class="success-anim">✅</span>
      <div class="card-title">비밀번호 변경 완료!</div>
      <div class="card-sub" style="margin-bottom:24px;">비밀번호가 성공적으로 변경되었습니다.<br>새 비밀번호로 로그인해주세요.</div>
      <button class="btn-submit" onclick="nav('로그인.html')">로그인하러 가기 →</button>
    </div>`;
}

/* ACTIONS */
function sendOtp(){
  const val = document.getElementById('email-input')?.value.trim();
  if(!val || !val.includes('@')){
    document.getElementById('err').classList.add('show');
    document.getElementById('email-input').classList.add('shake');
    setTimeout(()=>document.getElementById('email-input')?.classList.remove('shake'),400);
    return;
  }
  email = val;
  step = 2;
  render();
  startTimer();
  setTimeout(()=>document.getElementById('otp-input')?.focus(),100);
}

function startTimer(){
  timeLeft = 180;
  clearInterval(timer);
  timer = setInterval(()=>{
    timeLeft--;
    const el = document.getElementById('timer-val');
    if(!el){ clearInterval(timer); return; }
    const m = Math.floor(timeLeft/60);
    const s = timeLeft%60;
    el.textContent = `${m}:${s.toString().padStart(2,'0')}`;
    if(timeLeft<=0){
      clearInterval(timer);
      el.textContent = '만료됨';
      el.style.color = 'var(--red)';
    }
  },1000);
}

function autoConfirm(val){
  const btn = document.getElementById('otp-btn');
  if(btn) btn.disabled = val.length !== 6;
}

function confirmOtp(){
  const val = document.getElementById('otp-input')?.value;
  if(val?.length !== 6){
    document.getElementById('err').classList.add('show');
    document.getElementById('otp-input').classList.add('shake');
    setTimeout(()=>document.getElementById('otp-input')?.classList.remove('shake'),400);
    return;
  }
  // 데모: 123456 통과
  if(val === '123456' || val.length === 6){
    clearInterval(timer);
    step = 3;
    render();
    setTimeout(()=>document.getElementById('pw1')?.focus(),100);
  } else {
    document.getElementById('err').classList.add('show');
  }
}

function resendOtp(){
  timeLeft = 180;
  startTimer();
  const el = document.getElementById('timer-val');
  if(el){ el.style.color = ''; }
  alert('인증 코드를 재발송했습니다.');
}

function checkPw(val){
  const bars = [document.getElementById('pr1'),document.getElementById('pr2'),document.getElementById('pr3')];
  const hint = document.getElementById('pw-hint');
  if(!bars[0]) return;
  const checks = [val.length>=8, /[0-9]/.test(val), /[!@#$%^&*]/.test(val)];
  const score = checks.filter(Boolean).length;
  const cls = ['','w','w','m','s'];
  const msg = ['','너무 짧습니다','보통','안전','매우 안전한 비밀번호 ✓'];
  const col = ['','var(--red)','var(--amber)','var(--amber)','var(--accent)'];
  bars.forEach((b,i)=>{ if(b) b.className = 'pw-row' + (i<score ? ` ${cls[score]}` : ''); });
  if(hint){ hint.textContent = msg[score]; hint.style.color = col[score]; }
}

function confirmPw(){
  const pw1 = document.getElementById('pw1')?.value;
  const pw2 = document.getElementById('pw2')?.value;
  const err = document.getElementById('err');
  if(!pw1 || pw1.length < 8){
    err.textContent = '비밀번호는 8자 이상이어야 합니다.';
    err.classList.add('show'); return;
  }
  if(pw1 !== pw2){
    err.textContent = '비밀번호가 일치하지 않습니다.';
    err.classList.add('show');
    document.getElementById('pw2').classList.add('shake');
    setTimeout(()=>document.getElementById('pw2')?.classList.remove('shake'),400);
    return;
  }
  step = 4;
  render();
}

render();
</script>
</body>
</html>
