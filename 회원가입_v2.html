<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>회원가입 — 공공콘텐츠마켓</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@600;700&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
  --bg:#f4f2ed; --surface:#fff; --surface2:#f9f8f5;
  --border:rgba(0,0,0,0.08); --border2:rgba(0,0,0,0.14);
  --text:#1a1f2e; --text2:#4a5568; --text3:#8492a6;
  --accent:#1a6b4a; --accent2:#2d9e72; --accent-light:#e8f5ef;
  --blue:#1a56db; --blue-light:#e8f0fe;
  --purple:#6b46c1; --purple-light:#f3effe;
  --amber:#b45309; --amber-light:#fef3c7;
  --red:#dc3545; --red-light:#fce8e6;
  --serif:'Noto Serif KR',serif; --sans:'Noto Sans KR',sans-serif;
  --mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;min-height:100vh;display:flex;flex-direction:column;}

.header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 32px;height:58px;display:flex;align-items:center;justify-content:space-between;}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.logo-mark{width:28px;height:28px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-weight:700;font-size:12px;color:#fff;}
.logo-name{font-family:var(--serif);font-size:15px;font-weight:700;color:var(--text);}
.header-right{font-size:13px;color:var(--text2);}
.header-right a{color:var(--accent);text-decoration:none;font-weight:500;}

.main{flex:1;display:flex;align-items:flex-start;justify-content:center;padding:40px 24px 64px;}
.container{width:100%;max-width:600px;}

.page-title{font-family:var(--serif);font-size:24px;font-weight:700;text-align:center;margin-bottom:4px;}
.page-sub{font-size:13px;color:var(--text2);text-align:center;margin-bottom:28px;font-weight:300;}

/* STEP BAR */
.step-bar{display:flex;align-items:center;gap:0;margin-bottom:32px;}
.sb-step{display:flex;align-items:center;gap:8px;}
.sb-dot{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;border:2px solid var(--border2);color:var(--text3);background:var(--surface);transition:all 0.2s;flex-shrink:0;}
.sb-dot.active{border-color:var(--accent);background:var(--accent);color:#fff;}
.sb-dot.done{border-color:var(--accent);background:var(--accent-light);color:var(--accent);}
.sb-label{font-size:11px;color:var(--text3);font-weight:500;white-space:nowrap;}
.sb-label.active{color:var(--accent);}
.sb-label.done{color:var(--text2);}
.sb-line{flex:1;height:1px;background:var(--border2);margin:0 6px;min-width:12px;}
.sb-line.done{background:var(--accent);}

/* CARD */
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:14px;}
.form-sec-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);}

/* TYPE CARDS */
.type-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:10px;}
.type-card{border:2px solid var(--border);border-radius:14px;padding:20px 10px;cursor:pointer;text-align:center;transition:all 0.16s;background:var(--surface);position:relative;}
.type-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,0.08);}
.type-card.sel-public {border-color:var(--blue);  background:var(--blue-light);}
.type-card.sel-expert {border-color:var(--purple);background:var(--purple-light);}
.type-card.sel-maker  {border-color:var(--accent);background:var(--accent-light);}
.tc-chk{position:absolute;top:8px;right:8px;width:18px;height:18px;border-radius:50%;display:none;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;}
.type-card.sel-public .tc-chk{display:flex;background:var(--blue);}
.type-card.sel-expert .tc-chk{display:flex;background:var(--purple);}
.type-card.sel-maker  .tc-chk{display:flex;background:var(--accent);}
.tc-icon{font-size:28px;margin-bottom:8px;}
.tc-name{font-size:13px;font-weight:700;margin-bottom:3px;}
.tc-sub{font-size:10px;color:var(--text3);line-height:1.5;}

/* BENEFIT */
.benefit-box{border-radius:10px;padding:12px 16px;margin-bottom:16px;}
.benefit-box.public {background:var(--blue-light);  border:1px solid rgba(26,86,219,0.15);}
.benefit-box.expert {background:var(--purple-light);border:1px solid rgba(107,70,193,0.15);}
.benefit-box.maker  {background:var(--accent-light); border:1px solid rgba(26,107,74,0.15);}
.benefit-title{font-size:12px;font-weight:700;margin-bottom:7px;}
.benefit-box.public  .benefit-title{color:var(--blue);}
.benefit-box.expert  .benefit-title{color:var(--purple);}
.benefit-box.maker   .benefit-title{color:var(--accent);}
.benefit-list{list-style:none;}
.benefit-list li{font-size:12px;color:var(--text2);padding:2px 0 2px 14px;position:relative;}
.benefit-list li::before{content:'✓';position:absolute;left:0;font-size:10px;font-weight:700;}
.benefit-box.public  .benefit-list li::before{color:var(--blue);}
.benefit-box.expert  .benefit-list li::before{color:var(--purple);}
.benefit-box.maker   .benefit-list li::before{color:var(--accent);}

/* FORM */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.fg-full{grid-column:1/-1;}
.form-group{display:flex;flex-direction:column;gap:4px;}
label{font-size:12px;font-weight:500;color:var(--text2);}
.req{color:var(--red);font-size:11px;}
.opt{font-size:10px;color:var(--text3);font-weight:400;}

input[type=text],input[type=email],input[type=password],input[type=tel],input[type=number],select,textarea{
  background:var(--surface2);border:1.5px solid var(--border2);border-radius:8px;
  color:var(--text);font-family:var(--sans);font-size:13px;padding:9px 12px;
  outline:none;width:100%;transition:border-color 0.15s;
}
input:focus,select:focus,textarea:focus{border-color:var(--accent);background:var(--surface);}
input::placeholder,textarea::placeholder{color:var(--text3);}
textarea{resize:vertical;min-height:70px;}
select{cursor:pointer;}

.input-row{display:flex;gap:8px;}
.input-row input,.input-row select{flex:1;}
.side-btn{padding:9px 14px;border-radius:8px;border:1.5px solid var(--border2);background:var(--surface2);color:var(--text2);font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;font-family:var(--sans);transition:all 0.15s;}
.side-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light);}
.side-btn.loading{opacity:0.6;cursor:wait;}

.pw-bars{display:flex;gap:3px;margin-top:4px;}
.pw-bar{flex:1;height:3px;border-radius:2px;background:var(--border);transition:background 0.2s;}
.pw-bar.w{background:var(--red);}
.pw-bar.m{background:var(--amber);}
.pw-bar.s{background:var(--accent);}

/* AI VERIFY BOX */
.verify-box{border:1.5px solid var(--border2);border-radius:10px;padding:16px;margin-top:8px;}
.verify-box-title{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.verify-method{display:flex;flex-direction:column;gap:8px;}
.vm-card{border:1.5px solid var(--border);border-radius:8px;padding:12px 14px;cursor:pointer;transition:all 0.13s;display:flex;align-items:flex-start;gap:12px;}
.vm-card:hover{border-color:var(--accent);}
.vm-card.selected{border-color:var(--accent);background:var(--accent-light);}
.vm-icon{font-size:20px;flex-shrink:0;margin-top:1px;}
.vm-info{}
.vm-name{font-size:13px;font-weight:500;margin-bottom:2px;}
.vm-desc{font-size:11px;color:var(--text3);}
.vm-radio{width:16px;height:16px;border-radius:50%;border:2px solid var(--border2);margin-left:auto;flex-shrink:0;margin-top:3px;transition:all 0.13s;display:flex;align-items:center;justify-content:center;}
.vm-card.selected .vm-radio{border-color:var(--accent);}
.vm-radio-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);display:none;}
.vm-card.selected .vm-radio-dot{display:block;}

.ai-status{margin-top:12px;padding:12px 14px;border-radius:8px;font-size:12px;line-height:1.6;}
.ai-status.idle{background:var(--surface2);color:var(--text3);}
.ai-status.loading{background:var(--amber-light);color:var(--amber);}
.ai-status.ok{background:var(--accent-light);color:var(--accent);font-weight:500;}
.ai-status.fail{background:var(--red-light);color:var(--red);}

/* FILE ZONE */
.file-zone{border:2px dashed var(--border2);border-radius:10px;padding:16px;text-align:center;cursor:pointer;transition:all 0.15s;background:var(--surface2);}
.file-zone:hover{border-color:var(--accent);background:var(--accent-light);}
.file-zone-icon{font-size:22px;margin-bottom:6px;opacity:0.5;}
.file-zone-text{font-size:12px;color:var(--text2);}
.file-zone-sub{font-size:11px;color:var(--text3);margin-top:2px;}
.file-attached{border:1.5px solid var(--accent);background:var(--accent-light);border-radius:8px;padding:10px 14px;display:flex;align-items:center;gap:10px;margin-top:6px;}
.file-attached-name{font-size:12px;font-weight:500;color:var(--accent);flex:1;}
.file-remove{font-size:12px;color:var(--text3);cursor:pointer;border:none;background:none;padding:0;}

/* CAREER BUILDER */
.career-list{display:flex;flex-direction:column;gap:10px;margin-bottom:12px;}
.career-item{background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:14px;}
.career-item-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.career-item-title{font-size:13px;font-weight:700;color:var(--text);}
.career-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.career-remove{border:none;background:rgba(220,53,69,0.08);color:var(--red);border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer;font-family:var(--sans);border:1px solid rgba(220,53,69,0.2);}
.add-career-btn{width:100%;padding:10px;border:2px dashed var(--border2);border-radius:10px;background:transparent;color:var(--text3);font-size:13px;cursor:pointer;font-family:var(--sans);transition:all 0.15s;}
.add-career-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light);}

/* BIZ CODE */
.biz-code-item{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;}
.biz-code-val{font-family:var(--mono);font-size:12px;flex:1;color:var(--text);}
.biz-code-name{font-size:11px;color:var(--text3);}
.biz-code-remove{border:none;background:none;color:var(--text3);cursor:pointer;font-size:14px;padding:0 2px;}

/* PAYMENT */
.payment-box{background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:16px;}
.payment-note{font-size:11px;color:var(--text3);margin-top:8px;line-height:1.5;}

/* CHIPS */
.chip-wrap{display:flex;flex-wrap:wrap;gap:6px;}
.chip{border:1.5px solid var(--border2);border-radius:20px;padding:5px 13px;font-size:12px;color:var(--text2);cursor:pointer;transition:all 0.13s;background:var(--surface);user-select:none;}
.chip:hover{border-color:var(--accent);color:var(--text);}
.chip.on{border-color:var(--accent);background:var(--accent-light);color:var(--accent);font-weight:500;}

/* CHECKBOX */
.check-row{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
.check-row:last-child{border-bottom:none;}
input[type=checkbox]{width:16px;height:16px;margin-top:2px;accent-color:var(--accent);flex-shrink:0;cursor:pointer;}
.check-label{font-size:13px;color:var(--text2);line-height:1.5;cursor:pointer;}
.check-label a{color:var(--accent);text-decoration:none;}
.check-label .csub{font-size:11px;color:var(--text3);display:block;margin-top:2px;}

/* BUTTONS */
.btn-submit{width:100%;padding:13px;border-radius:10px;border:none;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--sans);transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-next{background:var(--accent);color:#fff;}
.btn-next:hover{background:var(--accent2);}
.btn-public{background:var(--blue);color:#fff;}
.btn-public:hover{background:#1447b5;}
.btn-expert{background:var(--purple);color:#fff;}
.btn-expert:hover{background:#5a38a8;}
.btn-maker{background:var(--accent);color:#fff;}
.btn-maker:hover{background:var(--accent2);}
.btn-back{width:100%;padding:10px;border-radius:10px;background:transparent;border:1.5px solid var(--border2);color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;font-family:var(--sans);margin-bottom:8px;transition:all 0.15s;}
.btn-back:hover{background:var(--surface2);}

.login-link{text-align:center;margin-top:18px;font-size:13px;color:var(--text2);}
.login-link a{color:var(--accent);text-decoration:none;font-weight:500;}
.divider{border:none;border-top:1px solid var(--border);margin:16px 0;}
.hint{font-size:11px;color:var(--text3);margin-top:3px;line-height:1.5;}
.tag-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px;}
.mini-tag{font-size:10px;background:var(--accent-light);color:var(--accent);border-radius:10px;padding:2px 8px;font-weight:500;}

/* SUCCESS */
.success-card{text-align:center;padding:36px 28px;}
.success-icon{font-size:48px;margin-bottom:14px;}
.success-title{font-family:var(--serif);font-size:22px;font-weight:700;margin-bottom:8px;}
.success-sub{font-size:14px;color:var(--text2);line-height:1.7;margin-bottom:24px;font-weight:300;}
.ns-list{list-style:none;text-align:left;}
.ns-list li{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px;color:var(--text2);}
.ns-list li:last-child{border-bottom:none;}
.ns-num{width:22px;height:22px;border-radius:50%;background:var(--accent-light);color:var(--accent);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}

@keyframes spin{to{transform:rotate(360deg)}}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;}

/* ── 모바일 반응형 ── */
@media(max-width:768px){
  .layout, .main-layout { grid-template-columns:1fr!important; }
  .sidebar { position:static!important; height:auto!important; border-right:none!important; border-bottom:1px solid var(--border); }
  .preview-panel,.right-panel { display:none; }
  .main,.left-panel,.main-area { padding:16px!important; }
  .stat-row { grid-template-columns:1fr 1fr!important; }
  .header { padding:0 14px!important; }
  .nav-links { display:none!important; }
  .mob-menu-btn { display:flex!important; }
  .form-grid, .spec-grid { grid-template-columns:1fr!important; }
  .type-grid { grid-template-columns:repeat(2,1fr)!important; }
  .score-grid { grid-template-columns:1fr!important; }
  .compare-table { font-size:11px; }
  .compare-table th, .compare-table td { padding:8px 8px!important; }
  .eb-options { grid-template-columns:1fr!important; }
  .sign-grid { grid-template-columns:1fr!important; gap:20px!important; }
  .chat-layout { grid-template-columns:1fr!important; }
  .file-preview-grid { grid-template-columns:1fr 1fr!important; }
  .podium { grid-template-columns:1fr!important; }
  .makers-grid { grid-template-columns:1fr!important; }
  .summary-grid { grid-template-columns:1fr 1fr!important; }
  .ql-grid { grid-template-columns:1fr!important; }
  .filter-panel { display:none; }
  .page { grid-template-columns:1fr!important; }
}
@media(max-width:480px){
  .stat-row { grid-template-columns:1fr!important; }
  .summary-grid { grid-template-columns:1fr!important; }
  .hero-title { font-size:24px!important; }
  .btn { padding:7px 12px!important; font-size:12px!important; }
}
/* ── END 모바일 ── */


/* ── 다크모드 ── */
[data-theme="dark"]{
  --bg:#0d1117;--surface:#161b27;--surface2:#1c2333;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --text:#e8eaf2;--text2:#8b92b3;--text3:#4a5270;
}
[data-theme="dark"] .logo-name,[data-theme="dark"] .page-title{color:var(--text);}
[data-theme="dark"] input,[data-theme="dark"] select,[data-theme="dark"] textarea{background:var(--surface2);color:var(--text);border-color:var(--border2);}
[data-theme="dark"] .header{background:var(--surface);border-color:var(--border);}
/* ── END 다크모드 ── */

</style>

<script>
/* ================================================================
   PCM.js — 공공콘텐츠마켓 공통 상태 관리 모듈 v3
   모든 HTML에서 <\x3cscript src="pcm.js"><\/script>로 로드
   ================================================================ */

const PCM = (() => {
  /* ── 기본 스토리지 ── */
  const KEY = k => 'pcm_' + k;
  const set  = (k, v)  => { try { sessionStorage.setItem(KEY(k), JSON.stringify(v)); } catch(e) {} };
  const get  = (k, d=null) => { try { const v = sessionStorage.getItem(KEY(k)); return v != null ? JSON.parse(v) : d; } catch(e) { return d; } };
  const del  = k => sessionStorage.removeItem(KEY(k));

  /* ── 금액 계산 ── */
  const breakdown = vatIncl => {
    const supply = Math.round(vatIncl / 1.1);
    return { vatIncl, supply, vat: vatIncl - supply, comm: Math.round(supply * 0.05), biz: Math.round(supply * 0.95) };
  };
  const fw  = v => Math.round(v).toLocaleString() + '원';
  const fmw = v => (Math.round(v) / 10000).toLocaleString() + '만원';

  /* ── 과업 / 견적 공유 ── */
  const saveTask   = t => set('currentTask', t);
  const getTask    = ()  => get('currentTask', null);
  const saveQuote  = q => set('latestQuote', q);
  const getQuote   = ()  => get('latestQuote', null);
  const getConfirmedAmount = () => get('confirmedAmount', null);

  /* ── 프로젝트 목록 ── */
  const getProjects = () => get('projects', []);
  const saveProject = p => {
    const list = getProjects();
    const idx = list.findIndex(x => x.id === p.id);
    if (idx >= 0) list[idx] = p; else list.unshift(p);
    set('projects', list.slice(0, 50));
  };

  /* ── 알림 시스템 ── */
  const pushNotif = n => {
    const list = get('notifs', []);
    list.unshift({ id: 'n-' + Date.now(), unread: true, time: '방금', ...n });
    set('notifs', list.slice(0, 50));
    _updateBadge();
  };
  const getNotifs  = () => get('notifs', []);
  const markRead   = () => { set('notifs', getNotifs().map(n => ({ ...n, unread: false }))); _updateBadge(); };
  const unreadCount = () => getNotifs().filter(n => n.unread).length;
  const _updateBadge = () => {
    const cnt = unreadCount();
    document.querySelectorAll('[data-notif-badge]').forEach(el => {
      el.textContent = cnt || '';
      el.style.display = cnt ? '' : 'none';
    });
  };

  /* ── 로딩 버튼 ── */
  const showLoading = (btn, text = '처리 중...') => {
    if (!btn) return;
    btn._origHTML = btn.innerHTML;
    btn.disabled = true;
    if (!document.getElementById('pcmSpinStyle')) {
      const s = document.createElement('style');
      s.id = 'pcmSpinStyle';
      s.textContent = '@keyframes pcmSpin{to{transform:rotate(360deg)}}';
      document.head.appendChild(s);
    }
    btn.innerHTML = `<span style="display:inline-block;width:14px;height:14px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:pcmSpin .7s linear infinite;vertical-align:middle;margin-right:6px;"></span>${text}`;
  };
  const hideLoading = btn => {
    if (btn && btn._origHTML != null) { btn.disabled = false; btn.innerHTML = btn._origHTML; }
  };

  /* ── 토스트 ── */
  const toast = (msg, type = 'info') => {
    const colors = { info: '#1a1f2e', success: '#1a6b4a', error: '#dc3545', warn: '#b45309' };
    const icons  = { info: 'ℹ️', success: '✅', error: '❌', warn: '⚠️' };
    let t = document.getElementById('pcmToast');
    if (!t) {
      t = document.createElement('div');
      t.id = 'pcmToast';
      t.style.cssText = 'position:fixed;bottom:24px;right:24px;border-radius:10px;padding:12px 18px;font-size:13px;font-family:sans-serif;z-index:9999;transition:all .3s;opacity:0;transform:translateY(60px);display:flex;align-items:center;gap:8px;max-width:340px;box-shadow:0 4px 24px rgba(0,0,0,.22);color:#fff;pointer-events:none;';
      document.body.appendChild(t);
    }
    t.style.background = colors[type] || colors.info;
    t.innerHTML = `<span style="flex-shrink:0;">${icons[type] || ''}</span><span>${msg}</span>`;
    t.style.opacity = '1';
    t.style.transform = 'translateY(0)';
    clearTimeout(t._timer);
    t._timer = setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateY(60px)'; }, 3400);
  };

  /* ── 폼 유효성 검사 ── */
  const validate = rules => {
    let ok = true;
    rules.forEach(({ id, label, required, minLen, type: ftype }) => {
      const el = document.getElementById(id);
      if (!el) return;
      const v = (el.value || '').trim();
      let msg = '';
      if (required && !v) msg = `${label}을(를) 입력해주세요.`;
      else if (minLen && v.length < minLen) msg = `${label}은(는) ${minLen}자 이상이어야 합니다.`;
      else if (ftype === 'email' && v && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v)) msg = '올바른 이메일 형식이 아닙니다.';
      let errEl = document.getElementById(id + '-err');
      if (!errEl) {
        errEl = document.createElement('div');
        errEl.id = id + '-err';
        errEl.style.cssText = 'font-size:11px;color:#dc3545;margin-top:3px;';
        if (el.parentNode) el.parentNode.appendChild(errEl);
      }
      if (msg) { ok = false; errEl.textContent = msg; el.style.setProperty('border-color', '#dc3545', 'important'); }
      else { errEl.textContent = ''; el.style.removeProperty('border-color'); }
    });
    return ok;
  };

  /* ── 폼 자동 임시저장 ── */
  const autoSave = (formId, storageKey) => {
    const form = document.getElementById(formId);
    if (!form) return;
    const save = () => {
      const data = {};
      form.querySelectorAll('input, select, textarea').forEach(el => { if (el.id) data[el.id] = el.value; });
      set(storageKey, data);
    };
    form.addEventListener('input', save);
    form.addEventListener('change', save);
    // 새로고침 경고
    window.addEventListener('beforeunload', e => {
      const saved = get(storageKey, {});
      if (Object.values(saved).some(v => v)) {
        e.preventDefault();
        e.returnValue = '작성 중인 내용이 있습니다. 페이지를 떠나시겠습니까?';
      }
    });
    // 기존 임시저장 복원
    const saved = get(storageKey, {});
    if (saved) {
      Object.entries(saved).forEach(([k, v]) => {
        const el = document.getElementById(k);
        if (el && !el.value) el.value = v;
      });
    }
  };

  /* ── 로그아웃 (세션 완전 정리) ── */
  const logout = () => {
    // PCM 키 전부 삭제
    const keys = Object.keys(sessionStorage).filter(k => k.startsWith('pcm_'));
    keys.forEach(k => sessionStorage.removeItem(k));
    // 기타 앱 키
    ['userType', 'userEmail', 'onboarded', 'onboarding_from'].forEach(k => sessionStorage.removeItem(k));
    window.location.href = '로그인.html';
  };

  /* ── 알림 렌더 헬퍼 (마이페이지 등에서 사용) ── */
  const renderNotifList = (containerId) => {
    const el = document.getElementById(containerId);
    if (!el) return;
    const notifs = getNotifs();
    markRead();
    if (!notifs.length) {
      el.innerHTML = '<div style="text-align:center;padding:32px;color:#8492a6;font-size:13px;">알림이 없습니다</div>';
      return;
    }
    el.innerHTML = notifs.slice(0, 20).map(n => `
      <div style="display:flex;gap:12px;padding:14px 0;border-bottom:1px solid rgba(0,0,0,0.08);cursor:pointer;">
        <div style="font-size:20px;flex-shrink:0;">${n.icon || '🔔'}</div>
        <div style="flex:1;">
          <div style="font-size:13px;font-weight:500;margin-bottom:2px;">${n.title || ''}</div>
          <div style="font-size:12px;color:#8492a6;">${n.sub || ''}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
          <div style="font-size:11px;color:#8492a6;white-space:nowrap;">${n.time || ''}</div>
          ${n.unread ? '<div style="width:8px;height:8px;border-radius:50%;background:#1a6b4a;flex-shrink:0;"></div>' : ''}
        </div>
      </div>`).join('');
  };

  /* ── 공개 API ── */
  return {
    set, get, del,
    breakdown, fw, fmw,
    saveTask, getTask, saveQuote, getQuote, getConfirmedAmount,
    saveProject, getProjects,
    pushNotif, getNotifs, markRead, unreadCount, renderNotifList,
    showLoading, hideLoading,
    toast, validate, autoSave, logout,
    _updateBadge,
  };
})();

/* 페이지 로드 시 뱃지 갱신 */
document.addEventListener('DOMContentLoaded', () => PCM._updateBadge());

</script>

// ── HELPERS ───────────────────────────────────────────
function fileZone(key, accept) {
  const f = S.attachedFiles[key];
  if (f) return `
    <div class="file-attached">
      <span style="font-size:16px;">📄</span>
      <span class="file-attached-name">${f}</span>
      <button class="file-remove" onclick="removeFile('${key}')">✕</button>
    </div>`;
  return `
    <div class="file-zone" onclick="attachFile('${key}')">
      <div class="file-zone-icon">⬆</div>
      <div class="file-zone-text">${accept} 파일을 업로드하세요</div>
      <div class="file-zone-sub">최대 10MB</div>
    </div>`;
}

function navBtns() {
  return `
    <button class="btn-back" onclick="prevStep()">← 이전 단계</button>
    <button class="btn-submit btn-next" onclick="nextStep()">다음 단계 →</button>`;
}

// ── ACTIONS ───────────────────────────────────────────
function selType(type) { S.type=type; render(); }

function nextStep() {
  if(S.step===0&&!S.type) return;
  // 1단계 유효성 검사
  if(S.step===1) {
    const nameEl=document.getElementById('name');
    const emailEl=document.getElementById('email');
    const pwEl=document.getElementById('pw');
    if(nameEl&&!nameEl.value.trim()){ if(typeof PCM!=='undefined') PCM.toast('이름을 입력해주세요','error'); return; }
    if(emailEl&&!emailEl.value.trim()){ if(typeof PCM!=='undefined') PCM.toast('이메일을 입력해주세요','error'); return; }
    if(pwEl&&pwEl.value.length<8){ if(typeof PCM!=='undefined') PCM.toast('비밀번호는 8자 이상이어야 합니다','error'); return; }
  }
  S.step++; render(); scrollTo(0,0);
}
function prevStep() { S.step=Math.max(0,S.step-1); render(); scrollTo(0,0); }

function selVerify(method) { S.verifyMethod=method; S.verifyStatus='idle'; render(); }

function runAiVerify() {
  S.verifyStatus='loading';
  render();
  setTimeout(()=>{
    // 시뮬레이션: 80% 성공
    S.verifyStatus = Math.random()>0.2 ? 'ok' : 'fail';
    render();
  }, 2200);
}

function attachFile(key) {
  const names = {bizReg:'사업자등록증_사본.pdf', bankbook:'통장사본.jpg', womanCert:'여성기업확인서.pdf', card:'명함_홍길동.jpg', health:'건강보험자격득실확인서.pdf'};
  S.attachedFiles[key] = names[key] || '첨부파일.pdf';
  render();
}

function removeFile(key) { delete S.attachedFiles[key]; render(); }

function addCareer() { S.careers.push({company:'',title:'',from:'',to:'',desc:''}); render(); }
function removeCareer(i) { S.careers.splice(i,1); render(); }
function updateCareer(i,k,v) { S.careers[i][k]=v; }

function addBizCode() {
  const inp = document.getElementById('biz-code-input');
  if (!inp) return;
  const code = inp.value.trim();
  if (!code) return;
  const known = BIZ_CODE_EXAMPLES.find(b=>b.code===code);
  S.bizCodes.push({code, name:known?known.name:'기타 업종'});
  inp.value='';
  render();
}
function quickBizCode(code, name) { S.bizCodes.push({code,name}); render(); }
function removeBizCode(i) { S.bizCodes.splice(i,1); render(); }

function toggleChip(key, val) {
  if(!S.chips[key]) S.chips[key]=[];
  const i=S.chips[key].indexOf(val);
  i>=0?S.chips[key].splice(i,1):S.chips[key].push(val);
  render();
}

function checkPw(val) {
  const b=[document.getElementById('pb1'),document.getElementById('pb2'),document.getElementById('pb3')];
  if(!b[0])return;
  const s=[val.length>=8,/\d/.test(val),/[!@#$%^&*]/.test(val)].filter(Boolean).length;
  const cls=['','w','w','m','s'];
  b.forEach((bar,i)=>{ if(bar) bar.className='pw-bar'+(i<s?` ${cls[s]}`:''); });
}

function chkAll(v) { document.querySelectorAll('.chk-item').forEach(c=>c.checked=v); }
function verifyEmail() { alert('인증 메일을 발송했습니다.\n(실제 서비스에서 이메일로 인증 링크가 전송됩니다)'); }
function verifyBiz() { alert('사업자등록번호가 확인되었습니다.\n(실제 서비스에서 국세청 API로 실시간 조회됩니다)'); }

function doSubmit() {
  const required = document.querySelectorAll('#chk-terms, #chk-privacy');
  let ok = true;
  required.forEach(c=>{ if(!c.checked) ok=false; });
  if(!ok){ alert('[필수] 항목에 동의해주세요.'); return; }
  if(S.type==='maker'){
    const fee=document.getElementById('chk-fee');
    if(fee&&!fee.checked){ alert('[필수] 플랫폼 수수료 정책에 동의해주세요.'); return; }
  }
  if(S.type==='expert'){
    const panel=document.getElementById('chk-panel');
    if(panel&&!panel.checked){ alert('[필수] 검수 패널 운영 정책에 동의해주세요.'); return; }
  }
  S.step=4; render(); scrollTo(0,0);
}

render();
</script>

<script>
function nav(p){window.location.href=p;}

/* ── 다크모드 토글 ── */
(function(){
  var saved = localStorage.getItem('pcm_theme') || 'light';
  document.documentElement.setAttribute('data-theme', saved);
})();
function toggleDarkMode(){
  var cur = document.documentElement.getAttribute('data-theme')||'light';
  var next = cur==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('pcm_theme', next);
  var btn = document.getElementById('dark-toggle');
  if(btn) btn.textContent = next==='dark'?'☀️':'🌙';
}
/* ── END 다크모드 ── */

</script>
