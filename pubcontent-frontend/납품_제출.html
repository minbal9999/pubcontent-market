<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>납품 제출 — 공공콘텐츠마켓</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@600;700&family=JetBrains+Mono:wght@400;500&display=swap');
:root{
  --bg:#f4f2ed;--surface:#fff;--surface2:#f9f8f5;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);
  --text:#1a1f2e;--text2:#4a5568;--text3:#8492a6;
  --accent:#1a6b4a;--accent2:#2d9e72;--accent-light:#e8f5ef;
  --amber:#b45309;--amber-light:#fef3c7;
  --blue:#1a56db;--blue-light:#e8f0fe;
  --red:#dc3545;--red-light:#fce8e6;
  --serif:'Noto Serif KR',serif;--sans:'Noto Sans KR',sans-serif;
  --mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;min-height:100vh;}

.header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.logo{display:flex;align-items:center;gap:10px;cursor:pointer;}
.logo-mark{width:28px;height:28px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-weight:700;font-size:12px;color:#fff;}
.logo-name{font-family:var(--serif);font-size:14px;font-weight:700;}
.logo-role{font-size:11px;color:var(--text3);background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:2px 8px;margin-left:6px;}
.btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:none;font-family:var(--sans);transition:all .15s;display:inline-flex;align-items:center;gap:6px;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{background:var(--accent2);}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--text2);}
.btn-ghost:hover{background:var(--surface2);}
.btn-sm{padding:5px 12px;font-size:12px;}

/* STEP BAR */
.step-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:0;}
.si{display:flex;align-items:center;gap:7px;}
.si-dot{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;border:2px solid var(--border2);color:var(--text3);background:var(--surface);transition:all .2s;flex-shrink:0;}
.si-dot.done{border-color:var(--accent);background:var(--accent-light);color:var(--accent);}
.si-dot.active{border-color:var(--accent);background:var(--accent);color:#fff;}
.si-label{font-size:12px;color:var(--text3);}
.si-label.active{color:var(--accent);font-weight:600;}
.si-label.done{color:var(--text2);}
.si-line{flex:1;height:1px;background:var(--border2);margin:0 10px;max-width:60px;}
.si-line.done{background:var(--accent);}

.main{max-width:800px;margin:0 auto;padding:32px 24px;}
.page-title{font-family:var(--serif);font-size:22px;font-weight:700;margin-bottom:4px;}
.page-sub{font-size:13px;color:var(--text2);font-weight:300;margin-bottom:24px;}

/* 과업 요약 */
.task-bar{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 20px;margin-bottom:24px;display:flex;align-items:center;gap:16px;}
.tb-icon{font-size:26px;flex-shrink:0;}
.tb-info{flex:1;}
.tb-title{font-size:14px;font-weight:700;margin-bottom:3px;}
.tb-meta{font-size:12px;color:var(--text2);display:flex;gap:14px;flex-wrap:wrap;}
.tb-deadline{font-family:var(--mono);font-size:13px;font-weight:700;}
.deadline-ok{color:var(--accent);}
.deadline-warn{color:var(--amber);}
.deadline-over{color:var(--red);}
.revision-badge{display:flex;align-items:center;gap:6px;background:var(--accent-light);border-radius:8px;padding:5px 12px;font-size:12px;color:var(--accent);font-weight:500;}

/* CARD */
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:22px;margin-bottom:16px;}
.card-title{font-size:14px;font-weight:700;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.card-num{width:22px;height:22px;border-radius:50%;background:var(--accent-light);color:var(--accent);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;}

/* FILE UPLOAD */
.file-drop-zone{border:2px dashed var(--border2);border-radius:12px;padding:32px;text-align:center;cursor:pointer;transition:all .2s;background:var(--surface2);position:relative;}
.file-drop-zone:hover,.file-drop-zone.drag{border-color:var(--accent);background:var(--accent-light);}
.fz-icon{font-size:36px;margin-bottom:10px;opacity:.5;}
.fz-title{font-size:14px;font-weight:600;color:var(--text2);margin-bottom:4px;}
.fz-sub{font-size:12px;color:var(--text3);}
.fz-browse{color:var(--accent);font-weight:500;text-decoration:underline;cursor:pointer;}

.file-list{display:flex;flex-direction:column;gap:8px;margin-top:12px;}
.file-item{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 14px;}
.fi-icon{font-size:20px;flex-shrink:0;}
.fi-info{flex:1;min-width:0;}
.fi-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.fi-size{font-size:11px;color:var(--text3);}
.fi-progress{margin-top:4px;height:3px;background:var(--border);border-radius:2px;overflow:hidden;}
.fi-bar{height:100%;background:var(--accent);border-radius:2px;transition:width .4s;}
.fi-remove{background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;padding:0 4px;flex-shrink:0;transition:color .13s;}
.fi-remove:hover{color:var(--red);}
.fi-done{color:var(--accent);font-size:14px;flex-shrink:0;}

/* CHECKLIST */
.checklist{display:flex;flex-direction:column;gap:8px;}
.cl-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;transition:all .13s;background:var(--surface);}
.cl-item:hover{border-color:var(--accent);}
.cl-item.checked{border-color:var(--accent);background:var(--accent-light);}
.cl-box{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;margin-top:1px;transition:all .13s;}
.cl-item.checked .cl-box{background:var(--accent);border-color:var(--accent);color:#fff;}
.cl-text{font-size:13px;color:var(--text2);}
.cl-item.checked .cl-text{color:var(--text);font-weight:500;}

/* FORM */
.form-group{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;}
.form-group:last-child{margin-bottom:0;}
label{font-size:12px;font-weight:500;color:var(--text2);}
input,select,textarea{background:var(--surface2);border:1.5px solid var(--border2);border-radius:8px;color:var(--text);font-family:var(--sans);font-size:13px;padding:10px 12px;outline:none;width:100%;transition:border-color .15s;}
input:focus,select:focus,textarea:focus{border-color:var(--accent);background:var(--surface);}
input::placeholder,textarea::placeholder{color:var(--text3);}
textarea{resize:vertical;min-height:90px;}
.char-count{font-size:11px;color:var(--text3);text-align:right;margin-top:3px;}

/* NOTICE BOX */
.notice{border-radius:10px;padding:14px 16px;margin-bottom:16px;display:flex;gap:12px;align-items:flex-start;}
.notice-info{background:var(--blue-light);border:1px solid rgba(26,86,219,.15);}
.notice-warn{background:var(--amber-light);border:1px solid rgba(180,83,9,.2);}
.notice-icon{font-size:16px;flex-shrink:0;margin-top:1px;}
.notice-text{font-size:12px;line-height:1.65;}
.notice-info .notice-text{color:var(--blue);}
.notice-warn .notice-text{color:var(--amber);}

/* SUBMIT CONFIRM */
.submit-confirm{background:linear-gradient(135deg,rgba(26,107,74,.06),rgba(26,107,74,.02));border:1.5px solid rgba(26,107,74,.18);border-radius:12px;padding:20px;margin-bottom:16px;}
.sc-title{font-size:14px;font-weight:700;margin-bottom:12px;color:var(--accent);}
.sc-row{display:flex;justify-content:space-between;padding:6px 0;font-size:13px;border-bottom:1px solid var(--border);}
.sc-row:last-child{border-bottom:none;}
.sc-key{color:var(--text3);}
.sc-val{font-weight:500;}
.sc-val.accent{color:var(--accent);font-family:var(--mono);}

/* PROGRESS OVERLAY */
.submit-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s;}
.submit-overlay.show{opacity:1;pointer-events:all;}
.submit-modal{background:var(--surface);border-radius:16px;padding:36px;text-align:center;width:360px;}
.sm-icon{font-size:48px;margin-bottom:14px;}
.sm-title{font-family:var(--serif);font-size:20px;font-weight:700;margin-bottom:6px;}
.sm-sub{font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:20px;}
.sm-progress{background:var(--surface2);border-radius:8px;height:6px;overflow:hidden;margin-bottom:8px;}
.sm-bar{height:100%;background:var(--accent);border-radius:8px;transition:width 1s ease;}
.sm-step{font-size:12px;color:var(--text3);}

.nav-bottom{display:flex;justify-content:space-between;align-items:center;margin-top:24px;padding-top:18px;border-top:1px solid var(--border);}
.toast{position:fixed;bottom:24px;right:24px;background:var(--text);color:#fff;border-radius:10px;padding:11px 16px;font-size:13px;transform:translateY(60px);opacity:0;transition:all .3s;z-index:300;}
.toast.show{transform:translateY(0);opacity:1;}

/* ── 모바일 반응형 ── */
@media(max-width:768px){
  .layout, .main-layout { grid-template-columns:1fr!important; }
  .sidebar { position:static!important; height:auto!important; border-right:none!important; border-bottom:1px solid var(--border); }
  .preview-panel,.right-panel { display:none; }
  .main,.left-panel,.main-area { padding:16px!important; }
  .stat-row { grid-template-columns:1fr 1fr!important; }
  .header { padding:0 14px!important; }
  .nav-links { display:none!important; }
  .mob-menu-btn { display:flex!important; }
  .form-grid, .spec-grid { grid-template-columns:1fr!important; }
  .type-grid { grid-template-columns:repeat(2,1fr)!important; }
  .score-grid { grid-template-columns:1fr!important; }
  .compare-table { font-size:11px; }
  .compare-table th, .compare-table td { padding:8px 8px!important; }
  .eb-options { grid-template-columns:1fr!important; }
  .sign-grid { grid-template-columns:1fr!important; gap:20px!important; }
  .chat-layout { grid-template-columns:1fr!important; }
  .file-preview-grid { grid-template-columns:1fr 1fr!important; }
  .podium { grid-template-columns:1fr!important; }
  .makers-grid { grid-template-columns:1fr!important; }
  .summary-grid { grid-template-columns:1fr 1fr!important; }
  .ql-grid { grid-template-columns:1fr!important; }
  .filter-panel { display:none; }
  .page { grid-template-columns:1fr!important; }
}
@media(max-width:480px){
  .stat-row { grid-template-columns:1fr!important; }
  .summary-grid { grid-template-columns:1fr!important; }
  .hero-title { font-size:24px!important; }
  .btn { padding:7px 12px!important; font-size:12px!important; }
}
/* ── END 모바일 ── */


/* ── 다크모드 ── */
[data-theme="dark"]{
  --bg:#0d1117;--surface:#161b27;--surface2:#1c2333;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --text:#e8eaf2;--text2:#8b92b3;--text3:#4a5270;
}
[data-theme="dark"] .logo-name,[data-theme="dark"] .page-title{color:var(--text);}
[data-theme="dark"] input,[data-theme="dark"] select,[data-theme="dark"] textarea{background:var(--surface2);color:var(--text);border-color:var(--border2);}
[data-theme="dark"] .header{background:var(--surface);border-color:var(--border);}
/* ── END 다크모드 ── */

</style>

<script>
/* ================================================================
   PCM.js — 공공콘텐츠마켓 공통 상태 관리 모듈 v3
   모든 HTML에서 <\x3cscript src="pcm.js"><\/script>로 로드
   ================================================================ */

const PCM = (() => {
  /* ── 기본 스토리지 ── */
  const KEY = k => 'pcm_' + k;
  const set  = (k, v)  => { try { sessionStorage.setItem(KEY(k), JSON.stringify(v)); } catch(e) {} };
  const get  = (k, d=null) => { try { const v = sessionStorage.getItem(KEY(k)); return v != null ? JSON.parse(v) : d; } catch(e) { return d; } };
  const del  = k => sessionStorage.removeItem(KEY(k));

  /* ── 금액 계산 ── */
  const breakdown = vatIncl => {
    const supply = Math.round(vatIncl / 1.1);
    return { vatIncl, supply, vat: vatIncl - supply, comm: Math.round(supply * 0.05), biz: Math.round(supply * 0.95) };
  };
  const fw  = v => Math.round(v).toLocaleString() + '원';
  const fmw = v => (Math.round(v) / 10000).toLocaleString() + '만원';

  /* ── 과업 / 견적 공유 ── */
  const saveTask   = t => set('currentTask', t);
  const getTask    = ()  => get('currentTask', null);
  const saveQuote  = q => set('latestQuote', q);
  const getQuote   = ()  => get('latestQuote', null);
  const getConfirmedAmount = () => get('confirmedAmount', null);

  /* ── 프로젝트 목록 ── */
  const getProjects = () => get('projects', []);
  const saveProject = p => {
    const list = getProjects();
    const idx = list.findIndex(x => x.id === p.id);
    if (idx >= 0) list[idx] = p; else list.unshift(p);
    set('projects', list.slice(0, 50));
  };

  /* ── 알림 시스템 ── */
  const pushNotif = n => {
    const list = get('notifs', []);
    list.unshift({ id: 'n-' + Date.now(), unread: true, time: '방금', ...n });
    set('notifs', list.slice(0, 50));
    _updateBadge();
  };
  const getNotifs  = () => get('notifs', []);
  const markRead   = () => { set('notifs', getNotifs().map(n => ({ ...n, unread: false }))); _updateBadge(); };
  const unreadCount = () => getNotifs().filter(n => n.unread).length;
  const _updateBadge = () => {
    const cnt = unreadCount();
    document.querySelectorAll('[data-notif-badge]').forEach(el => {
      el.textContent = cnt || '';
      el.style.display = cnt ? '' : 'none';
    });
  };

  /* ── 로딩 버튼 ── */
  const showLoading = (btn, text = '처리 중...') => {
    if (!btn) return;
    btn._origHTML = btn.innerHTML;
    btn.disabled = true;
    if (!document.getElementById('pcmSpinStyle')) {
      const s = document.createElement('style');
      s.id = 'pcmSpinStyle';
      s.textContent = '@keyframes pcmSpin{to{transform:rotate(360deg)}}';
      document.head.appendChild(s);
    }
    btn.innerHTML = `<span style="display:inline-block;width:14px;height:14px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:pcmSpin .7s linear infinite;vertical-align:middle;margin-right:6px;"></span>${text}`;
  };
  const hideLoading = btn => {
    if (btn && btn._origHTML != null) { btn.disabled = false; btn.innerHTML = btn._origHTML; }
  };

  /* ── 토스트 ── */
  const toast = (msg, type = 'info') => {
    const colors = { info: '#1a1f2e', success: '#1a6b4a', error: '#dc3545', warn: '#b45309' };
    const icons  = { info: 'ℹ️', success: '✅', error: '❌', warn: '⚠️' };
    let t = document.getElementById('pcmToast');
    if (!t) {
      t = document.createElement('div');
      t.id = 'pcmToast';
      t.style.cssText = 'position:fixed;bottom:24px;right:24px;border-radius:10px;padding:12px 18px;font-size:13px;font-family:sans-serif;z-index:9999;transition:all .3s;opacity:0;transform:translateY(60px);display:flex;align-items:center;gap:8px;max-width:340px;box-shadow:0 4px 24px rgba(0,0,0,.22);color:#fff;pointer-events:none;';
      document.body.appendChild(t);
    }
    t.style.background = colors[type] || colors.info;
    t.innerHTML = `<span style="flex-shrink:0;">${icons[type] || ''}</span><span>${msg}</span>`;
    t.style.opacity = '1';
    t.style.transform = 'translateY(0)';
    clearTimeout(t._timer);
    t._timer = setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateY(60px)'; }, 3400);
  };

  /* ── 폼 유효성 검사 ── */
  const validate = rules => {
    let ok = true;
    rules.forEach(({ id, label, required, minLen, type: ftype }) => {
      const el = document.getElementById(id);
      if (!el) return;
      const v = (el.value || '').trim();
      let msg = '';
      if (required && !v) msg = `${label}을(를) 입력해주세요.`;
      else if (minLen && v.length < minLen) msg = `${label}은(는) ${minLen}자 이상이어야 합니다.`;
      else if (ftype === 'email' && v && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v)) msg = '올바른 이메일 형식이 아닙니다.';
      let errEl = document.getElementById(id + '-err');
      if (!errEl) {
        errEl = document.createElement('div');
        errEl.id = id + '-err';
        errEl.style.cssText = 'font-size:11px;color:#dc3545;margin-top:3px;';
        if (el.parentNode) el.parentNode.appendChild(errEl);
      }
      if (msg) { ok = false; errEl.textContent = msg; el.style.setProperty('border-color', '#dc3545', 'important'); }
      else { errEl.textContent = ''; el.style.removeProperty('border-color'); }
    });
    return ok;
  };

  /* ── 폼 자동 임시저장 ── */
  const autoSave = (formId, storageKey) => {
    const form = document.getElementById(formId);
    if (!form) return;
    const save = () => {
      const data = {};
      form.querySelectorAll('input, select, textarea').forEach(el => { if (el.id) data[el.id] = el.value; });
      set(storageKey, data);
    };
    form.addEventListener('input', save);
    form.addEventListener('change', save);
    // 새로고침 경고
    window.addEventListener('beforeunload', e => {
      const saved = get(storageKey, {});
      if (Object.values(saved).some(v => v)) {
        e.preventDefault();
        e.returnValue = '작성 중인 내용이 있습니다. 페이지를 떠나시겠습니까?';
      }
    });
    // 기존 임시저장 복원
    const saved = get(storageKey, {});
    if (saved) {
      Object.entries(saved).forEach(([k, v]) => {
        const el = document.getElementById(k);
        if (el && !el.value) el.value = v;
      });
    }
  };

  /* ── 로그아웃 (세션 완전 정리) ── */
  const logout = () => {
    // PCM 키 전부 삭제
    const keys = Object.keys(sessionStorage).filter(k => k.startsWith('pcm_'));
    keys.forEach(k => sessionStorage.removeItem(k));
    // 기타 앱 키
    ['userType', 'userEmail', 'onboarded', 'onboarding_from'].forEach(k => sessionStorage.removeItem(k));
    window.location.href = '로그인.html';
  };

  /* ── 알림 렌더 헬퍼 (마이페이지 등에서 사용) ── */
  const renderNotifList = (containerId) => {
    const el = document.getElementById(containerId);
    if (!el) return;
    const notifs = getNotifs();
    markRead();
    if (!notifs.length) {
      el.innerHTML = '<div style="text-align:center;padding:32px;color:#8492a6;font-size:13px;">알림이 없습니다</div>';
      return;
    }
    el.innerHTML = notifs.slice(0, 20).map(n => `
      <div style="display:flex;gap:12px;padding:14px 0;border-bottom:1px solid rgba(0,0,0,0.08);cursor:pointer;">
        <div style="font-size:20px;flex-shrink:0;">${n.icon || '🔔'}</div>
        <div style="flex:1;">
          <div style="font-size:13px;font-weight:500;margin-bottom:2px;">${n.title || ''}</div>
          <div style="font-size:12px;color:#8492a6;">${n.sub || ''}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
          <div style="font-size:11px;color:#8492a6;white-space:nowrap;">${n.time || ''}</div>
          ${n.unread ? '<div style="width:8px;height:8px;border-radius:50%;background:#1a6b4a;flex-shrink:0;"></div>' : ''}
        </div>
      </div>`).join('');
  };

  /* ── 공개 API ── */
  return {
    set, get, del,
    breakdown, fw, fmw,
    saveTask, getTask, saveQuote, getQuote, getConfirmedAmount,
    saveProject, getProjects,
    pushNotif, getNotifs, markRead, unreadCount, renderNotifList,
    showLoading, hideLoading,
    toast, validate, autoSave, logout,
    _updateBadge,
  };
})();

/* 페이지 로드 시 뱃지 갱신 */
document.addEventListener('DOMContentLoaded', () => PCM._updateBadge());

</script>
<script src="api.js"></script>
</head>
<body>

<div class="header">
  <div style="display:flex;align-items:center;">
    <div class="logo" onclick="nav('마이페이지_콘텐츠사.html')">
      <div class="logo-mark">공</div>
      <div class="logo-name">공공콘텐츠마켓</div>
      <span class="logo-role">콘텐츠사</span>
    </div>
  </div>
  <div style="display:flex;gap:8px;align-items:center;">
    <span style="font-size:12px;color:var(--text3);">㈜ 그린스튜디오</span>
    <button class="btn btn-ghost btn-sm" onclick="nav('마이페이지_콘텐츠사.html')">← 마이페이지</button>
  </div>
</div>

<div class="step-bar">
  <div class="si"><div class="si-dot done" id="sd1">✓</div><span class="si-label done" id="sl1">계약 체결</span></div>
  <div class="si-line done"></div>
  <div class="si"><div class="si-dot done" id="sd2">✓</div><span class="si-label done" id="sl2">에스크로 예치</span></div>
  <div class="si-line done"></div>
  <div class="si"><div class="si-dot done" id="sd3">✓</div><span class="si-label done" id="sl3">제작</span></div>
  <div class="si-line done"></div>
  <div class="si"><div class="si-dot active" id="sd4">4</div><span class="si-label active" id="sl4">납품 제출</span></div>
  <div class="si-line"></div>
  <div class="si"><div class="si-dot" id="sd5">5</div><span class="si-label" id="sl5">검수</span></div>
  <div class="si-line"></div>
  <div class="si"><div class="si-dot" id="sd6">6</div><span class="si-label" id="sl6">최종 승인</span></div>
</div>

<div class="main" id="main-content"></div>

<div class="submit-overlay" id="submit-overlay">
  <div class="submit-modal">
    <div class="sm-icon" id="sm-icon">⬆️</div>
    <div class="sm-title" id="sm-title">납품물 업로드 중</div>
    <div class="sm-sub" id="sm-sub">파일을 안전하게 전송하고 있습니다.<br>잠시만 기다려주세요.</div>
    <div class="sm-progress"><div class="sm-bar" id="sm-bar" style="width:0%"></div></div>
    <div class="sm-step" id="sm-step">준비 중...</div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
function nav(p){window.location.href=p;}

// 납품 제출 API 연동
const _origSubmitDelivery = typeof submitDelivery === 'function' ? submitDelivery : null;
async function submitDelivery() {
  const projectId   = PCM.get('currentTask')?.projectId || null;
  const description = document.getElementById('delivery-desc')?.value || '납품물 제출';

  if (API.isLoggedIn() && projectId) {
    const res = await API.deliveries.submit(projectId, description, []);
    if (res?.success || res === null) {
      PCM.toast('납품물이 제출되었습니다. 검수가 시작됩니다.', 'success');
      PCM.pushNotif({icon:'📦',title:'납품 완료',sub:'검수 진행 중입니다.',time:'방금'});
      setTimeout(() => nav('검수_결과.html'), 1500);
    }
  } else {
    if (_origSubmitDelivery) _origSubmitDelivery();
    else {
      PCM.toast('납품물이 제출되었습니다.', 'success');
      PCM.pushNotif({icon:'📦',title:'납품 완료',sub:'검수 진행 중입니다.',time:'방금'});
      setTimeout(() => nav('검수_결과.html'), 1500);
    }
  }
}


/* ── 다크모드 토글 ── */
(function(){
  var saved = localStorage.getItem('pcm_theme') || 'light';
  document.documentElement.setAttribute('data-theme', saved);
})();
function toggleDarkMode(){
  var cur = document.documentElement.getAttribute('data-theme')||'light';
  var next = cur==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('pcm_theme', next);
  var btn = document.getElementById('dark-toggle');
  if(btn) btn.textContent = next==='dark'?'☀️':'🌙';
}
/* ── END 다크모드 ── */


const TASK = {
  id: 'TRX-001',
  icon: '📊',
  title: '탄소중립 SNS 카드뉴스 제작',
  org: '환경부 홍보기획과',
  deadline: '2025.05.10',
  daysLeft: 5,
  budget: 1800,
  revisionsLeft: 2,
  deliverables: ['원본 PSD/AI 파일','JPG 300dpi 완성본','SNS 최적화본 (1:1, 4:5, 9:16)'],
  checkItems: ['공공언어 가이드라인 준수','정부 시각 디자인 적용','오탈자·수치 검수','저작권 이미지 확인','색상 접근성(명도비) 확인'],
};

let files = [];
let checkedItems = new Set();
let step = 1;

function render() {
  document.getElementById('main-content').innerHTML =
    renderTaskBar() + (step === 1 ? renderStep1() : renderStep2());
}

function renderTaskBar() {
  const dCls = TASK.daysLeft <= 0 ? 'deadline-over' : TASK.daysLeft <= 3 ? 'deadline-warn' : 'deadline-ok';
  const dLabel = TASK.daysLeft <= 0 ? '납기 초과!' : `D-${TASK.daysLeft}`;
  return `
    <div class="task-bar">
      <div class="tb-icon">${TASK.icon}</div>
      <div class="tb-info">
        <div class="tb-title">${TASK.title}</div>
        <div class="tb-meta">
          <span>📍 ${TASK.org}</span>
          <span>📅 납기 ${TASK.deadline}</span>
        </div>
      </div>
      <div class="tb-deadline ${dCls}">${dLabel}</div>
      <div class="revision-badge">🔄 수정 ${TASK.revisionsLeft}회 남음</div>
    </div>`;
}

function renderStep1() {
  const allChecked = TASK.checkItems.every((_,i) => checkedItems.has(i));
  return `
    <div class="page-title">납품물 제출</div>
    <div class="page-sub">파일을 업로드하고 납품 체크리스트를 확인하면 AI 자동 검수가 시작됩니다</div>

    <div class="notice notice-info">
      <div class="notice-icon">ℹ️</div>
      <div class="notice-text">납품 제출 후 <strong>AI 자동 검수(즉시)</strong> → <strong>전문가 검수(48시간 내)</strong> → <strong>발주처 최종 승인</strong> 순서로 진행됩니다. 검수 통과 전까지 에스크로 대금은 보관됩니다.</div>
    </div>

    <!-- 파일 업로드 -->
    <div class="card">
      <div class="card-title"><div class="card-num">1</div>납품 파일 업로드 <span style="font-size:11px;color:var(--text3);font-weight:400;">(필수)</span></div>
      <div class="file-drop-zone" id="drop-zone"
        ondragover="event.preventDefault();this.classList.add('drag')"
        ondragleave="this.classList.remove('drag')"
        ondrop="handleDrop(event)"
        onclick="triggerFileInput()">
        <div class="fz-icon">📂</div>
        <div class="fz-title">파일을 여기에 드래그하거나 <span class="fz-browse">클릭하여 선택</span></div>
        <div class="fz-sub">PDF · PSD · AI · JPG · PNG · MP4 · ZIP 지원 · 파일당 최대 500MB</div>
      </div>
      <input type="file" id="file-input" style="display:none" multiple onchange="handleFileSelect(this)">
      <div class="file-list" id="file-list"></div>
      <div style="margin-top:10px;font-size:11px;color:var(--text3);">
        납품 필수 파일: ${TASK.deliverables.map(d=>`<span style="background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:1px 7px;margin-left:4px;">${d}</span>`).join('')}
      </div>
    </div>

    <!-- 납품 체크리스트 -->
    <div class="card">
      <div class="card-title"><div class="card-num">2</div>납품 전 자가 점검 <span style="font-size:11px;color:var(--text3);font-weight:400;">(모두 확인 필요)</span></div>
      <div class="checklist">
        ${TASK.checkItems.map((item, i) => `
          <div class="cl-item ${checkedItems.has(i)?'checked':''}" onclick="toggleCheck(${i})">
            <div class="cl-box">${checkedItems.has(i)?'✓':''}</div>
            <span class="cl-text">${item}</span>
          </div>`).join('')}
      </div>
      <div style="margin-top:12px;display:flex;align-items:center;gap:8px;font-size:12px;color:${allChecked?'var(--accent)':'var(--text3)'};">
        <span>${allChecked?'✓ 모든 항목 확인 완료':'아직 확인하지 않은 항목이 있습니다'}</span>
        <span style="margin-left:auto;font-family:var(--mono);">${checkedItems.size}/${TASK.checkItems.length}</span>
      </div>
    </div>

    <!-- 납품 메모 -->
    <div class="card">
      <div class="card-title"><div class="card-num">3</div>납품 메모 <span style="font-size:11px;color:var(--text3);font-weight:400;">(선택)</span></div>
      <div class="form-group">
        <label>발주처에게 전달할 내용</label>
        <textarea id="memo" placeholder="납품물 설명, 특이 사항, 파일 구조 안내 등을 입력하세요." oninput="updateCharCount(this)" maxlength="500"></textarea>
        <div class="char-count"><span id="char-count">0</span>/500</div>
      </div>
      <div class="form-group">
        <label>버전 정보</label>
        <input type="text" id="version" placeholder="예: v1.0 최초 납품" value="v1.0 최초 납품">
      </div>
    </div>

    <div class="nav-bottom">
      <button class="btn btn-ghost" onclick="nav('마이페이지_콘텐츠사.html')">← 취소</button>
      <button class="btn btn-primary" onclick="goStep2()" ${files.length===0||!allChecked?'disabled':''}>
        납품 내용 확인 →
      </button>
    </div>`;
}

function renderStep2() {
  const memo = document.getElementById ? (document.getElementById('memo')?.value||'') : '';
  return `
    <div class="page-title">납품 최종 확인</div>
    <div class="page-sub">아래 내용을 확인하고 제출하면 즉시 AI 검수가 시작됩니다</div>

    <div class="submit-confirm">
      <div class="sc-title">📋 납품 요약</div>
      <div class="sc-row"><span class="sc-key">과업</span><span class="sc-val">${TASK.title}</span></div>
      <div class="sc-row"><span class="sc-key">발주처</span><span class="sc-val">${TASK.org}</span></div>
      <div class="sc-row"><span class="sc-key">납품 파일</span><span class="sc-val accent">${files.length}개 파일</span></div>
      <div class="sc-row"><span class="sc-key">자가점검</span><span class="sc-val" style="color:var(--accent);">✓ ${TASK.checkItems.length}개 항목 확인 완료</span></div>
      <div class="sc-row"><span class="sc-key">버전</span><span class="sc-val">v1.0 최초 납품</span></div>
      <div class="sc-row"><span class="sc-key">남은 수정 횟수</span><span class="sc-val">${TASK.revisionsLeft}회</span></div>
    </div>

    <div class="card" style="margin-bottom:14px;">
      <div class="card-title" style="margin-bottom:10px;">📁 업로드 파일 목록</div>
      ${files.map(f=>`
        <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);">
          <span style="font-size:18px;">${getFileIcon(f.name)}</span>
          <span style="font-size:13px;font-weight:500;flex:1;">${f.name}</span>
          <span style="font-size:11px;color:var(--text3);">${formatSize(f.size)}</span>
          <span style="color:var(--accent);font-size:13px;">✓</span>
        </div>`).join('')}
    </div>

    <div class="notice notice-warn">
      <div class="notice-icon">⚠️</div>
      <div class="notice-text">
        납품 제출 후 <strong>취소할 수 없습니다.</strong> AI 검수 중 문제가 발견되면 수정 요청이 올 수 있으며, 수정 기회는 <strong>총 ${TASK.revisionsLeft}회</strong>입니다. 수정 횟수 초과 시 분쟁 처리 절차로 이관됩니다.
      </div>
    </div>

    <div class="nav-bottom">
      <button class="btn btn-ghost" onclick="step=1;render()">← 다시 확인</button>
      <button class="btn btn-primary" style="padding:11px 28px;" onclick="submitDelivery()">
        🚀 납품 제출 확정
      </button>
    </div>`;
}

// ─── ACTIONS ────────────────────────────────────────
function triggerFileInput(){ document.getElementById('file-input').click(); }

function handleFileSelect(input){
  Array.from(input.files).forEach(f => addFile(f));
  render();
}

function handleDrop(e){
  e.preventDefault();
  document.getElementById('drop-zone').classList.remove('drag');
  Array.from(e.dataTransfer.files).forEach(f => addFile(f));
  render();
}

function addFile(f){
  if(files.find(x=>x.name===f.name)) return;
  files.push({ name:f.name, size:f.size, progress:100 });
}

function removeFile(idx){ files.splice(idx,1); render(); }

function getFileIcon(name){
  const ext = name.split('.').pop().toLowerCase();
  const map = {psd:'🎨',ai:'🎨',pdf:'📄',jpg:'🖼',jpeg:'🖼',png:'🖼',mp4:'🎬',mov:'🎬',zip:'📦',gif:'🎞'};
  return map[ext] || '📄';
}
function formatSize(b){ return b>1024*1024 ? (b/1024/1024).toFixed(1)+'MB' : (b/1024).toFixed(0)+'KB'; }

function toggleCheck(i){
  checkedItems.has(i) ? checkedItems.delete(i) : checkedItems.add(i);
  render();
}

function updateCharCount(el){
  document.getElementById('char-count').textContent = el.value.length;
}

function goStep2(){
  if(files.length===0){ showToast('납품 파일을 1개 이상 업로드해주세요'); return; }
  if(TASK.checkItems.length !== checkedItems.size){ showToast('자가 점검 항목을 모두 확인해주세요'); return; }
  step = 2;
  render();
  window.scrollTo(0,0);
}

function submitDelivery(){
  const btn=document.querySelector('.btn-primary[onclick*="submitDelivery"]');
  if(typeof PCM!=='undefined') PCM.showLoading(btn,'납품 제출 중...');
  const overlay = document.getElementById('submit-overlay');
  const bar = document.getElementById('sm-bar');
  const stepEl = document.getElementById('sm-step');
  overlay.classList.add('show');

  const steps = [
    [10,'파일 업로드 중...'],
    [35,'파일 검증 중...'],
    [60,'메타데이터 처리 중...'],
    [80,'AI 검수 대기열 등록 중...'],
    [100,'완료!'],
  ];

  let i = 0;
  const interval = setInterval(() => {
    if(i >= steps.length){
      clearInterval(interval);
      document.getElementById('sm-icon').textContent = '✅';
      document.getElementById('sm-title').textContent = '납품 제출 완료!';
      document.getElementById('sm-sub').textContent = 'AI 자동 검수가 시작되었습니다.\n결과는 보통 30분 내 안내됩니다.';
      setTimeout(() => {
        overlay.classList.remove('show');
        PCM.toast('납품물이 제출되었습니다. 검수가 시작됩니다.', 'success');
  PCM.pushNotif({icon:'📦',title:'납품 제출 완료',sub:'AI 자동 검수가 시작되었습니다. 결과를 기다려주세요.',time:'방금'}); nav('검수_결과.html');
      }, 2000);
      return;
    }
    bar.style.width = steps[i][0] + '%';
    stepEl.textContent = steps[i][1];
    i++;
  }, 600);
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// 샘플 파일 미리 추가
files = [
  {name:'탄소중립_카드뉴스_원본.psd', size:45*1024*1024, progress:100},
  {name:'탄소중립_카드뉴스_JPG_300dpi.zip', size:18*1024*1024, progress:100},
  {name:'탄소중립_카드뉴스_SNS최적화.zip', size:8*1024*1024, progress:100},
];
TASK.checkItems.forEach((_,i)=>checkedItems.add(i));

render();
PCM.autoSave('main-content','taskDraft');
</script>
</body>
</html>
