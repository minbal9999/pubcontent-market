<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 백오피스 — 공공콘텐츠마켓</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@600;700&family=JetBrains+Mono:wght@400;500&display=swap');
:root{
  --bg:#0d1117;--surface:#161b27;--surface2:#1e2535;--surface3:#242d42;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --text:#e8eaf2;--text2:#8b92b3;--text3:#4a5270;
  --accent:#1dd9a0;--accent2:#0fb87f;--accent-dim:rgba(29,217,160,0.12);
  --amber:#f5c842;--amber-dim:rgba(245,200,66,0.12);
  --red:#ff4d6a;--red-dim:rgba(255,77,106,0.12);
  --blue:#4f7cff;--blue-dim:rgba(79,124,255,0.12);
  --purple:#a07cfc;--purple-dim:rgba(160,124,252,0.12);
  --serif:'Noto Serif KR',serif;--sans:'Noto Sans KR',sans-serif;
  --mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;min-height:100vh;}
.header{background:rgba(13,17,23,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 24px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo{display:flex;align-items:center;gap:10px;cursor:pointer;}
.logo-mark{width:28px;height:28px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-weight:700;font-size:12px;color:#0d1117;}
.logo-name{font-family:var(--serif);font-size:14px;font-weight:700;}
.admin-badge{font-size:10px;background:var(--red-dim);color:var(--red);border:1px solid rgba(255,77,106,.25);border-radius:6px;padding:2px 8px;font-weight:600;margin-left:8px;}
.btn{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;border:none;font-family:var(--sans);transition:all .15s;display:inline-flex;align-items:center;gap:5px;}
.btn-accent{background:var(--accent);color:#0d1117;font-weight:700;}
.btn-accent:hover{background:var(--accent2);}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--text2);}
.btn-ghost:hover{background:var(--surface2);}
.btn-danger{background:var(--red-dim);color:var(--red);border:1px solid rgba(255,77,106,.2);}
.btn-approve{background:var(--accent-dim);color:var(--accent);border:1px solid rgba(29,217,160,.2);}
.btn-sm{padding:4px 10px;font-size:11px;}

.layout{display:grid;grid-template-columns:220px 1fr;min-height:calc(100vh - 58px);}
.sidebar{background:var(--surface);border-right:1px solid var(--border);padding:20px 14px;position:sticky;top:58px;height:calc(100vh - 58px);display:flex;flex-direction:column;}
.menu-section{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin:14px 0 6px;padding:0 8px;}
.menu-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:7px;cursor:pointer;font-size:13px;color:var(--text2);transition:all .13s;margin-bottom:1px;}
.menu-item:hover{background:var(--surface2);color:var(--text);}
.menu-item.active{background:var(--accent-dim);color:var(--accent);font-weight:500;}
.mi-icon{font-size:14px;width:18px;text-align:center;}
.mi-badge{margin-left:auto;font-size:10px;font-weight:700;padding:1px 6px;border-radius:8px;}
.mb-red{background:var(--red-dim);color:var(--red);}
.mb-amber{background:var(--amber-dim);color:var(--amber);}
.mb-accent{background:var(--accent-dim);color:var(--accent);}

.main{padding:24px;}
.section-title{font-family:var(--serif);font-size:20px;font-weight:700;margin-bottom:4px;}
.section-sub{font-size:13px;color:var(--text2);margin-bottom:20px;font-weight:300;}

/* STAT */
.stat-row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:24px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;}
.sc-icon{font-size:20px;margin-bottom:6px;}
.sc-val{font-family:var(--mono);font-size:22px;font-weight:700;margin-bottom:2px;}
.sc-label{font-size:10px;color:var(--text3);}
.sc-trend{font-size:10px;margin-top:3px;}
.trend-up{color:var(--accent);}
.trend-down{color:var(--red);}

/* TABLE */
.data-table{width:100%;border-collapse:collapse;background:var(--surface);border-radius:10px;overflow:hidden;border:1px solid var(--border);}
.data-table th{padding:10px 14px;text-align:left;font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border);background:var(--surface2);}
.data-table td{padding:12px 14px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle;}
.data-table tr:last-child td{border-bottom:none;}
.data-table tr:hover td{background:var(--surface2);}

.status-chip{font-size:10px;padding:3px 9px;border-radius:8px;font-weight:600;white-space:nowrap;}
.chip-pending{background:var(--amber-dim);color:var(--amber);}
.chip-active{background:var(--accent-dim);color:var(--accent);}
.chip-reject{background:var(--red-dim);color:var(--red);}
.chip-dispute{background:var(--red-dim);color:var(--red);}
.chip-settle{background:var(--blue-dim);color:var(--blue);}
.chip-done{background:var(--accent-dim);color:var(--accent);}

.user-cell{display:flex;align-items:center;gap:8px;}
.user-avatar{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;background:var(--surface2);}
.user-name{font-size:13px;font-weight:500;}
.user-sub{font-size:11px;color:var(--text3);}

/* FILTER ROW */
.filter-row{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.filter-input{background:var(--surface2);border:1px solid var(--border2);border-radius:7px;color:var(--text);font-family:var(--sans);font-size:12px;padding:7px 12px;outline:none;width:200px;}
.filter-input:focus{border-color:var(--accent);}
.filter-select{background:var(--surface2);border:1px solid var(--border2);border-radius:7px;color:var(--text);font-family:var(--sans);font-size:12px;padding:7px 12px;outline:none;cursor:pointer;}

/* CHART MINI */
.mini-chart{display:flex;align-items:flex-end;gap:3px;height:40px;}
.mc-bar{background:var(--accent-dim);border-radius:3px 3px 0 0;flex:1;min-width:6px;transition:background .13s;cursor:pointer;}
.mc-bar:hover{background:var(--accent);}

/* DISPUTE CARD */
.dispute-card{background:var(--surface);border:1px solid rgba(255,77,106,.2);border-radius:10px;padding:16px;margin-bottom:10px;}
.dc-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:10px;}
.dc-title{font-size:13px;font-weight:700;margin-bottom:3px;}
.dc-meta{font-size:11px;color:var(--text3);}
.dc-body{font-size:12px;color:var(--text2);background:var(--surface2);border-radius:6px;padding:10px;margin-bottom:10px;line-height:1.6;}
.dc-actions{display:flex;gap:6px;}

/* ESCROW TABLE */
.escrow-row-highlight{background:rgba(245,200,66,.04);}

/* ── 모바일 반응형 ── */
@media(max-width:768px){
  .layout, .main-layout { grid-template-columns:1fr!important; }
  .sidebar { position:static!important; height:auto!important; border-right:none!important; border-bottom:1px solid var(--border); }
  .preview-panel,.right-panel { display:none; }
  .main,.left-panel,.main-area { padding:16px!important; }
  .stat-row { grid-template-columns:1fr 1fr!important; }
  .header { padding:0 14px!important; }
  .nav-links { display:none!important; }
  .mob-menu-btn { display:flex!important; }
  .form-grid, .spec-grid { grid-template-columns:1fr!important; }
  .type-grid { grid-template-columns:repeat(2,1fr)!important; }
  .score-grid { grid-template-columns:1fr!important; }
  .compare-table { font-size:11px; }
  .compare-table th, .compare-table td { padding:8px 8px!important; }
  .eb-options { grid-template-columns:1fr!important; }
  .sign-grid { grid-template-columns:1fr!important; gap:20px!important; }
  .chat-layout { grid-template-columns:1fr!important; }
  .file-preview-grid { grid-template-columns:1fr 1fr!important; }
  .podium { grid-template-columns:1fr!important; }
  .makers-grid { grid-template-columns:1fr!important; }
  .summary-grid { grid-template-columns:1fr 1fr!important; }
  .ql-grid { grid-template-columns:1fr!important; }
  .filter-panel { display:none; }
  .page { grid-template-columns:1fr!important; }
}
@media(max-width:480px){
  .stat-row { grid-template-columns:1fr!important; }
  .summary-grid { grid-template-columns:1fr!important; }
  .hero-title { font-size:24px!important; }
  .btn { padding:7px 12px!important; font-size:12px!important; }
}
/* ── END 모바일 ── */


/* ── 다크모드 ── */
[data-theme="dark"]{
  --bg:#0d1117;--surface:#161b27;--surface2:#1c2333;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --text:#e8eaf2;--text2:#8b92b3;--text3:#4a5270;
}
[data-theme="dark"] .logo-name,[data-theme="dark"] .page-title{color:var(--text);}
[data-theme="dark"] input,[data-theme="dark"] select,[data-theme="dark"] textarea{background:var(--surface2);color:var(--text);border-color:var(--border2);}
[data-theme="dark"] .header{background:var(--surface);border-color:var(--border);}
/* ── END 다크모드 ── */

</style>

<script>
/* ================================================================
   PCM.js — 공공콘텐츠마켓 공통 상태 관리 모듈 v3
   모든 HTML에서 <\x3cscript src="pcm.js"><\/script>로 로드
   ================================================================ */

const PCM = (() => {
  /* ── 기본 스토리지 ── */
  const KEY = k => 'pcm_' + k;
  const set  = (k, v)  => { try { sessionStorage.setItem(KEY(k), JSON.stringify(v)); } catch(e) {} };
  const get  = (k, d=null) => { try { const v = sessionStorage.getItem(KEY(k)); return v != null ? JSON.parse(v) : d; } catch(e) { return d; } };
  const del  = k => sessionStorage.removeItem(KEY(k));

  /* ── 금액 계산 ── */
  const breakdown = vatIncl => {
    const supply = Math.round(vatIncl / 1.1);
    return { vatIncl, supply, vat: vatIncl - supply, comm: Math.round(supply * 0.05), biz: Math.round(supply * 0.95) };
  };
  const fw  = v => Math.round(v).toLocaleString() + '원';
  const fmw = v => (Math.round(v) / 10000).toLocaleString() + '만원';

  /* ── 과업 / 견적 공유 ── */
  const saveTask   = t => set('currentTask', t);
  const getTask    = ()  => get('currentTask', null);
  const saveQuote  = q => set('latestQuote', q);
  const getQuote   = ()  => get('latestQuote', null);
  const getConfirmedAmount = () => get('confirmedAmount', null);

  /* ── 프로젝트 목록 ── */
  const getProjects = () => get('projects', []);
  const saveProject = p => {
    const list = getProjects();
    const idx = list.findIndex(x => x.id === p.id);
    if (idx >= 0) list[idx] = p; else list.unshift(p);
    set('projects', list.slice(0, 50));
  };

  /* ── 알림 시스템 ── */
  const pushNotif = n => {
    const list = get('notifs', []);
    list.unshift({ id: 'n-' + Date.now(), unread: true, time: '방금', ...n });
    set('notifs', list.slice(0, 50));
    _updateBadge();
  };
  const getNotifs  = () => get('notifs', []);
  const markRead   = () => { set('notifs', getNotifs().map(n => ({ ...n, unread: false }))); _updateBadge(); };
  const unreadCount = () => getNotifs().filter(n => n.unread).length;
  const _updateBadge = () => {
    const cnt = unreadCount();
    document.querySelectorAll('[data-notif-badge]').forEach(el => {
      el.textContent = cnt || '';
      el.style.display = cnt ? '' : 'none';
    });
  };

  /* ── 로딩 버튼 ── */
  const showLoading = (btn, text = '처리 중...') => {
    if (!btn) return;
    btn._origHTML = btn.innerHTML;
    btn.disabled = true;
    if (!document.getElementById('pcmSpinStyle')) {
      const s = document.createElement('style');
      s.id = 'pcmSpinStyle';
      s.textContent = '@keyframes pcmSpin{to{transform:rotate(360deg)}}';
      document.head.appendChild(s);
    }
    btn.innerHTML = `<span style="display:inline-block;width:14px;height:14px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:pcmSpin .7s linear infinite;vertical-align:middle;margin-right:6px;"></span>${text}`;
  };
  const hideLoading = btn => {
    if (btn && btn._origHTML != null) { btn.disabled = false; btn.innerHTML = btn._origHTML; }
  };

  /* ── 토스트 ── */
  const toast = (msg, type = 'info') => {
    const colors = { info: '#1a1f2e', success: '#1a6b4a', error: '#dc3545', warn: '#b45309' };
    const icons  = { info: 'ℹ️', success: '✅', error: '❌', warn: '⚠️' };
    let t = document.getElementById('pcmToast');
    if (!t) {
      t = document.createElement('div');
      t.id = 'pcmToast';
      t.style.cssText = 'position:fixed;bottom:24px;right:24px;border-radius:10px;padding:12px 18px;font-size:13px;font-family:sans-serif;z-index:9999;transition:all .3s;opacity:0;transform:translateY(60px);display:flex;align-items:center;gap:8px;max-width:340px;box-shadow:0 4px 24px rgba(0,0,0,.22);color:#fff;pointer-events:none;';
      document.body.appendChild(t);
    }
    t.style.background = colors[type] || colors.info;
    t.innerHTML = `<span style="flex-shrink:0;">${icons[type] || ''}</span><span>${msg}</span>`;
    t.style.opacity = '1';
    t.style.transform = 'translateY(0)';
    clearTimeout(t._timer);
    t._timer = setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateY(60px)'; }, 3400);
  };

  /* ── 폼 유효성 검사 ── */
  const validate = rules => {
    let ok = true;
    rules.forEach(({ id, label, required, minLen, type: ftype }) => {
      const el = document.getElementById(id);
      if (!el) return;
      const v = (el.value || '').trim();
      let msg = '';
      if (required && !v) msg = `${label}을(를) 입력해주세요.`;
      else if (minLen && v.length < minLen) msg = `${label}은(는) ${minLen}자 이상이어야 합니다.`;
      else if (ftype === 'email' && v && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v)) msg = '올바른 이메일 형식이 아닙니다.';
      let errEl = document.getElementById(id + '-err');
      if (!errEl) {
        errEl = document.createElement('div');
        errEl.id = id + '-err';
        errEl.style.cssText = 'font-size:11px;color:#dc3545;margin-top:3px;';
        if (el.parentNode) el.parentNode.appendChild(errEl);
      }
      if (msg) { ok = false; errEl.textContent = msg; el.style.setProperty('border-color', '#dc3545', 'important'); }
      else { errEl.textContent = ''; el.style.removeProperty('border-color'); }
    });
    return ok;
  };

  /* ── 폼 자동 임시저장 ── */
  const autoSave = (formId, storageKey) => {
    const form = document.getElementById(formId);
    if (!form) return;
    const save = () => {
      const data = {};
      form.querySelectorAll('input, select, textarea').forEach(el => { if (el.id) data[el.id] = el.value; });
      set(storageKey, data);
    };
    form.addEventListener('input', save);
    form.addEventListener('change', save);
    // 새로고침 경고
    window.addEventListener('beforeunload', e => {
      const saved = get(storageKey, {});
      if (Object.values(saved).some(v => v)) {
        e.preventDefault();
        e.returnValue = '작성 중인 내용이 있습니다. 페이지를 떠나시겠습니까?';
      }
    });
    // 기존 임시저장 복원
    const saved = get(storageKey, {});
    if (saved) {
      Object.entries(saved).forEach(([k, v]) => {
        const el = document.getElementById(k);
        if (el && !el.value) el.value = v;
      });
    }
  };

  /* ── 로그아웃 (세션 완전 정리) ── */
  const logout = () => {
    // PCM 키 전부 삭제
    const keys = Object.keys(sessionStorage).filter(k => k.startsWith('pcm_'));
    keys.forEach(k => sessionStorage.removeItem(k));
    // 기타 앱 키
    ['userType', 'userEmail', 'onboarded', 'onboarding_from'].forEach(k => sessionStorage.removeItem(k));
    window.location.href = '로그인.html';
  };

  /* ── 알림 렌더 헬퍼 (마이페이지 등에서 사용) ── */
  const renderNotifList = (containerId) => {
    const el = document.getElementById(containerId);
    if (!el) return;
    const notifs = getNotifs();
    markRead();
    if (!notifs.length) {
      el.innerHTML = '<div style="text-align:center;padding:32px;color:#8492a6;font-size:13px;">알림이 없습니다</div>';
      return;
    }
    el.innerHTML = notifs.slice(0, 20).map(n => `
      <div style="display:flex;gap:12px;padding:14px 0;border-bottom:1px solid rgba(0,0,0,0.08);cursor:pointer;">
        <div style="font-size:20px;flex-shrink:0;">${n.icon || '🔔'}</div>
        <div style="flex:1;">
          <div style="font-size:13px;font-weight:500;margin-bottom:2px;">${n.title || ''}</div>
          <div style="font-size:12px;color:#8492a6;">${n.sub || ''}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
          <div style="font-size:11px;color:#8492a6;white-space:nowrap;">${n.time || ''}</div>
          ${n.unread ? '<div style="width:8px;height:8px;border-radius:50%;background:#1a6b4a;flex-shrink:0;"></div>' : ''}
        </div>
      </div>`).join('');
  };

  /* ── 공개 API ── */
  return {
    set, get, del,
    breakdown, fw, fmw,
    saveTask, getTask, saveQuote, getQuote, getConfirmedAmount,
    saveProject, getProjects,
    pushNotif, getNotifs, markRead, unreadCount, renderNotifList,
    showLoading, hideLoading,
    toast, validate, autoSave, logout,
    _updateBadge,
  };
})();

/* 페이지 로드 시 뱃지 갱신 */
document.addEventListener('DOMContentLoaded', () => PCM._updateBadge());

</script>
</head>
<body>
<div class="header">
  <div style="display:flex;align-items:center;gap:12px;">
    <div class="logo" onclick="nav('랜딩페이지.html')">
      <div class="logo-mark">공</div>
      <div class="logo-name">공공콘텐츠마켓</div>
    </div>
    <span class="admin-badge">🔐 관리자</span>
  </div>
  <div style="display:flex;align-items:center;gap:8px;">
    <div style="font-size:12px;color:var(--text3);">admin@pubcontent.kr</div>
    <button class="btn btn-ghost" onclick="PCM.logout()">로그아웃</button>
  </div>
</div>

<div class="layout">
  <div class="sidebar">
    <div class="menu-section">대시보드</div>
    <div class="menu-item active" id="m-overview" onclick="show('overview')"><span class="mi-icon">📊</span>전체 현황</div>

    <div class="menu-section">회원 관리</div>
    <div class="menu-item" id="m-approve" onclick="show('approve')"><span class="mi-icon">✅</span>가입 승인<span class="mi-badge mb-red">4</span></div>
    <div class="menu-item" id="m-members" onclick="show('members')"><span class="mi-icon">👥</span>전체 회원</div>

    <div class="menu-section">거래 관리</div>
    <div class="menu-item" id="m-escrow" onclick="show('escrow')"><span class="mi-icon">🔒</span>에스크로 현황<span class="mi-badge mb-amber">7</span></div>
    <div class="menu-item" id="m-dispute" onclick="show('dispute')"><span class="mi-icon">⚠️</span>분쟁 처리<span class="mi-badge mb-red">2</span></div>
    <div class="menu-item" id="m-settle" onclick="show('settle')"><span class="mi-icon">💰</span>정산 관리</div>

    <div class="menu-section">플랫폼</div>
    <div class="menu-item" id="m-price" onclick="show('price')"><span class="mi-icon">📈</span>표준단가 관리</div>
    <div class="menu-item" id="m-log" onclick="show('log')"><span class="mi-icon">📋</span>감사 로그</div>

    <div style="margin-top:auto;padding-top:14px;border-top:1px solid var(--border);">
      <div style="font-size:10px;color:var(--text3);padding:0 8px;">v1.0.0 · 공공콘텐츠마켓</div>
    </div>
  </div>

  <div class="main" id="main-area"></div>
</div>

<script>
function nav(p){window.location.href=p;}

/* ── 다크모드 토글 ── */
(function(){
  var saved = localStorage.getItem('pcm_theme') || 'light';
  document.documentElement.setAttribute('data-theme', saved);
})();
function toggleDarkMode(){
  var cur = document.documentElement.getAttribute('data-theme')||'light';
  var next = cur==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('pcm_theme', next);
  var btn = document.getElementById('dark-toggle');
  if(btn) btn.textContent = next==='dark'?'☀️':'🌙';
}
/* ── END 다크모드 ── */

}

function render(){
  const el=document.getElementById('main-area');
  if(current==='overview') el.innerHTML=renderOverview();
  else if(current==='approve') el.innerHTML=renderApprove();
  else if(current==='members') el.innerHTML=renderMembers();

}

        }).join('')}

    </table>`;
}
