<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>견적서 검토 — 공공콘텐츠마켓</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@600;700&family=JetBrains+Mono:wght@400;500&display=swap');
:root{
  --bg:#f4f2ed;--surface:#fff;--surface2:#f9f8f5;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);
  --text:#1a1f2e;--text2:#4a5568;--text3:#8492a6;
  --accent:#1a6b4a;--accent2:#2d9e72;--accent-light:#e8f5ef;
  --amber:#b45309;--amber-light:#fef3c7;
  --blue:#1a56db;--blue-light:#e8f0fe;
  --red:#dc3545;--red-light:#fce8e6;
  --serif:'Noto Serif KR',serif;--sans:'Noto Sans KR',sans-serif;
  --mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;min-height:100vh;}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.logo{display:flex;align-items:center;gap:10px;cursor:pointer;}
.logo-mark{width:28px;height:28px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-weight:700;font-size:12px;color:#fff;}
.logo-name{font-family:var(--serif);font-size:14px;font-weight:700;}
.logo-role{font-size:11px;color:var(--text3);background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:2px 8px;margin-left:6px;}
.btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:none;font-family:var(--sans);transition:all .15s;display:inline-flex;align-items:center;gap:6px;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{background:var(--accent2);}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--text2);}
.btn-ghost:hover{background:var(--surface2);}
.btn-danger{background:var(--red-light);color:var(--red);border:1px solid rgba(220,53,69,.2);}
.btn-danger:hover{background:rgba(220,53,69,.12);}
.btn-sm{padding:5px 12px;font-size:12px;}

.main{max-width:900px;margin:0 auto;padding:32px 24px;}
.page-title{font-family:var(--serif);font-size:22px;font-weight:700;margin-bottom:4px;}
.page-sub{font-size:13px;color:var(--text2);font-weight:300;margin-bottom:24px;}

/* 상단 상태 배너 */
.status-banner{border-radius:12px;padding:16px 20px;margin-bottom:24px;display:flex;align-items:center;gap:14px;}
.sb-new{background:var(--blue-light);border:1px solid rgba(26,86,219,.15);}
.sb-icon{font-size:24px;flex-shrink:0;}
.sb-info{flex:1;}
.sb-title{font-size:14px;font-weight:700;margin-bottom:3px;color:var(--blue);}
.sb-sub{font-size:12px;color:var(--text2);}
.sb-time{font-size:11px;color:var(--text3);white-space:nowrap;}

/* 견적서 비교 레이아웃 */
.compare-layout{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;}
.cmp-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;position:relative;}
.cmp-card.highlight{border-color:var(--accent);box-shadow:0 0 0 3px rgba(26,107,74,.08);}
.cmp-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.cmp-label.req{color:var(--blue);}
.cmp-label.quote{color:var(--accent);}
.cmp-badge{font-size:10px;padding:2px 8px;border-radius:6px;font-weight:600;}
.cb-req{background:var(--blue-light);color:var(--blue);}
.cb-quote{background:var(--accent-light);color:var(--accent);}
.cmp-maker{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--border);}
.cmp-maker-icon{font-size:22px;}
.cmp-maker-name{font-size:14px;font-weight:700;}
.cmp-maker-sub{font-size:11px;color:var(--text3);}
.cmp-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px;}
.cmp-row:last-child{border-bottom:none;}
.cmp-key{color:var(--text3);}
.cmp-val{font-weight:500;}
.cmp-val.accent{color:var(--accent);font-family:var(--mono);}
.cmp-val.blue{color:var(--blue);font-family:var(--mono);}
.cmp-val.better{color:var(--accent);font-weight:700;}
.cmp-val.worse{color:var(--red);}
.diff-badge{font-size:10px;padding:1px 6px;border-radius:5px;margin-left:6px;font-weight:600;}
.diff-same{background:var(--surface2);color:var(--text3);}
.diff-better{background:var(--accent-light);color:var(--accent);}
.diff-worse{background:var(--red-light);color:var(--red);}

/* 금액 분해 */
.amount-breakdown{background:var(--surface2);border-radius:10px;padding:14px;margin-top:12px;}
.ab-title{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;}
.ab-row{display:flex;justify-content:space-between;padding:5px 0;font-size:12px;border-bottom:1px solid var(--border);}
.ab-row:last-child{border-bottom:none;}
.ab-key{color:var(--text2);}
.ab-val{font-family:var(--mono);font-weight:600;}
.ab-val.g{color:var(--accent);}
.ab-val.a{color:var(--amber);}

/* 납품 항목 */
.dl-list{list-style:none;margin-top:8px;}
.dl-list li{font-size:12px;color:var(--text2);padding:3px 0;padding-left:12px;position:relative;}
.dl-list li::before{content:'·';position:absolute;left:2px;color:var(--accent);font-weight:700;}

/* 의견 작성 */
.feedback-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px;}
.fc-title{font-size:14px;font-weight:700;margin-bottom:14px;}
textarea{background:var(--surface2);border:1.5px solid var(--border2);border-radius:8px;color:var(--text);font-family:var(--sans);font-size:13px;padding:10px 12px;outline:none;width:100%;resize:vertical;min-height:80px;transition:border-color .15s;}
textarea:focus{border-color:var(--accent);}
textarea::placeholder{color:var(--text3);}

/* 역제안 입력 */
.counter-form{display:none;background:var(--amber-light);border:1px solid rgba(180,83,9,.15);border-radius:10px;padding:16px;margin-top:12px;}
.counter-form.show{display:block;}
.cf-title{font-size:13px;font-weight:700;color:var(--amber);margin-bottom:10px;}
.input-row{display:flex;gap:8px;}
input[type=text]{background:var(--surface);border:1.5px solid var(--border2);border-radius:8px;color:var(--text);font-family:var(--sans);font-size:13px;padding:9px 12px;outline:none;width:100%;transition:border-color .15s;}
input[type=text]:focus{border-color:var(--accent);}

/* 최종 액션 */
.action-bar{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.ab-note{flex:1;min-width:200px;font-size:12px;color:var(--text3);line-height:1.6;}

/* 성공 */
.result-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:40px;text-align:center;margin-bottom:16px;}
.rc-icon{font-size:56px;margin-bottom:14px;display:block;animation:pop .5s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes pop{from{opacity:0;transform:scale(.5)}to{opacity:1;transform:scale(1)}}

/* 모바일 */
@media(max-width:768px){
  .compare-layout{grid-template-columns:1fr;}
  .action-bar{flex-direction:column;}
}

/* ── 다크모드 ── */
[data-theme="dark"]{
  --bg:#0d1117;--surface:#161b27;--surface2:#1c2333;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --text:#e8eaf2;--text2:#8b92b3;--text3:#4a5270;
}
[data-theme="dark"] .logo-name,[data-theme="dark"] .page-title{color:var(--text);}
[data-theme="dark"] input,[data-theme="dark"] select,[data-theme="dark"] textarea{background:var(--surface2);color:var(--text);border-color:var(--border2);}
[data-theme="dark"] .header{background:var(--surface);border-color:var(--border);}
/* ── END 다크모드 ── */

</style>

<script>
/* ================================================================
   PCM.js — 공공콘텐츠마켓 공통 상태 관리 모듈 v3
   모든 HTML에서 <\x3cscript src="pcm.js"><\/script>로 로드
   ================================================================ */

const PCM = (() => {
  /* ── 기본 스토리지 ── */
  const KEY = k => 'pcm_' + k;
  const set  = (k, v)  => { try { sessionStorage.setItem(KEY(k), JSON.stringify(v)); } catch(e) {} };
  const get  = (k, d=null) => { try { const v = sessionStorage.getItem(KEY(k)); return v != null ? JSON.parse(v) : d; } catch(e) { return d; } };
  const del  = k => sessionStorage.removeItem(KEY(k));

  /* ── 금액 계산 ── */
  const breakdown = vatIncl => {
    const supply = Math.round(vatIncl / 1.1);
    return { vatIncl, supply, vat: vatIncl - supply, comm: Math.round(supply * 0.05), biz: Math.round(supply * 0.95) };
  };
  const fw  = v => Math.round(v).toLocaleString() + '원';
  const fmw = v => (Math.round(v) / 10000).toLocaleString() + '만원';

  /* ── 과업 / 견적 공유 ── */
  const saveTask   = t => set('currentTask', t);
  const getTask    = ()  => get('currentTask', null);
  const saveQuote  = q => set('latestQuote', q);
  const getQuote   = ()  => get('latestQuote', null);
  const getConfirmedAmount = () => get('confirmedAmount', null);

  /* ── 프로젝트 목록 ── */
  const getProjects = () => get('projects', []);
  const saveProject = p => {
    const list = getProjects();
    const idx = list.findIndex(x => x.id === p.id);
    if (idx >= 0) list[idx] = p; else list.unshift(p);
    set('projects', list.slice(0, 50));
  };

  /* ── 알림 시스템 ── */
  const pushNotif = n => {
    const list = get('notifs', []);
    list.unshift({ id: 'n-' + Date.now(), unread: true, time: '방금', ...n });
    set('notifs', list.slice(0, 50));
    _updateBadge();
  };
  const getNotifs  = () => get('notifs', []);
  const markRead   = () => { set('notifs', getNotifs().map(n => ({ ...n, unread: false }))); _updateBadge(); };
  const unreadCount = () => getNotifs().filter(n => n.unread).length;
  const _updateBadge = () => {
    const cnt = unreadCount();
    document.querySelectorAll('[data-notif-badge]').forEach(el => {
      el.textContent = cnt || '';
      el.style.display = cnt ? '' : 'none';
    });
  };

  /* ── 로딩 버튼 ── */
  const showLoading = (btn, text = '처리 중...') => {
    if (!btn) return;
    btn._origHTML = btn.innerHTML;
    btn.disabled = true;
    if (!document.getElementById('pcmSpinStyle')) {
      const s = document.createElement('style');
      s.id = 'pcmSpinStyle';
      s.textContent = '@keyframes pcmSpin{to{transform:rotate(360deg)}}';
      document.head.appendChild(s);
    }
    btn.innerHTML = `<span style="display:inline-block;width:14px;height:14px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:pcmSpin .7s linear infinite;vertical-align:middle;margin-right:6px;"></span>${text}`;
  };
  const hideLoading = btn => {
    if (btn && btn._origHTML != null) { btn.disabled = false; btn.innerHTML = btn._origHTML; }
  };

  /* ── 토스트 ── */
  const toast = (msg, type = 'info') => {
    const colors = { info: '#1a1f2e', success: '#1a6b4a', error: '#dc3545', warn: '#b45309' };
    const icons  = { info: 'ℹ️', success: '✅', error: '❌', warn: '⚠️' };
    let t = document.getElementById('pcmToast');
    if (!t) {
      t = document.createElement('div');
      t.id = 'pcmToast';
      t.style.cssText = 'position:fixed;bottom:24px;right:24px;border-radius:10px;padding:12px 18px;font-size:13px;font-family:sans-serif;z-index:9999;transition:all .3s;opacity:0;transform:translateY(60px);display:flex;align-items:center;gap:8px;max-width:340px;box-shadow:0 4px 24px rgba(0,0,0,.22);color:#fff;pointer-events:none;';
      document.body.appendChild(t);
    }
    t.style.background = colors[type] || colors.info;
    t.innerHTML = `<span style="flex-shrink:0;">${icons[type] || ''}</span><span>${msg}</span>`;
    t.style.opacity = '1';
    t.style.transform = 'translateY(0)';
    clearTimeout(t._timer);
    t._timer = setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateY(60px)'; }, 3400);
  };

  /* ── 폼 유효성 검사 ── */
  const validate = rules => {
    let ok = true;
    rules.forEach(({ id, label, required, minLen, type: ftype }) => {
      const el = document.getElementById(id);
      if (!el) return;
      const v = (el.value || '').trim();
      let msg = '';
      if (required && !v) msg = `${label}을(를) 입력해주세요.`;
      else if (minLen && v.length < minLen) msg = `${label}은(는) ${minLen}자 이상이어야 합니다.`;
      else if (ftype === 'email' && v && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v)) msg = '올바른 이메일 형식이 아닙니다.';
      let errEl = document.getElementById(id + '-err');
      if (!errEl) {
        errEl = document.createElement('div');
        errEl.id = id + '-err';
        errEl.style.cssText = 'font-size:11px;color:#dc3545;margin-top:3px;';
        if (el.parentNode) el.parentNode.appendChild(errEl);
      }
      if (msg) { ok = false; errEl.textContent = msg; el.style.setProperty('border-color', '#dc3545', 'important'); }
      else { errEl.textContent = ''; el.style.removeProperty('border-color'); }
    });
    return ok;
  };

  /* ── 폼 자동 임시저장 ── */
  const autoSave = (formId, storageKey) => {
    const form = document.getElementById(formId);
    if (!form) return;
    const save = () => {
      const data = {};
      form.querySelectorAll('input, select, textarea').forEach(el => { if (el.id) data[el.id] = el.value; });
      set(storageKey, data);
    };
    form.addEventListener('input', save);
    form.addEventListener('change', save);
    // 새로고침 경고
    window.addEventListener('beforeunload', e => {
      const saved = get(storageKey, {});
      if (Object.values(saved).some(v => v)) {
        e.preventDefault();
        e.returnValue = '작성 중인 내용이 있습니다. 페이지를 떠나시겠습니까?';
      }
    });
    // 기존 임시저장 복원
    const saved = get(storageKey, {});
    if (saved) {
      Object.entries(saved).forEach(([k, v]) => {
        const el = document.getElementById(k);
        if (el && !el.value) el.value = v;
      });
    }
  };

  /* ── 로그아웃 (세션 완전 정리) ── */
  const logout = () => {
    // PCM 키 전부 삭제
    const keys = Object.keys(sessionStorage).filter(k => k.startsWith('pcm_'));
    keys.forEach(k => sessionStorage.removeItem(k));
    // 기타 앱 키
    ['userType', 'userEmail', 'onboarded', 'onboarding_from'].forEach(k => sessionStorage.removeItem(k));
    window.location.href = '로그인.html';
  };

  /* ── 알림 렌더 헬퍼 (마이페이지 등에서 사용) ── */
  const renderNotifList = (containerId) => {
    const el = document.getElementById(containerId);
    if (!el) return;
    const notifs = getNotifs();
    markRead();
    if (!notifs.length) {
      el.innerHTML = '<div style="text-align:center;padding:32px;color:#8492a6;font-size:13px;">알림이 없습니다</div>';
      return;
    }
    el.innerHTML = notifs.slice(0, 20).map(n => `
      <div style="display:flex;gap:12px;padding:14px 0;border-bottom:1px solid rgba(0,0,0,0.08);cursor:pointer;">
        <div style="font-size:20px;flex-shrink:0;">${n.icon || '🔔'}</div>
        <div style="flex:1;">
          <div style="font-size:13px;font-weight:500;margin-bottom:2px;">${n.title || ''}</div>
          <div style="font-size:12px;color:#8492a6;">${n.sub || ''}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
          <div style="font-size:11px;color:#8492a6;white-space:nowrap;">${n.time || ''}</div>
          ${n.unread ? '<div style="width:8px;height:8px;border-radius:50%;background:#1a6b4a;flex-shrink:0;"></div>' : ''}
        </div>
      </div>`).join('');
  };

  /* ── 공개 API ── */
  return {
    set, get, del,
    breakdown, fw, fmw,
    saveTask, getTask, saveQuote, getQuote, getConfirmedAmount,
    saveProject, getProjects,
    pushNotif, getNotifs, markRead, unreadCount, renderNotifList,
    showLoading, hideLoading,
    toast, validate, autoSave, logout,
    _updateBadge,
  };
})();

/* 페이지 로드 시 뱃지 갱신 */
document.addEventListener('DOMContentLoaded', () => PCM._updateBadge());

</script>
<script src="api.js"></script>
</head>
<body>
<div class="header">
  <div style="display:flex;align-items:center;">
    <div class="logo" onclick="nav('발주처_대시보드.html')">
      <div class="logo-mark">공</div>
      <div class="logo-name">공공콘텐츠마켓</div>
      <span class="logo-role">발주처</span>
    </div>
  </div>
  <button class="btn btn-ghost btn-sm" onclick="nav('마이페이지_발주처.html')">← 마이페이지</button>
</div>

<div class="main" id="main"></div>

<script>



function nav(p){window.location.href=p;}

// 견적 수락 API 연동
async function acceptQuoteAPI(quoteId) {
  if (API.isLoggedIn() && quoteId) {
    const res = await API.quotes.accept(quoteId);
    if (res?.success) {
      PCM.set('contractType', sessionStorage.getItem('contractType') || 'escrow');
      nav('계약서.html');
    }
  } else {
    nav('계약서.html');
  }
}


/* ── 다크모드 토글 ── */
(function(){
  var saved = localStorage.getItem('pcm_theme') || 'light';
  document.documentElement.setAttribute('data-theme', saved);
})();
function toggleDarkMode(){
  var cur = document.documentElement.getAttribute('data-theme')||'light';
  var next = cur==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('pcm_theme', next);
  var btn = document.getElementById('dark-toggle');
  if(btn) btn.textContent = next==='dark'?'☀️':'🌙';
}
/* ── END 다크모드 ── */


/* 공통 유틸 */
function bd(vatIncl){
  const s=Math.round(vatIncl/1.1);
  return{vatIncl,supply:s,vat:vatIncl-s,comm:Math.round(s*.05),biz:Math.round(s*.95)};
}
function fw(v){return Math.round(v).toLocaleString()+'원';}
function fmw(v){return (Math.round(v)/10000).toLocaleString()+'만원';}

/* 세션에서 견적 데이터 로드 (없으면 샘플) */
const savedQuote = (() => {
  try{ const q=sessionStorage.getItem('pcm_latestQuote'); return q?JSON.parse(q):null; }catch(e){return null;}
})();
const savedTask = (() => {
  try{ const t=sessionStorage.getItem('pcm_currentTask'); return t?JSON.parse(t):null; }catch(e){return null;}
})();

const REQ = {
  title: savedTask?.title || '탄소중립 SNS 카드뉴스 제작',
  org: savedTask?.org || '환경부 홍보기획과',
  budget: savedTask?.budget || 18000000,
  deadline: savedTask?.deadline || '2025.05.10',
};

const QUOTE = {
  maker: savedQuote?.maker || '㈜ 그린스튜디오',
  makerRank: '#1',
  makerRating: '★ 4.9',
  amount: savedQuote?.amount || 17500000,
  deadline: savedQuote?.deadline || '2025.05.08',
  revisions: '2회',
  start: '2025.04.28',
  deliverables: savedQuote?.deliverables || ['원본 PSD/AI 파일','JPG 300dpi 완성본','SNS 최적화본 (1:1, 4:5, 9:16)'],
  sentAt: savedQuote?.sentAt || '2025.05.01 14:30',
};

let state = 'reviewing'; // reviewing | accepted | rejected
let showCounter = false;

function render(){
  const el = document.getElementById('main');
  if(state === 'accepted'){ el.innerHTML = renderAccepted(); return; }
  if(state === 'rejected'){ el.innerHTML = renderRejected(); return; }
  el.innerHTML = renderReview();
}

function renderReview(){
  const reqBd = bd(REQ.budget);
  const qtBd  = bd(QUOTE.amount);
  const cheaper = QUOTE.amount < REQ.budget;
  const faster  = QUOTE.deadline <= REQ.deadline;

  return`
    <div class="page-title">견적서 검토</div>
    <div class="page-sub">${REQ.title} · ${QUOTE.maker}</div>

    <div class="status-banner sb-new">
      <div class="sb-icon">📨</div>
      <div class="sb-info">
        <div class="sb-title">새 견적서가 도착했습니다</div>
        <div class="sb-sub">${QUOTE.maker}에서 견적서를 제출했습니다. 조건을 비교하고 수락 또는 거절해주세요.</div>
      </div>
      <div class="sb-time">${QUOTE.sentAt}</div>
    </div>

    <!-- 조건 비교 -->
    <div class="compare-layout">
      <!-- 발주처 요청 조건 -->
      <div class="cmp-card">
        <div class="cmp-label req"><span>🏛</span>발주처 요청 조건<span class="cmp-badge cb-req">내 요청</span></div>
        <div class="cmp-row"><span class="cmp-key">예산 (VAT포함)</span><span class="cmp-val blue">${fw(REQ.budget)}</span></div>
        <div class="cmp-row"><span class="cmp-key">희망 납기</span><span class="cmp-val">${REQ.deadline}</span></div>
        <div class="amount-breakdown">
          <div class="ab-title">예산 구조</div>
          <div class="ab-row"><span class="ab-key">공급가액</span><span class="ab-val">${fw(reqBd.supply)}</span></div>
          <div class="ab-row"><span class="ab-key">수수료</span><span class="ab-val a">-${fw(reqBd.comm)}</span></div>
          <div class="ab-row"><span class="ab-key">사업비(제작사)</span><span class="ab-val g">${fw(reqBd.biz)}</span></div>
        </div>
      </div>

      <!-- 제작사 견적 -->
      <div class="cmp-card highlight">
        <div class="cmp-label quote"><span>🎬</span>${QUOTE.maker} 견적<span class="cmp-badge cb-quote">견적서</span></div>
        <div class="cmp-maker">
          <div class="cmp-maker-icon">🎬</div>
          <div>
            <div class="cmp-maker-name">${QUOTE.maker}</div>
            <div class="cmp-maker-sub">랭킹 ${QUOTE.makerRank} · ${QUOTE.makerRating} · 공공 실적 67건</div>
          </div>
        </div>
        <div class="cmp-row">
          <span class="cmp-key">견적 금액 (VAT포함)</span>
          <span class="cmp-val ${cheaper?'better':'worse'}">${fw(QUOTE.amount)}
            <span class="diff-badge ${cheaper?'diff-better':'diff-worse'}">${cheaper?'▼ '+fmw(REQ.budget-QUOTE.amount)+' 절감':'▲ 초과'}</span>
          </span>
        </div>
        <div class="cmp-row">
          <span class="cmp-key">납품 예정일</span>
          <span class="cmp-val ${faster?'better':''}">${QUOTE.deadline}
            ${faster?'<span class="diff-badge diff-better">⚡ 더 빠름</span>':''}
          </span>
        </div>
        <div class="cmp-row"><span class="cmp-key">착수 가능일</span><span class="cmp-val">${QUOTE.start}</span></div>
        <div class="cmp-row"><span class="cmp-key">수정 횟수</span><span class="cmp-val">${QUOTE.revisions}</span></div>
        <div class="amount-breakdown">
          <div class="ab-title">견적 금액 구조</div>
          <div class="ab-row"><span class="ab-key">공급가액</span><span class="ab-val">${fw(qtBd.supply)}</span></div>
          <div class="ab-row"><span class="ab-key">수수료</span><span class="ab-val a">-${fw(qtBd.comm)}</span></div>
          <div class="ab-row"><span class="ab-key">사업비(제작사)</span><span class="ab-val g">${fw(qtBd.biz)}</span></div>
        </div>
        <div style="margin-top:12px;">
          <div style="font-size:11px;color:var(--text3);margin-bottom:6px;">납품 항목 (${QUOTE.deliverables.length}개)</div>
          <ul class="dl-list">
            ${QUOTE.deliverables.map(d=>`<li>${d}</li>`).join('')}
          </ul>
        </div>
      </div>
    </div>

    <!-- 의견 -->
    <div class="feedback-card">
      <div class="fc-title">검토 의견 <span style="font-size:11px;color:var(--text3);font-weight:400;">(선택 · 거절/역제안 시 제작사에게 전달)</span></div>
      <textarea id="feedback" placeholder="견적 조건에 대한 의견이나 협의 내용을 입력하세요."></textarea>

      <div style="margin-top:12px;">
        <button class="btn btn-ghost btn-sm" onclick="toggleCounter()">💬 역제안하기 (금액·납기 협의)</button>
      </div>

      <div class="counter-form ${showCounter?'show':''}" id="counter-form">
        <div class="cf-title">역제안 조건 입력</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
          <div>
            <div style="font-size:12px;color:var(--text2);margin-bottom:4px;">희망 금액 (VAT포함)</div>
            <div class="input-row">
              <input type="text" id="counter-amount" placeholder="17,000,000">
              <span style="padding:9px 8px;font-size:12px;color:var(--text3);">원</span>
            </div>
          </div>
          <div>
            <div style="font-size:12px;color:var(--text2);margin-bottom:4px;">희망 납기</div>
            <input type="text" id="counter-deadline" placeholder="2025.05.08">
          </div>
        </div>
      </div>
    </div>

    <!-- 최종 액션 -->
    <div class="action-bar">
      <div class="ab-note">
        수락 시 에스크로 예치 화면으로 이동합니다.<br>
        거절 시 제작사에게 알림이 발송됩니다.
      </div>
      <button class="btn btn-danger" onclick="openReject()">✕ 거절</button>
      ${showCounter?`<button class="btn btn-ghost" onclick="sendCounter()">💬 역제안 발송</button>`:''}
      <button class="btn btn-primary" style="padding:11px 28px;" onclick="openAccept()">✓ 견적 수락 → 에스크로 예치</button>
    </div>`;
}

function renderAccepted(){
  const qtBd = bd(QUOTE.amount);
  // 수락 시 세션에 확정 금액 저장
  try{
    sessionStorage.setItem('pcm_confirmedAmount', QUOTE.amount);
    sessionStorage.setItem('pcm_confirmedMaker', QUOTE.maker);
    // 알림 추가
    PCM.pushNotif({icon:'✅',title:'견적 수락 완료',sub:`${QUOTE.maker} 견적이 수락되었습니다. 에스크로를 예치해주세요.`,time:'방금'});
  }catch(e){}
  return`
    <div class="result-card">
      <span class="rc-icon">✅</span>
      <div style="font-family:var(--serif);font-size:20px;font-weight:700;margin-bottom:8px;">견적 수락 완료!</div>
      <div style="font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:20px;">
        ${QUOTE.maker}의 견적을 수락했습니다.<br>
        에스크로에 계약금액을 예치하면 제작이 시작됩니다.
      </div>
      <div style="background:var(--accent-light);border-radius:10px;padding:16px;text-align:left;margin-bottom:20px;">
        <div style="display:flex;justify-content:space-between;padding:6px 0;font-size:13px;border-bottom:1px solid rgba(26,107,74,.1);">
          <span style="color:var(--text3);">확정 금액</span>
          <span style="font-family:var(--mono);font-weight:700;color:var(--blue);">${fw(QUOTE.amount)}</span>
        </div>
        <div style="display:flex;justify-content:space-between;padding:6px 0;font-size:13px;border-bottom:1px solid rgba(26,107,74,.1);">
          <span style="color:var(--text3);">수수료</span>
          <span style="font-family:var(--mono);font-weight:700;color:var(--amber);">-${fw(qtBd.comm)}</span>
        </div>
        <div style="display:flex;justify-content:space-between;padding:6px 0;font-size:13px;">
          <span style="color:var(--text3);">사업비(제작사)</span>
          <span style="font-family:var(--mono);font-weight:700;color:var(--accent);">${fw(qtBd.biz)}</span>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:8px;">
        <button class="btn btn-primary" style="width:100%;justify-content:center;padding:13px;" onclick="nav('에스크로_예치.html')">🔒 에스크로 대금 예치하기</button>
        <button class="btn btn-ghost" style="width:100%;justify-content:center;" onclick="nav('계약서.html')">📄 계약서 확인</button>
      </div>
    </div>`;
}

function renderRejected(){
  try{ PCM.pushNotif({icon:'❌',title:'견적 거절 완료',sub:`${QUOTE.maker}에게 거절 알림이 발송되었습니다.`,time:'방금'}); }catch(e){}
  return`
    <div class="result-card">
      <span class="rc-icon">❌</span>
      <div style="font-family:var(--serif);font-size:20px;font-weight:700;margin-bottom:8px;">견적 거절 완료</div>
      <div style="font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:20px;">
        ${QUOTE.maker}에게 거절 알림이 발송되었습니다.<br>
        다른 콘텐츠사에게 새로 견적을 요청하거나 역제안을 보낼 수 있습니다.
      </div>
      <div style="display:flex;flex-direction:column;gap:8px;">
        <button class="btn btn-primary" style="width:100%;justify-content:center;" onclick="nav('제작사_디렉토리.html')">🎬 다른 콘텐츠사 찾기</button>
        <button class="btn btn-ghost" style="width:100%;justify-content:center;" onclick="nav('마이페이지_발주처.html')">마이페이지로 이동</button>
      </div>
    </div>`;
}

function toggleCounter(){
  showCounter = !showCounter;
  render();
  if(showCounter) document.getElementById('counter-form')?.scrollIntoView({behavior:'smooth'});
}

function openAccept(){
  if(!confirm(`${QUOTE.maker}의 견적(${fw(QUOTE.amount)})을 수락하시겠습니까?\n수락 후 에스크로 예치 화면으로 이동합니다.`)) return;
  state = 'accepted'; render(); window.scrollTo(0,0);
}

function openReject(){
  const fb = document.getElementById('feedback')?.value||'';
  if(!confirm(`${QUOTE.maker}의 견적을 거절하시겠습니까?${fb?'\n\n사유: '+fb:''}`)) return;
  state = 'rejected'; render(); window.scrollTo(0,0);
}

function sendCounter(){
  const amt = document.getElementById('counter-amount')?.value;
  const ddl = document.getElementById('counter-deadline')?.value;
  if(!amt){ alert('희망 금액을 입력해주세요'); return; }
  alert(`역제안이 발송되었습니다.\n희망금액: ${amt}원 / 희망납기: ${ddl||REQ.deadline}`);
  nav('마이페이지_발주처.html');
}

render();
</script>
</body>
</html>
