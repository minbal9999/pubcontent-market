<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>페이지를 찾을 수 없습니다 — 공공콘텐츠마켓</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@600;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap');
:root{
  --bg:#0d1117;--surface:#161b27;--surface2:#1e2535;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --text:#e8eaf2;--text2:#8b92b3;--text3:#4a5270;
  --accent:#1dd9a0;--accent2:#0fb87f;--accent-dim:rgba(29,217,160,0.12);
  --blue:#4f7cff;--red:#ff4d6a;
  --serif:'Noto Serif KR',serif;--sans:'Noto Sans KR',sans-serif;
  --mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;display:flex;flex-direction:column;overflow:hidden;}

/* BG */
.bg{position:fixed;inset:0;pointer-events:none;}
.grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);background-size:40px 40px;mask-image:radial-gradient(ellipse at center,rgba(0,0,0,.6) 0%,transparent 70%);}
.glow{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(255,77,106,0.08) 0%,transparent 60%);}

/* HEADER */
.header{background:rgba(13,17,23,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 28px;height:58px;display:flex;align-items:center;justify-content:space-between;position:relative;z-index:10;}
.logo{display:flex;align-items:center;gap:10px;cursor:pointer;}
.logo-mark{width:28px;height:28px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-weight:700;font-size:12px;color:#0d1117;}
.logo-name{font-family:var(--serif);font-size:14px;font-weight:700;}

/* MAIN */
.main{flex:1;display:flex;align-items:center;justify-content:center;position:relative;z-index:1;padding:24px;}
.content{text-align:center;max-width:540px;}

/* 404 NUMBER */
.error-code{font-family:var(--mono);font-size:clamp(80px,15vw,140px);font-weight:700;line-height:1;letter-spacing:-.05em;background:linear-gradient(135deg,var(--red) 0%,rgba(255,77,106,.4) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px;position:relative;display:inline-block;}
.error-code::after{content:'';position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);width:60%;height:2px;background:linear-gradient(90deg,transparent,var(--red),transparent);}

.error-title{font-family:var(--serif);font-size:clamp(18px,3vw,28px);font-weight:700;margin-bottom:12px;margin-top:20px;}
.error-sub{font-size:14px;color:var(--text2);line-height:1.75;margin-bottom:32px;font-weight:300;}

/* URL DISPLAY */
.url-display{background:var(--surface);border:1px solid var(--border2);border-radius:10px;padding:12px 16px;font-family:var(--mono);font-size:13px;color:var(--red);margin-bottom:32px;display:flex;align-items:center;gap:8px;max-width:400px;margin-left:auto;margin-right:auto;}
.url-icon{font-size:16px;flex-shrink:0;opacity:.6;}
.url-text{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* ACTIONS */
.actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:36px;}
.btn{padding:10px 22px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;border:none;font-family:var(--sans);transition:all .18s;display:inline-flex;align-items:center;gap:7px;}
.btn-accent{background:var(--accent);color:#0d1117;}
.btn-accent:hover{background:var(--accent2);}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--text2);}
.btn-ghost:hover{background:var(--surface2);color:var(--text);}

/* QUICK LINKS */
.quick-links{border-top:1px solid var(--border);padding-top:28px;}
.ql-title{font-size:12px;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;font-weight:600;margin-bottom:16px;}
.ql-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;max-width:360px;margin:0 auto;}
.ql-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;cursor:pointer;transition:all .15s;text-align:left;display:flex;align-items:center;gap:10px;}
.ql-item:hover{border-color:var(--accent);transform:translateY(-1px);}
.ql-icon{font-size:18px;flex-shrink:0;}
.ql-label{font-size:12px;font-weight:500;color:var(--text);}
.ql-desc{font-size:10px;color:var(--text3);margin-top:1px;}

/* ERROR VARIANTS */
.variant-500 .error-code{background:linear-gradient(135deg,var(--red) 0%,rgba(255,77,106,.3) 100%);-webkit-background-clip:text;background-clip:text;}
.variant-500 .glow{background:radial-gradient(circle,rgba(255,77,106,.1) 0%,transparent 60%);}
.variant-403 .error-code{background:linear-gradient(135deg,#f5c842 0%,rgba(245,200,66,.3) 100%);-webkit-background-clip:text;background-clip:text;}
.variant-403 .glow{background:radial-gradient(circle,rgba(245,200,66,.07) 0%,transparent 60%);}

/* FLOAT ANIMATION */
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.error-emoji{font-size:64px;margin-bottom:16px;display:inline-block;animation:float 3s ease-in-out infinite;}

/* COUNTER */
.redirect-notice{font-size:12px;color:var(--text3);margin-top:16px;}
.rc-num{font-family:var(--mono);font-weight:700;color:var(--accent);}

/* ── 모바일 반응형 ── */
@media(max-width:768px){
  .layout, .main-layout { grid-template-columns:1fr!important; }
  .sidebar { position:static!important; height:auto!important; border-right:none!important; border-bottom:1px solid var(--border); }
  .preview-panel,.right-panel { display:none; }
  .main,.left-panel,.main-area { padding:16px!important; }
  .stat-row { grid-template-columns:1fr 1fr!important; }
  .header { padding:0 14px!important; }
  .nav-links { display:none!important; }
  .mob-menu-btn { display:flex!important; }
  .form-grid, .spec-grid { grid-template-columns:1fr!important; }
  .type-grid { grid-template-columns:repeat(2,1fr)!important; }
  .score-grid { grid-template-columns:1fr!important; }
  .compare-table { font-size:11px; }
  .compare-table th, .compare-table td { padding:8px 8px!important; }
  .eb-options { grid-template-columns:1fr!important; }
  .sign-grid { grid-template-columns:1fr!important; gap:20px!important; }
  .chat-layout { grid-template-columns:1fr!important; }
  .file-preview-grid { grid-template-columns:1fr 1fr!important; }
  .podium { grid-template-columns:1fr!important; }
  .makers-grid { grid-template-columns:1fr!important; }
  .summary-grid { grid-template-columns:1fr 1fr!important; }
  .ql-grid { grid-template-columns:1fr!important; }
  .filter-panel { display:none; }
  .page { grid-template-columns:1fr!important; }
}
@media(max-width:480px){
  .stat-row { grid-template-columns:1fr!important; }
  .summary-grid { grid-template-columns:1fr!important; }
  .hero-title { font-size:24px!important; }
  .btn { padding:7px 12px!important; font-size:12px!important; }
}
/* ── END 모바일 ── */


/* ── 다크모드 ── */
[data-theme="dark"]{
  --bg:#0d1117;--surface:#161b27;--surface2:#1c2333;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --text:#e8eaf2;--text2:#8b92b3;--text3:#4a5270;
}
[data-theme="dark"] .logo-name,[data-theme="dark"] .page-title{color:var(--text);}
[data-theme="dark"] input,[data-theme="dark"] select,[data-theme="dark"] textarea{background:var(--surface2);color:var(--text);border-color:var(--border2);}
[data-theme="dark"] .header{background:var(--surface);border-color:var(--border);}
/* ── END 다크모드 ── */

</style>

<script>
/* ================================================================
   PCM.js — 공공콘텐츠마켓 공통 상태 관리 모듈 v3
   모든 HTML에서 <\x3cscript src="pcm.js"><\/script>로 로드
   ================================================================ */

const PCM = (() => {
  /* ── 기본 스토리지 ── */
  const KEY = k => 'pcm_' + k;
  const set  = (k, v)  => { try { sessionStorage.setItem(KEY(k), JSON.stringify(v)); } catch(e) {} };
  const get  = (k, d=null) => { try { const v = sessionStorage.getItem(KEY(k)); return v != null ? JSON.parse(v) : d; } catch(e) { return d; } };
  const del  = k => sessionStorage.removeItem(KEY(k));

  /* ── 금액 계산 ── */
  const breakdown = vatIncl => {
    const supply = Math.round(vatIncl / 1.1);
    return { vatIncl, supply, vat: vatIncl - supply, comm: Math.round(supply * 0.05), biz: Math.round(supply * 0.95) };
  };
  const fw  = v => Math.round(v).toLocaleString() + '원';
  const fmw = v => (Math.round(v) / 10000).toLocaleString() + '만원';

  /* ── 과업 / 견적 공유 ── */
  const saveTask   = t => set('currentTask', t);
  const getTask    = ()  => get('currentTask', null);
  const saveQuote  = q => set('latestQuote', q);
  const getQuote   = ()  => get('latestQuote', null);
  const getConfirmedAmount = () => get('confirmedAmount', null);

  /* ── 프로젝트 목록 ── */
  const getProjects = () => get('projects', []);
  const saveProject = p => {
    const list = getProjects();
    const idx = list.findIndex(x => x.id === p.id);
    if (idx >= 0) list[idx] = p; else list.unshift(p);
    set('projects', list.slice(0, 50));
  };

  /* ── 알림 시스템 ── */
  const pushNotif = n => {
    const list = get('notifs', []);
    list.unshift({ id: 'n-' + Date.now(), unread: true, time: '방금', ...n });
    set('notifs', list.slice(0, 50));
    _updateBadge();
  };
  const getNotifs  = () => get('notifs', []);
  const markRead   = () => { set('notifs', getNotifs().map(n => ({ ...n, unread: false }))); _updateBadge(); };
  const unreadCount = () => getNotifs().filter(n => n.unread).length;
  const _updateBadge = () => {
    const cnt = unreadCount();
    document.querySelectorAll('[data-notif-badge]').forEach(el => {
      el.textContent = cnt || '';
      el.style.display = cnt ? '' : 'none';
    });
  };

  /* ── 로딩 버튼 ── */
  const showLoading = (btn, text = '처리 중...') => {
    if (!btn) return;
    btn._origHTML = btn.innerHTML;
    btn.disabled = true;
    if (!document.getElementById('pcmSpinStyle')) {
      const s = document.createElement('style');
      s.id = 'pcmSpinStyle';
      s.textContent = '@keyframes pcmSpin{to{transform:rotate(360deg)}}';
      document.head.appendChild(s);
    }
    btn.innerHTML = `<span style="display:inline-block;width:14px;height:14px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:pcmSpin .7s linear infinite;vertical-align:middle;margin-right:6px;"></span>${text}`;
  };
  const hideLoading = btn => {
    if (btn && btn._origHTML != null) { btn.disabled = false; btn.innerHTML = btn._origHTML; }
  };

  /* ── 토스트 ── */
  const toast = (msg, type = 'info') => {
    const colors = { info: '#1a1f2e', success: '#1a6b4a', error: '#dc3545', warn: '#b45309' };
    const icons  = { info: 'ℹ️', success: '✅', error: '❌', warn: '⚠️' };
    let t = document.getElementById('pcmToast');
    if (!t) {
      t = document.createElement('div');
      t.id = 'pcmToast';
      t.style.cssText = 'position:fixed;bottom:24px;right:24px;border-radius:10px;padding:12px 18px;font-size:13px;font-family:sans-serif;z-index:9999;transition:all .3s;opacity:0;transform:translateY(60px);display:flex;align-items:center;gap:8px;max-width:340px;box-shadow:0 4px 24px rgba(0,0,0,.22);color:#fff;pointer-events:none;';
      document.body.appendChild(t);
    }
    t.style.background = colors[type] || colors.info;
    t.innerHTML = `<span style="flex-shrink:0;">${icons[type] || ''}</span><span>${msg}</span>`;
    t.style.opacity = '1';
    t.style.transform = 'translateY(0)';
    clearTimeout(t._timer);
    t._timer = setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateY(60px)'; }, 3400);
  };

  /* ── 폼 유효성 검사 ── */
  const validate = rules => {
    let ok = true;
    rules.forEach(({ id, label, required, minLen, type: ftype }) => {
      const el = document.getElementById(id);
      if (!el) return;
      const v = (el.value || '').trim();
      let msg = '';
      if (required && !v) msg = `${label}을(를) 입력해주세요.`;
      else if (minLen && v.length < minLen) msg = `${label}은(는) ${minLen}자 이상이어야 합니다.`;
      else if (ftype === 'email' && v && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v)) msg = '올바른 이메일 형식이 아닙니다.';
      let errEl = document.getElementById(id + '-err');
      if (!errEl) {
        errEl = document.createElement('div');
        errEl.id = id + '-err';
        errEl.style.cssText = 'font-size:11px;color:#dc3545;margin-top:3px;';
        if (el.parentNode) el.parentNode.appendChild(errEl);
      }
      if (msg) { ok = false; errEl.textContent = msg; el.style.setProperty('border-color', '#dc3545', 'important'); }
      else { errEl.textContent = ''; el.style.removeProperty('border-color'); }
    });
    return ok;
  };

  /* ── 폼 자동 임시저장 ── */
  const autoSave = (formId, storageKey) => {
    const form = document.getElementById(formId);
    if (!form) return;
    const save = () => {
      const data = {};
      form.querySelectorAll('input, select, textarea').forEach(el => { if (el.id) data[el.id] = el.value; });
      set(storageKey, data);
    };
    form.addEventListener('input', save);
    form.addEventListener('change', save);
    // 새로고침 경고
    window.addEventListener('beforeunload', e => {
      const saved = get(storageKey, {});
      if (Object.values(saved).some(v => v)) {
        e.preventDefault();
        e.returnValue = '작성 중인 내용이 있습니다. 페이지를 떠나시겠습니까?';
      }
    });
    // 기존 임시저장 복원
    const saved = get(storageKey, {});
    if (saved) {
      Object.entries(saved).forEach(([k, v]) => {
        const el = document.getElementById(k);
        if (el && !el.value) el.value = v;
      });
    }
  };

  /* ── 로그아웃 (세션 완전 정리) ── */
  const logout = () => {
    // PCM 키 전부 삭제
    const keys = Object.keys(sessionStorage).filter(k => k.startsWith('pcm_'));
    keys.forEach(k => sessionStorage.removeItem(k));
    // 기타 앱 키
    ['userType', 'userEmail', 'onboarded', 'onboarding_from'].forEach(k => sessionStorage.removeItem(k));
    window.location.href = '로그인.html';
  };

  /* ── 알림 렌더 헬퍼 (마이페이지 등에서 사용) ── */
  const renderNotifList = (containerId) => {
    const el = document.getElementById(containerId);
    if (!el) return;
    const notifs = getNotifs();
    markRead();
    if (!notifs.length) {
      el.innerHTML = '<div style="text-align:center;padding:32px;color:#8492a6;font-size:13px;">알림이 없습니다</div>';
      return;
    }
    el.innerHTML = notifs.slice(0, 20).map(n => `
      <div style="display:flex;gap:12px;padding:14px 0;border-bottom:1px solid rgba(0,0,0,0.08);cursor:pointer;">
        <div style="font-size:20px;flex-shrink:0;">${n.icon || '🔔'}</div>
        <div style="flex:1;">
          <div style="font-size:13px;font-weight:500;margin-bottom:2px;">${n.title || ''}</div>
          <div style="font-size:12px;color:#8492a6;">${n.sub || ''}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
          <div style="font-size:11px;color:#8492a6;white-space:nowrap;">${n.time || ''}</div>
          ${n.unread ? '<div style="width:8px;height:8px;border-radius:50%;background:#1a6b4a;flex-shrink:0;"></div>' : ''}
        </div>
      </div>`).join('');
  };

  /* ── 공개 API ── */
  return {
    set, get, del,
    breakdown, fw, fmw,
    saveTask, getTask, saveQuote, getQuote, getConfirmedAmount,
    saveProject, getProjects,
    pushNotif, getNotifs, markRead, unreadCount, renderNotifList,
    showLoading, hideLoading,
    toast, validate, autoSave, logout,
    _updateBadge,
  };
})();

/* 페이지 로드 시 뱃지 갱신 */
document.addEventListener('DOMContentLoaded', () => PCM._updateBadge());

</script>
</head>
<body>

<div class="bg">
  <div class="grid"></div>
  <div class="glow" id="glow"></div>
</div>

<div class="header">
  <div class="logo" onclick="nav('랜딩페이지.html')">
    <div class="logo-mark">공</div>
    <div class="logo-name">공공콘텐츠마켓</div>
  </div>
  <div style="font-size:12px;color:var(--text3);">오류 발생</div>
</div>

<div class="main">
  <div class="content" id="content"></div>
</div>

<script>
function nav(p){window.location.href=p;}

/* ── 다크모드 토글 ── */
(function(){
  var saved = localStorage.getItem('pcm_theme') || 'light';
  document.documentElement.setAttribute('data-theme', saved);
})();
function toggleDarkMode(){
  var cur = document.documentElement.getAttribute('data-theme')||'light';
  var next = cur==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('pcm_theme', next);
  var btn = document.getElementById('dark-toggle');
  if(btn) btn.textContent = next==='dark'?'☀️':'🌙';
}
/* ── END 다크모드 ── */


// URL 파라미터로 오류 유형 감지
const params = new URLSearchParams(window.location.search);
const type = params.get('type') || '404';

const ERRORS = {
  '404': {
    code: '404',
    emoji: '🔍',
    title: '페이지를 찾을 수 없습니다',
    sub: '요청하신 페이지가 존재하지 않거나\n이동되었을 수 있습니다.',
    variant: '',
    actions: [
      {label:'홈으로 이동', icon:'🏠', cls:'btn-accent', action:`nav('랜딩페이지.html')`},
      {label:'대시보드', icon:'📊', cls:'btn-ghost', action:`nav('발주처_대시보드.html')`},
    ]
  },
  '403': {
    code: '403',
    emoji: '🔒',
    title: '접근 권한이 없습니다',
    sub: '이 페이지에 접근할 수 있는 권한이 없습니다.\n로그인 후 다시 시도해주세요.',
    variant: 'variant-403',
    actions: [
      {label:'로그인하기', icon:'🔑', cls:'btn-accent', action:`nav('로그인.html')`},
      {label:'홈으로 이동', icon:'🏠', cls:'btn-ghost', action:`nav('랜딩페이지.html')`},
    ]
  },
  '500': {
    code: '500',
    emoji: '⚙️',
    title: '서버 오류가 발생했습니다',
    sub: '일시적인 서버 오류입니다.\n잠시 후 다시 시도하거나 고객센터에 문의해주세요.',
    variant: 'variant-500',
    actions: [
      {label:'다시 시도', icon:'🔄', cls:'btn-accent', action:`location.reload()`},
      {label:'고객센터', icon:'💬', cls:'btn-ghost', action:`alert('support@pubcontent.kr')`},
    ]
  },
  'network': {
    code: '연결 오류',
    emoji: '📡',
    title: '네트워크 연결을 확인해주세요',
    sub: '인터넷 연결이 불안정합니다.\n연결 상태를 확인 후 다시 시도해주세요.',
    variant: '',
    actions: [
      {label:'다시 시도', icon:'🔄', cls:'btn-accent', action:`location.reload()`},
      {label:'홈으로', icon:'🏠', cls:'btn-ghost', action:`nav('랜딩페이지.html')`},
    ]
  },
};

const err = ERRORS[type] || ERRORS['404'];
const currentUrl = window.location.pathname + window.location.search;

// 500 오류 시 자동 리다이렉트 카운트
let countdown = type==='500' ? 10 : 0;

const QUICK_LINKS = [
  {icon:'📋',label:'의뢰 등록',desc:'새 과업지시서',url:'과업지시서_생성기_v3.html'},
  {icon:'🎬',label:'콘텐츠사 찾기',desc:'제작사 디렉토리',url:'제작사_디렉토리.html'},
  {icon:'🏆',label:'랭킹',desc:'실시간 순위',url:'랭킹.html'},
  {icon:'💬',label:'고객센터',desc:'support@pubcontent.kr',url:'#'},
];

function render() {
  // 변형 클래스
  document.body.className = err.variant || '';
  document.getElementById('content').innerHTML = `
    <div class="error-emoji">${err.emoji}</div>
    <div class="error-code">${err.code}</div>
    <div class="error-title">${err.title}</div>
    <div class="error-sub" style="white-space:pre-line;">${err.sub}</div>

    ${type==='404' ? `
    <div class="url-display">
      <span class="url-icon">🔗</span>
      <span class="url-text">${currentUrl}</span>
    </div>` : ''}

    <div class="actions">
      ${err.actions.map(a=>`
        <button class="btn ${a.cls}" onclick="${a.action}">
          <span>${a.icon}</span>${a.label}
        </button>`).join('')}
    </div>

    ${countdown>0 ? `<div class="redirect-notice" id="redirect-notice"><span class="rc-num" id="rc">${countdown}</span>초 후 자동으로 이전 페이지로 이동합니다.</div>` : ''}

    <div class="quick-links">
      <div class="ql-title">자주 찾는 페이지</div>
      <div class="ql-grid">
        ${QUICK_LINKS.map(l=>`
          <div class="ql-item" onclick="nav('${l.url}')">
            <div class="ql-icon">${l.icon}</div>
            <div>
              <div class="ql-label">${l.label}</div>
              <div class="ql-desc">${l.desc}</div>
            </div>
          </div>`).join('')}
      </div>
    </div>`;

  // 500 자동 카운트다운
  if(countdown > 0) {
    const interval = setInterval(()=>{
      countdown--;
      const el = document.getElementById('rc');
      if(el) el.textContent = countdown;
      if(countdown <= 0){
        clearInterval(interval);
        history.back();
      }
    }, 1000);
  }
}

render();
</script>
</body>
</html>
