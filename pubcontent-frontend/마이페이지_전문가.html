<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>마이페이지 — 콘텐츠 전문가 · 공공콘텐츠마켓</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@600;700&family=JetBrains+Mono:wght@400;500&display=swap');
:root{
  --bg:#f4f2ed;--surface:#fff;--surface2:#f9f8f5;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);
  --text:#1a1f2e;--text2:#4a5568;--text3:#8492a6;
  --accent:#1a6b4a;--accent2:#2d9e72;--accent-light:#e8f5ef;
  --amber:#b45309;--amber-light:#fef3c7;
  --purple:#6b46c1;--purple-light:#f3effe;
  --blue:#1a56db;--blue-light:#e8f0fe;
  --red:#dc3545;--red-light:#fce8e6;
  --serif:'Noto Serif KR',serif;--sans:'Noto Sans KR',sans-serif;
  --mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;min-height:100vh;}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.logo{display:flex;align-items:center;gap:10px;cursor:pointer;}
.logo-mark{width:28px;height:28px;background:var(--purple);border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-weight:700;font-size:12px;color:#fff;}
.logo-name{font-family:var(--serif);font-size:14px;font-weight:700;}
.nav-links{display:flex;gap:4px;margin-left:16px;}
.nav-btn{padding:7px 14px;border-radius:8px;font-size:13px;color:var(--text2);cursor:pointer;border:none;background:transparent;font-family:var(--sans);transition:all .13s;}
.nav-btn:hover{background:var(--surface2);}
.nav-btn.active{background:var(--purple-light);color:var(--purple);font-weight:500;}
.btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:none;font-family:var(--sans);transition:all .15s;display:inline-flex;align-items:center;gap:6px;}
.btn-primary{background:var(--purple);color:#fff;}
.btn-primary:hover{background:#5a38a8;}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--text2);}
.btn-ghost:hover{background:var(--surface2);}
.btn-sm{padding:5px 12px;font-size:12px;}

.layout{display:grid;grid-template-columns:240px 1fr;min-height:calc(100vh - 58px);}
.sidebar{background:var(--surface);border-right:1px solid var(--border);padding:24px 16px;position:sticky;top:58px;height:calc(100vh - 58px);display:flex;flex-direction:column;}
.profile-block{text-align:center;padding-bottom:20px;border-bottom:1px solid var(--border);margin-bottom:16px;}
.avatar{width:60px;height:60px;border-radius:50%;background:var(--purple-light);color:var(--purple);font-size:24px;font-weight:700;display:flex;align-items:center;justify-content:center;margin:0 auto 10px;}
.profile-name{font-size:15px;font-weight:700;margin-bottom:2px;}
.profile-title{font-size:12px;color:var(--text3);}
.rank-badge{display:inline-flex;align-items:center;gap:4px;margin-top:6px;font-size:11px;background:var(--purple-light);color:var(--purple);border-radius:10px;padding:3px 10px;font-weight:600;}
.menu-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--text2);transition:all .13s;margin-bottom:2px;}
.menu-item:hover{background:var(--surface2);color:var(--text);}
.menu-item.active{background:var(--purple-light);color:var(--purple);font-weight:500;}
.menu-icon{font-size:16px;width:20px;text-align:center;}
.menu-badge{margin-left:auto;background:var(--red);color:#fff;border-radius:10px;font-size:10px;font-weight:700;padding:1px 6px;}

.main{padding:28px;}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.section-title{font-family:var(--serif);font-size:20px;font-weight:700;}
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;}
.sc-label{font-size:11px;color:var(--text3);margin-bottom:6px;}
.sc-val{font-family:var(--mono);font-size:22px;font-weight:700;}
.sc-sub{font-size:11px;color:var(--text3);margin-top:3px;}
.sc-val.purple{color:var(--purple);}
.sc-val.accent{color:var(--accent);}
.sc-val.amber{color:var(--amber);}

/* 검수 배정 카드 */
.check-list{display:flex;flex-direction:column;gap:10px;}
.check-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 20px;}
.cc-top{display:flex;align-items:flex-start;gap:14px;margin-bottom:12px;}
.cc-icon{font-size:22px;flex-shrink:0;}
.cc-info{flex:1;}
.cc-title{font-size:14px;font-weight:700;margin-bottom:3px;}
.cc-meta{font-size:12px;color:var(--text2);display:flex;gap:12px;flex-wrap:wrap;}
.cc-status{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;}
.s-assigned{background:var(--amber-light);color:var(--amber);}
.s-progress{background:var(--purple-light);color:var(--purple);}
.s-done{background:var(--accent-light);color:var(--accent);}

.check-criteria{background:var(--surface2);border-radius:8px;padding:10px 12px;margin-bottom:10px;}
.criteria-title{font-size:11px;font-weight:700;color:var(--text3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em;}
.criteria-list{display:flex;flex-direction:column;gap:4px;}
.criteria-item{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2);}
.ci-check{width:14px;height:14px;border-radius:4px;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:8px;cursor:pointer;flex-shrink:0;}
.ci-check.done{background:var(--accent);border-color:var(--accent);color:#fff;}

.cc-bottom{display:flex;align-items:center;justify-content:space-between;}
.cc-fee{font-family:var(--mono);font-size:16px;font-weight:700;color:var(--purple);}

/* 수수료 현황 */
.fee-card{background:linear-gradient(135deg,rgba(107,70,193,.08),rgba(107,70,193,.02));border:1.5px solid rgba(107,70,193,.2);border-radius:12px;padding:20px;margin-bottom:20px;display:flex;align-items:center;gap:24px;}
.fee-total{text-align:center;}
.ft-label{font-size:11px;color:var(--text3);margin-bottom:4px;}
.ft-amount{font-family:var(--mono);font-size:36px;font-weight:700;color:var(--purple);}
.ft-unit{font-size:13px;color:var(--text3);}
.fee-breakdown{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.fb-item{background:var(--surface);border-radius:8px;padding:10px;}
.fb-label{font-size:10px;color:var(--text3);margin-bottom:2px;}
.fb-val{font-family:var(--mono);font-size:16px;font-weight:700;}

/* ── 모바일 반응형 ── */
@media(max-width:768px){
  .layout, .main-layout { grid-template-columns:1fr!important; }
  .sidebar { position:static!important; height:auto!important; border-right:none!important; border-bottom:1px solid var(--border); }
  .preview-panel,.right-panel { display:none; }
  .main,.left-panel,.main-area { padding:16px!important; }
  .stat-row { grid-template-columns:1fr 1fr!important; }
  .header { padding:0 14px!important; }
  .nav-links { display:none!important; }
  .mob-menu-btn { display:flex!important; }
  .form-grid, .spec-grid { grid-template-columns:1fr!important; }
  .type-grid { grid-template-columns:repeat(2,1fr)!important; }
  .score-grid { grid-template-columns:1fr!important; }
  .compare-table { font-size:11px; }
  .compare-table th, .compare-table td { padding:8px 8px!important; }
  .eb-options { grid-template-columns:1fr!important; }
  .sign-grid { grid-template-columns:1fr!important; gap:20px!important; }
  .chat-layout { grid-template-columns:1fr!important; }
  .file-preview-grid { grid-template-columns:1fr 1fr!important; }
  .podium { grid-template-columns:1fr!important; }
  .makers-grid { grid-template-columns:1fr!important; }
  .summary-grid { grid-template-columns:1fr 1fr!important; }
  .ql-grid { grid-template-columns:1fr!important; }
  .filter-panel { display:none; }
  .page { grid-template-columns:1fr!important; }
}
@media(max-width:480px){
  .stat-row { grid-template-columns:1fr!important; }
  .summary-grid { grid-template-columns:1fr!important; }
  .hero-title { font-size:24px!important; }
  .btn { padding:7px 12px!important; font-size:12px!important; }
}
/* ── END 모바일 ── */


/* ── 다크모드 ── */
[data-theme="dark"]{
  --bg:#0d1117;--surface:#161b27;--surface2:#1c2333;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --text:#e8eaf2;--text2:#8b92b3;--text3:#4a5270;
}
[data-theme="dark"] .logo-name,[data-theme="dark"] .page-title{color:var(--text);}
[data-theme="dark"] input,[data-theme="dark"] select,[data-theme="dark"] textarea{background:var(--surface2);color:var(--text);border-color:var(--border2);}
[data-theme="dark"] .header{background:var(--surface);border-color:var(--border);}
/* ── END 다크모드 ── */

</style>

<script>
/* ================================================================
   PCM.js — 공공콘텐츠마켓 공통 상태 관리 모듈 v3
   모든 HTML에서 <\x3cscript src="pcm.js"><\/script>로 로드
   ================================================================ */

const PCM = (() => {
  /* ── 기본 스토리지 ── */
  const KEY = k => 'pcm_' + k;
  const set  = (k, v)  => { try { sessionStorage.setItem(KEY(k), JSON.stringify(v)); } catch(e) {} };
  const get  = (k, d=null) => { try { const v = sessionStorage.getItem(KEY(k)); return v != null ? JSON.parse(v) : d; } catch(e) { return d; } };
  const del  = k => sessionStorage.removeItem(KEY(k));

  /* ── 금액 계산 ── */
  const breakdown = vatIncl => {
    const supply = Math.round(vatIncl / 1.1);
    return { vatIncl, supply, vat: vatIncl - supply, comm: Math.round(supply * 0.05), biz: Math.round(supply * 0.95) };
  };
  const fw  = v => Math.round(v).toLocaleString() + '원';
  const fmw = v => (Math.round(v) / 10000).toLocaleString() + '만원';

  /* ── 과업 / 견적 공유 ── */
  const saveTask   = t => set('currentTask', t);
  const getTask    = ()  => get('currentTask', null);
  const saveQuote  = q => set('latestQuote', q);
  const getQuote   = ()  => get('latestQuote', null);
  const getConfirmedAmount = () => get('confirmedAmount', null);

  /* ── 프로젝트 목록 ── */
  const getProjects = () => get('projects', []);
  const saveProject = p => {
    const list = getProjects();
    const idx = list.findIndex(x => x.id === p.id);
    if (idx >= 0) list[idx] = p; else list.unshift(p);
    set('projects', list.slice(0, 50));
  };

  /* ── 알림 시스템 ── */
  const pushNotif = n => {
    const list = get('notifs', []);
    list.unshift({ id: 'n-' + Date.now(), unread: true, time: '방금', ...n });
    set('notifs', list.slice(0, 50));
    _updateBadge();
  };
  const getNotifs  = () => get('notifs', []);
  const markRead   = () => { set('notifs', getNotifs().map(n => ({ ...n, unread: false }))); _updateBadge(); };
  const unreadCount = () => getNotifs().filter(n => n.unread).length;
  const _updateBadge = () => {
    const cnt = unreadCount();
    document.querySelectorAll('[data-notif-badge]').forEach(el => {
      el.textContent = cnt || '';
      el.style.display = cnt ? '' : 'none';
    });
  };

  /* ── 로딩 버튼 ── */
  const showLoading = (btn, text = '처리 중...') => {
    if (!btn) return;
    btn._origHTML = btn.innerHTML;
    btn.disabled = true;
    if (!document.getElementById('pcmSpinStyle')) {
      const s = document.createElement('style');
      s.id = 'pcmSpinStyle';
      s.textContent = '@keyframes pcmSpin{to{transform:rotate(360deg)}}';
      document.head.appendChild(s);
    }
    btn.innerHTML = `<span style="display:inline-block;width:14px;height:14px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:pcmSpin .7s linear infinite;vertical-align:middle;margin-right:6px;"></span>${text}`;
  };
  const hideLoading = btn => {
    if (btn && btn._origHTML != null) { btn.disabled = false; btn.innerHTML = btn._origHTML; }
  };

  /* ── 토스트 ── */
  const toast = (msg, type = 'info') => {
    const colors = { info: '#1a1f2e', success: '#1a6b4a', error: '#dc3545', warn: '#b45309' };
    const icons  = { info: 'ℹ️', success: '✅', error: '❌', warn: '⚠️' };
    let t = document.getElementById('pcmToast');
    if (!t) {
      t = document.createElement('div');
      t.id = 'pcmToast';
      t.style.cssText = 'position:fixed;bottom:24px;right:24px;border-radius:10px;padding:12px 18px;font-size:13px;font-family:sans-serif;z-index:9999;transition:all .3s;opacity:0;transform:translateY(60px);display:flex;align-items:center;gap:8px;max-width:340px;box-shadow:0 4px 24px rgba(0,0,0,.22);color:#fff;pointer-events:none;';
      document.body.appendChild(t);
    }
    t.style.background = colors[type] || colors.info;
    t.innerHTML = `<span style="flex-shrink:0;">${icons[type] || ''}</span><span>${msg}</span>`;
    t.style.opacity = '1';
    t.style.transform = 'translateY(0)';
    clearTimeout(t._timer);
    t._timer = setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateY(60px)'; }, 3400);
  };

  /* ── 폼 유효성 검사 ── */
  const validate = rules => {
    let ok = true;
    rules.forEach(({ id, label, required, minLen, type: ftype }) => {
      const el = document.getElementById(id);
      if (!el) return;
      const v = (el.value || '').trim();
      let msg = '';
      if (required && !v) msg = `${label}을(를) 입력해주세요.`;
      else if (minLen && v.length < minLen) msg = `${label}은(는) ${minLen}자 이상이어야 합니다.`;
      else if (ftype === 'email' && v && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v)) msg = '올바른 이메일 형식이 아닙니다.';
      let errEl = document.getElementById(id + '-err');
      if (!errEl) {
        errEl = document.createElement('div');
        errEl.id = id + '-err';
        errEl.style.cssText = 'font-size:11px;color:#dc3545;margin-top:3px;';
        if (el.parentNode) el.parentNode.appendChild(errEl);
      }
      if (msg) { ok = false; errEl.textContent = msg; el.style.setProperty('border-color', '#dc3545', 'important'); }
      else { errEl.textContent = ''; el.style.removeProperty('border-color'); }
    });
    return ok;
  };

  /* ── 폼 자동 임시저장 ── */
  const autoSave = (formId, storageKey) => {
    const form = document.getElementById(formId);
    if (!form) return;
    const save = () => {
      const data = {};
      form.querySelectorAll('input, select, textarea').forEach(el => { if (el.id) data[el.id] = el.value; });
      set(storageKey, data);
    };
    form.addEventListener('input', save);
    form.addEventListener('change', save);
    // 새로고침 경고
    window.addEventListener('beforeunload', e => {
      const saved = get(storageKey, {});
      if (Object.values(saved).some(v => v)) {
        e.preventDefault();
        e.returnValue = '작성 중인 내용이 있습니다. 페이지를 떠나시겠습니까?';
      }
    });
    // 기존 임시저장 복원
    const saved = get(storageKey, {});
    if (saved) {
      Object.entries(saved).forEach(([k, v]) => {
        const el = document.getElementById(k);
        if (el && !el.value) el.value = v;
      });
    }
  };

  /* ── 로그아웃 (세션 완전 정리) ── */
  const logout = () => {
    // PCM 키 전부 삭제
    const keys = Object.keys(sessionStorage).filter(k => k.startsWith('pcm_'));
    keys.forEach(k => sessionStorage.removeItem(k));
    // 기타 앱 키
    ['userType', 'userEmail', 'onboarded', 'onboarding_from'].forEach(k => sessionStorage.removeItem(k));
    window.location.href = '로그인.html';
  };

  /* ── 알림 렌더 헬퍼 (마이페이지 등에서 사용) ── */
  const renderNotifList = (containerId) => {
    const el = document.getElementById(containerId);
    if (!el) return;
    const notifs = getNotifs();
    markRead();
    if (!notifs.length) {
      el.innerHTML = '<div style="text-align:center;padding:32px;color:#8492a6;font-size:13px;">알림이 없습니다</div>';
      return;
    }
    el.innerHTML = notifs.slice(0, 20).map(n => `
      <div style="display:flex;gap:12px;padding:14px 0;border-bottom:1px solid rgba(0,0,0,0.08);cursor:pointer;">
        <div style="font-size:20px;flex-shrink:0;">${n.icon || '🔔'}</div>
        <div style="flex:1;">
          <div style="font-size:13px;font-weight:500;margin-bottom:2px;">${n.title || ''}</div>
          <div style="font-size:12px;color:#8492a6;">${n.sub || ''}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
          <div style="font-size:11px;color:#8492a6;white-space:nowrap;">${n.time || ''}</div>
          ${n.unread ? '<div style="width:8px;height:8px;border-radius:50%;background:#1a6b4a;flex-shrink:0;"></div>' : ''}
        </div>
      </div>`).join('');
  };

  /* ── 공개 API ── */
  return {
    set, get, del,
    breakdown, fw, fmw,
    saveTask, getTask, saveQuote, getQuote, getConfirmedAmount,
    saveProject, getProjects,
    pushNotif, getNotifs, markRead, unreadCount, renderNotifList,
    showLoading, hideLoading,
    toast, validate, autoSave, logout,
    _updateBadge,
  };
})();

/* 페이지 로드 시 뱃지 갱신 */
document.addEventListener('DOMContentLoaded', () => PCM._updateBadge());

</script>
</head>
<body>
<div class="header">
  <div style="display:flex;align-items:center;">
    <div class="logo" onclick="nav('랜딩페이지.html')">
      <div class="logo-mark">전</div>
      <div class="logo-name">공공콘텐츠마켓</div>
    </div>
    <div class="nav-links">
      <button class="nav-btn" onclick="nav('랭킹.html')">🏆 랭킹</button>
      <button class="nav-btn active">마이페이지</button>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:7px;padding:5px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;font-size:12px;">
    <div style="width:22px;height:22px;border-radius:50%;background:var(--purple-light);color:var(--purple);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;">김</div>
    <span>김민정 · 콘텐츠 전문가</span>
  <button class="btn btn-ghost btn-sm" onclick="nav('메시지.html')">💬 메시지</button>
  </div>
</div>

<div class="layout">
  <div class="sidebar">
    <div class="profile-block">
      <div class="avatar">👩</div>
      <div class="profile-name">김민정</div>
      <div class="profile-title">공공마케팅 전문가 · 경력 10년</div>
      <div class="rank-badge">🏆 전문가 랭킹 #1</div>
    </div>
    <div class="menu-item active" id="m-assigned" onclick="showSection('assigned')"><span class="menu-icon">📋</span>배정된 검수<span class="menu-badge">2</span></div>
    <div class="menu-item" id="m-history" onclick="showSection('history')"><span class="menu-icon">📁</span>검수 완료 내역</div>
    <div class="menu-item" id="m-fee" onclick="showSection('fee')"><span class="menu-icon">💜</span>수수료 수령 현황</div>
    <div class="menu-item" id="m-rank" onclick="showSection('rank')"><span class="menu-icon">🏆</span>랭킹·평점</div>
    <div class="menu-item" id="m-notif" onclick="showSection('notif')"><span class="menu-icon">🔔</span>알림<span class="menu-badge">1</span></div>
    <div class="menu-item" id="m-profile" onclick="showSection('profile')"><span class="menu-icon">👤</span>프로필 관리</div>
    <div style="margin-top:auto;padding-top:16px;border-top:1px solid var(--border);">
      <div class="menu-item" onclick="PCM.logout()"><span class="menu-icon">🚪</span>로그아웃</div>
    </div>
  </div>
  <div class="main" id="main-area"></div>
</div>

<script>
function nav(p){window.location.href=p;}

/* ── 다크모드 토글 ── */
(function(){
  var saved = localStorage.getItem('pcm_theme') || 'light';
  document.documentElement.setAttribute('data-theme', saved);
})();
function toggleDarkMode(){
  var cur = document.documentElement.getAttribute('data-theme')||'light';
  var next = cur==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('pcm_theme', next);
  var btn = document.getElementById('dark-toggle');
  if(btn) btn.textContent = next==='dark'?'☀️':'🌙';
}

function showSection(s){
  currentSection=s;
  document.querySelectorAll('.menu-item').forEach(m=>m.classList.remove('active'));
  document.getElementById('m-'+s).classList.add('active');
  renderMain();
}

function showPwChange(){
  const f=document.getElementById('pw-change-form');
  if(f) f.style.display=f.style.display==='none'?'block':'none';
}
function changePw(){
  const cur=document.getElementById('pw-current')?.value;
  const nw=document.getElementById('pw-new')?.value;
  const con=document.getElementById('pw-confirm')?.value;
  if(!cur){if(typeof PCM!=='undefined')PCM.toast('현재 비밀번호를 입력해주세요','error');return;}
  if(!nw||nw.length<8){if(typeof PCM!=='undefined')PCM.toast('새 비밀번호는 8자 이상이어야 합니다','error');return;}
  if(nw!==con){if(typeof PCM!=='undefined')PCM.toast('새 비밀번호가 일치하지 않습니다','error');return;}
  if(typeof PCM!=='undefined')PCM.toast('비밀번호가 변경되었습니다','success');
  document.getElementById('pw-change-form').style.display='none';
}
function renderMain(){
  const el=document.getElementById('main-area');
  if(currentSection==='assigned') el.innerHTML=renderAssigned();
  else if(currentSection==='history') el.innerHTML=renderHistory();
  else if(currentSection==='fee') el.innerHTML=renderFee();
  else if(currentSection==='rank') el.innerHTML=renderRank();
  else if(currentSection==='notif') el.innerHTML=renderNotif();
  else el.innerHTML=renderProfile();
}
