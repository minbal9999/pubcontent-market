<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>하자보수 신고 — 공공콘텐츠마켓</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@600;700&family=JetBrains+Mono:wght@400;500&display=swap');
:root{
  --bg:#f4f2ed;--surface:#fff;--surface2:#f9f8f5;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);
  --text:#1a1f2e;--text2:#4a5568;--text3:#8492a6;
  --accent:#1a6b4a;--accent2:#2d9e72;--accent-light:#e8f5ef;
  --amber:#b45309;--amber-light:#fef3c7;
  --red:#dc3545;--red-light:#fce8e6;
  --serif:'Noto Serif KR',serif;--sans:'Noto Sans KR',sans-serif;
  --mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;min-height:100vh;}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.logo{display:flex;align-items:center;gap:10px;cursor:pointer;}
.logo-mark{width:28px;height:28px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-weight:700;font-size:12px;color:#fff;}
.logo-name{font-family:var(--serif);font-size:14px;font-weight:700;}
.logo-role{font-size:11px;color:var(--text3);background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:2px 8px;margin-left:6px;}
.btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:none;font-family:var(--sans);transition:all .15s;display:inline-flex;align-items:center;gap:6px;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{background:var(--accent2);}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--text2);}
.btn-ghost:hover{background:var(--surface2);}
.btn-danger{background:var(--red-light);color:var(--red);border:1px solid rgba(220,53,69,.2);}
.btn-sm{padding:5px 12px;font-size:12px;}
.main{max-width:680px;margin:0 auto;padding:32px 24px;}
.page-title{font-family:var(--serif);font-size:22px;font-weight:700;margin-bottom:4px;}
.page-sub{font-size:13px;color:var(--text2);font-weight:300;margin-bottom:24px;}

/* D-DAY 게이지 */
.warranty-gauge{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:20px;}
.wg-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.wg-title{font-size:13px;font-weight:700;}
.wg-day{font-family:var(--mono);font-size:28px;font-weight:700;color:var(--red);}
.wg-day-label{font-size:11px;color:var(--text3);margin-top:2px;text-align:right;}
.gauge-track{height:8px;background:var(--border);border-radius:4px;overflow:hidden;margin-bottom:8px;}
.gauge-fill{height:100%;border-radius:4px;transition:width .6s ease;}
.gauge-dates{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);}

/* 이전 프로젝트 요약 */
.project-summary{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:20px;}
.ps-title{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:10px;text-transform:uppercase;letter-spacing:.06em;}
.ps-row{display:flex;justify-content:space-between;padding:5px 0;font-size:12px;border-bottom:1px solid var(--border);}
.ps-row:last-child{border-bottom:none;}
.ps-key{color:var(--text3);}
.ps-val{font-weight:500;}

/* 카드 */
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:14px;}
.card-title{font-size:14px;font-weight:700;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.card-num{width:22px;height:22px;border-radius:50%;background:var(--red-light);color:var(--red);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;}

/* 하자 유형 */
.defect-types{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.dt-item{border:1.5px solid var(--border);border-radius:10px;padding:12px;cursor:pointer;transition:all .15s;text-align:center;}
.dt-item:hover{border-color:var(--red);}
.dt-item.selected{border-color:var(--red);background:var(--red-light);}
.dt-icon{font-size:22px;margin-bottom:6px;}
.dt-name{font-size:12px;font-weight:600;}
.dt-desc{font-size:10px;color:var(--text3);}

/* 폼 */
.form-group{display:flex;flex-direction:column;gap:5px;margin-bottom:12px;}
label{font-size:12px;font-weight:500;color:var(--text2);}
input[type=text],select,textarea{background:var(--surface2);border:1.5px solid var(--border2);border-radius:8px;color:var(--text);font-family:var(--sans);font-size:13px;padding:9px 12px;outline:none;width:100%;transition:border-color .15s;}
input[type=text]:focus,select:focus,textarea:focus{border-color:var(--red);}
input[type=text]::placeholder,textarea::placeholder{color:var(--text3);}
textarea{resize:vertical;min-height:90px;}
.severity-chips{display:flex;gap:8px;}
.sc-chip{padding:7px 16px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1.5px solid var(--border2);background:transparent;font-family:var(--sans);transition:all .15s;}
.sc-chip.sel-high{border-color:var(--red);background:var(--red-light);color:var(--red);}
.sc-chip.sel-mid{border-color:var(--amber);background:var(--amber-light);color:var(--amber);}
.sc-chip.sel-low{border-color:var(--accent);background:var(--accent-light);color:var(--accent);}

/* 파일 첨부 */
.file-zone{border:2px dashed var(--border2);border-radius:10px;padding:16px;text-align:center;cursor:pointer;transition:all .15s;background:var(--surface2);}
.file-zone:hover{border-color:var(--red);background:var(--red-light);}

/* 프로세스 안내 */
.process-steps{display:flex;flex-direction:column;gap:0;}
.ps-item{display:flex;gap:14px;padding:12px 0;border-bottom:1px solid var(--border);}
.ps-item:last-child{border-bottom:none;}
.psi-num{width:26px;height:26px;border-radius:50%;background:var(--amber-light);color:var(--amber);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.psi-title{font-size:13px;font-weight:600;margin-bottom:2px;}
.psi-desc{font-size:12px;color:var(--text2);}

/* 주의 박스 */
.warn-box{background:var(--red-light);border:1px solid rgba(220,53,69,.2);border-radius:10px;padding:14px;margin-bottom:14px;font-size:12px;color:var(--red);line-height:1.7;}

/* 성공 */
.success-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:40px;text-align:center;}
.sc-icon{font-size:52px;margin-bottom:14px;display:block;animation:pop .5s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes pop{from{opacity:0;transform:scale(.5)}to{opacity:1;transform:scale(1)}}

@media(max-width:768px){.defect-types{grid-template-columns:1fr;}}

/* ── 다크모드 ── */
[data-theme="dark"]{
  --bg:#0d1117;--surface:#161b27;--surface2:#1c2333;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --text:#e8eaf2;--text2:#8b92b3;--text3:#4a5270;
}
[data-theme="dark"] .logo-name,[data-theme="dark"] .page-title{color:var(--text);}
[data-theme="dark"] input,[data-theme="dark"] select,[data-theme="dark"] textarea{background:var(--surface2);color:var(--text);border-color:var(--border2);}
[data-theme="dark"] .header{background:var(--surface);border-color:var(--border);}
/* ── END 다크모드 ── */

</style>

<script>
/* ================================================================
   PCM.js — 공공콘텐츠마켓 공통 상태 관리 모듈 v3
   모든 HTML에서 <\x3cscript src="pcm.js"><\/script>로 로드
   ================================================================ */

const PCM = (() => {
  /* ── 기본 스토리지 ── */
  const KEY = k => 'pcm_' + k;
  const set  = (k, v)  => { try { sessionStorage.setItem(KEY(k), JSON.stringify(v)); } catch(e) {} };
  const get  = (k, d=null) => { try { const v = sessionStorage.getItem(KEY(k)); return v != null ? JSON.parse(v) : d; } catch(e) { return d; } };
  const del  = k => sessionStorage.removeItem(KEY(k));

  /* ── 금액 계산 ── */
  const breakdown = vatIncl => {
    const supply = Math.round(vatIncl / 1.1);
    return { vatIncl, supply, vat: vatIncl - supply, comm: Math.round(supply * 0.05), biz: Math.round(supply * 0.95) };
  };
  const fw  = v => Math.round(v).toLocaleString() + '원';
  const fmw = v => (Math.round(v) / 10000).toLocaleString() + '만원';

  /* ── 과업 / 견적 공유 ── */
  const saveTask   = t => set('currentTask', t);
  const getTask    = ()  => get('currentTask', null);
  const saveQuote  = q => set('latestQuote', q);
  const getQuote   = ()  => get('latestQuote', null);
  const getConfirmedAmount = () => get('confirmedAmount', null);

  /* ── 프로젝트 목록 ── */
  const getProjects = () => get('projects', []);
  const saveProject = p => {
    const list = getProjects();
    const idx = list.findIndex(x => x.id === p.id);
    if (idx >= 0) list[idx] = p; else list.unshift(p);
    set('projects', list.slice(0, 50));
  };

  /* ── 알림 시스템 ── */
  const pushNotif = n => {
    const list = get('notifs', []);
    list.unshift({ id: 'n-' + Date.now(), unread: true, time: '방금', ...n });
    set('notifs', list.slice(0, 50));
    _updateBadge();
  };
  const getNotifs  = () => get('notifs', []);
  const markRead   = () => { set('notifs', getNotifs().map(n => ({ ...n, unread: false }))); _updateBadge(); };
  const unreadCount = () => getNotifs().filter(n => n.unread).length;
  const _updateBadge = () => {
    const cnt = unreadCount();
    document.querySelectorAll('[data-notif-badge]').forEach(el => {
      el.textContent = cnt || '';
      el.style.display = cnt ? '' : 'none';
    });
  };

  /* ── 로딩 버튼 ── */
  const showLoading = (btn, text = '처리 중...') => {
    if (!btn) return;
    btn._origHTML = btn.innerHTML;
    btn.disabled = true;
    if (!document.getElementById('pcmSpinStyle')) {
      const s = document.createElement('style');
      s.id = 'pcmSpinStyle';
      s.textContent = '@keyframes pcmSpin{to{transform:rotate(360deg)}}';
      document.head.appendChild(s);
    }
    btn.innerHTML = `<span style="display:inline-block;width:14px;height:14px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:pcmSpin .7s linear infinite;vertical-align:middle;margin-right:6px;"></span>${text}`;
  };
  const hideLoading = btn => {
    if (btn && btn._origHTML != null) { btn.disabled = false; btn.innerHTML = btn._origHTML; }
  };

  /* ── 토스트 ── */
  const toast = (msg, type = 'info') => {
    const colors = { info: '#1a1f2e', success: '#1a6b4a', error: '#dc3545', warn: '#b45309' };
    const icons  = { info: 'ℹ️', success: '✅', error: '❌', warn: '⚠️' };
    let t = document.getElementById('pcmToast');
    if (!t) {
      t = document.createElement('div');
      t.id = 'pcmToast';
      t.style.cssText = 'position:fixed;bottom:24px;right:24px;border-radius:10px;padding:12px 18px;font-size:13px;font-family:sans-serif;z-index:9999;transition:all .3s;opacity:0;transform:translateY(60px);display:flex;align-items:center;gap:8px;max-width:340px;box-shadow:0 4px 24px rgba(0,0,0,.22);color:#fff;pointer-events:none;';
      document.body.appendChild(t);
    }
    t.style.background = colors[type] || colors.info;
    t.innerHTML = `<span style="flex-shrink:0;">${icons[type] || ''}</span><span>${msg}</span>`;
    t.style.opacity = '1';
    t.style.transform = 'translateY(0)';
    clearTimeout(t._timer);
    t._timer = setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateY(60px)'; }, 3400);
  };

  /* ── 폼 유효성 검사 ── */
  const validate = rules => {
    let ok = true;
    rules.forEach(({ id, label, required, minLen, type: ftype }) => {
      const el = document.getElementById(id);
      if (!el) return;
      const v = (el.value || '').trim();
      let msg = '';
      if (required && !v) msg = `${label}을(를) 입력해주세요.`;
      else if (minLen && v.length < minLen) msg = `${label}은(는) ${minLen}자 이상이어야 합니다.`;
      else if (ftype === 'email' && v && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v)) msg = '올바른 이메일 형식이 아닙니다.';
      let errEl = document.getElementById(id + '-err');
      if (!errEl) {
        errEl = document.createElement('div');
        errEl.id = id + '-err';
        errEl.style.cssText = 'font-size:11px;color:#dc3545;margin-top:3px;';
        if (el.parentNode) el.parentNode.appendChild(errEl);
      }
      if (msg) { ok = false; errEl.textContent = msg; el.style.setProperty('border-color', '#dc3545', 'important'); }
      else { errEl.textContent = ''; el.style.removeProperty('border-color'); }
    });
    return ok;
  };

  /* ── 폼 자동 임시저장 ── */
  const autoSave = (formId, storageKey) => {
    const form = document.getElementById(formId);
    if (!form) return;
    const save = () => {
      const data = {};
      form.querySelectorAll('input, select, textarea').forEach(el => { if (el.id) data[el.id] = el.value; });
      set(storageKey, data);
    };
    form.addEventListener('input', save);
    form.addEventListener('change', save);
    // 새로고침 경고
    window.addEventListener('beforeunload', e => {
      const saved = get(storageKey, {});
      if (Object.values(saved).some(v => v)) {
        e.preventDefault();
        e.returnValue = '작성 중인 내용이 있습니다. 페이지를 떠나시겠습니까?';
      }
    });
    // 기존 임시저장 복원
    const saved = get(storageKey, {});
    if (saved) {
      Object.entries(saved).forEach(([k, v]) => {
        const el = document.getElementById(k);
        if (el && !el.value) el.value = v;
      });
    }
  };

  /* ── 로그아웃 (세션 완전 정리) ── */
  const logout = () => {
    // PCM 키 전부 삭제
    const keys = Object.keys(sessionStorage).filter(k => k.startsWith('pcm_'));
    keys.forEach(k => sessionStorage.removeItem(k));
    // 기타 앱 키
    ['userType', 'userEmail', 'onboarded', 'onboarding_from'].forEach(k => sessionStorage.removeItem(k));
    window.location.href = '로그인.html';
  };

  /* ── 알림 렌더 헬퍼 (마이페이지 등에서 사용) ── */
  const renderNotifList = (containerId) => {
    const el = document.getElementById(containerId);
    if (!el) return;
    const notifs = getNotifs();
    markRead();
    if (!notifs.length) {
      el.innerHTML = '<div style="text-align:center;padding:32px;color:#8492a6;font-size:13px;">알림이 없습니다</div>';
      return;
    }
    el.innerHTML = notifs.slice(0, 20).map(n => `
      <div style="display:flex;gap:12px;padding:14px 0;border-bottom:1px solid rgba(0,0,0,0.08);cursor:pointer;">
        <div style="font-size:20px;flex-shrink:0;">${n.icon || '🔔'}</div>
        <div style="flex:1;">
          <div style="font-size:13px;font-weight:500;margin-bottom:2px;">${n.title || ''}</div>
          <div style="font-size:12px;color:#8492a6;">${n.sub || ''}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
          <div style="font-size:11px;color:#8492a6;white-space:nowrap;">${n.time || ''}</div>
          ${n.unread ? '<div style="width:8px;height:8px;border-radius:50%;background:#1a6b4a;flex-shrink:0;"></div>' : ''}
        </div>
      </div>`).join('');
  };

  /* ── 공개 API ── */
  return {
    set, get, del,
    breakdown, fw, fmw,
    saveTask, getTask, saveQuote, getQuote, getConfirmedAmount,
    saveProject, getProjects,
    pushNotif, getNotifs, markRead, unreadCount, renderNotifList,
    showLoading, hideLoading,
    toast, validate, autoSave, logout,
    _updateBadge,
  };
})();

/* 페이지 로드 시 뱃지 갱신 */
document.addEventListener('DOMContentLoaded', () => PCM._updateBadge());

</script>
</head>
<body>
<div class="header">
  <div style="display:flex;align-items:center;">
    <div class="logo" onclick="nav('마이페이지_발주처.html')">
      <div class="logo-mark">공</div>
      <div class="logo-name">공공콘텐츠마켓</div>
      <span class="logo-role">발주처</span>
    </div>
  </div>
  <button class="btn btn-ghost btn-sm" onclick="nav('마이페이지_발주처.html')">← 마이페이지</button>
</div>

<div class="main" id="main"></div>

<script>



function nav(p){window.location.href=p;}

/* ── 다크모드 토글 ── */
(function(){
  var saved = localStorage.getItem('pcm_theme') || 'light';
  document.documentElement.setAttribute('data-theme', saved);
})();
function toggleDarkMode(){
  var cur = document.documentElement.getAttribute('data-theme')||'light';
  var next = cur==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('pcm_theme', next);
  var btn = document.getElementById('dark-toggle');
  if(btn) btn.textContent = next==='dark'?'☀️':'🌙';
}
/* ── END 다크모드 ── */


const PROJECT = {
  title: '탄소중립 SNS 카드뉴스 제작',
  maker: '㈜ 그린스튜디오',
  completedAt: '2025.04.20',
  warrantyEnd: '2025.05.20',
  amount: 18000000,
};

// 하자보수 기간 계산
const today = new Date();
const warrantyEndDate = new Date('2025-05-20');
const completedDate = new Date('2025-04-20');
const totalDays = Math.round((warrantyEndDate - completedDate) / 86400000);
const elapsedDays = Math.round((today - completedDate) / 86400000);
const remainDays = Math.max(0, totalDays - elapsedDays);
const pct = Math.min(100, (elapsedDays / totalDays) * 100);
const gaugeColor = remainDays <= 7 ? 'var(--red)' : remainDays <= 14 ? 'var(--amber)' : 'var(--accent)';

let selectedType = null;
let selectedSeverity = '';
let submitted = false;

const DEFECT_TYPES = [
  {id:'content', icon:'📝', name:'내용 오류', desc:'사실 오류, 수치 불일치'},
  {id:'copyright', icon:'⚖️', name:'저작권 문제', desc:'무단 이미지, 폰트 침해'},
  {id:'quality', icon:'🎨', name:'품질 불량', desc:'해상도, 색상, 인쇄 불량'},
  {id:'missing', icon:'📦', name:'납품 누락', desc:'계약서 명시 항목 미납'},
  {id:'guide', icon:'📋', name:'가이드라인 위반', desc:'공공언어, 디자인 지침 불이행'},
  {id:'other', icon:'❓', name:'기타', desc:'위 항목에 해당하지 않는 경우'},
];

function render(){
  const el = document.getElementById('main');
  if(submitted){ el.innerHTML = renderSuccess(); return; }

  el.innerHTML = `
    <div class="page-title">하자보수 신고</div>
    <div class="page-sub">납품 완료 후 30일 내 발견된 하자를 신고할 수 있습니다</div>

    <!-- 하자보수 기간 게이지 -->
    <div class="warranty-gauge">
      <div class="wg-top">
        <div>
          <div class="wg-title">하자보수 보증 기간</div>
          <div style="font-size:12px;color:var(--text3);margin-top:2px;">완료일: ${PROJECT.completedAt} · 만료일: ${PROJECT.warrantyEnd}</div>
        </div>
        <div style="text-align:right;">
          <div class="wg-day" style="color:${gaugeColor};">D-${remainDays}</div>
          <div class="wg-day-label">${remainDays > 0 ? '신고 가능' : '기간 만료'}</div>
        </div>
      </div>
      <div class="gauge-track">
        <div class="gauge-fill" style="width:${pct}%;background:${gaugeColor};"></div>
      </div>
      <div class="gauge-dates">
        <span>${PROJECT.completedAt} 완료</span>
        <span style="color:${remainDays<=7?'var(--red)':'var(--text3)'};">${PROJECT.warrantyEnd} 만료</span>
      </div>
    </div>

    <!-- 프로젝트 정보 -->
    <div class="project-summary">
      <div class="ps-title">신고 대상 프로젝트</div>
      <div class="ps-row"><span class="ps-key">과업명</span><span class="ps-val">${PROJECT.title}</span></div>
      <div class="ps-row"><span class="ps-key">제작사</span><span class="ps-val">${PROJECT.maker}</span></div>
      <div class="ps-row"><span class="ps-key">계약 금액</span><span class="ps-val" style="font-family:var(--mono);">${PROJECT.amount.toLocaleString()}원</span></div>
    </div>

    ${remainDays === 0 ? '<div class="warn-box">⚠️ 하자보수 보증 기간이 만료되었습니다. 더 이상 신고할 수 없습니다.</div>' : ''}

    <!-- 하자 유형 -->
    <div class="card">
      <div class="card-title"><div class="card-num">1</div>하자 유형 선택</div>
      <div class="defect-types">
        ${DEFECT_TYPES.map(t=>`
          <div class="dt-item ${selectedType===t.id?'selected':''}" onclick="selectType('${t.id}')">
            <div class="dt-icon">${t.icon}</div>
            <div class="dt-name">${t.name}</div>
            <div class="dt-desc">${t.desc}</div>
          </div>`).join('')}
      </div>
    </div>

    <!-- 상세 내용 -->
    <div class="card">
      <div class="card-title"><div class="card-num">2</div>하자 상세</div>
      <div class="form-group">
        <label>심각도</label>
        <div class="severity-chips">
          ${['high','mid','low'].map(s=>`
            <button class="sc-chip ${selectedSeverity===s?`sel-${s}`:''}" onclick="setSeverity('${s}')">
              ${s==='high'?'🔴 긴급':s==='mid'?'🟡 보통':'🟢 경미'}
            </button>`).join('')}
        </div>
      </div>
      <div class="form-group">
        <label>하자 위치 / 파일명</label>
        <input type="text" id="defect-location" placeholder="예: 3번 슬라이드, 탄소중립_카드뉴스_JPG.zip">
      </div>
      <div class="form-group">
        <label>하자 상세 내용 <span style="color:var(--red);font-size:11px;">*</span></label>
        <textarea id="defect-desc" placeholder="발견된 하자의 구체적 내용, 재현 방법, 기대 결과 대비 실제 결과를 상세히 작성해주세요."></textarea>
      </div>
      <div class="form-group">
        <label>증거 파일 첨부 <span style="font-size:10px;color:var(--text3);">(선택 · 스크린샷, 비교 이미지 등)</span></label>
        <div class="file-zone" onclick="attachEvidence()">
          <div style="font-size:22px;opacity:.4;margin-bottom:6px;">📎</div>
          <div style="font-size:12px;color:var(--text2);">JPG · PNG · PDF · ZIP (최대 50MB)</div>
        </div>
      </div>
    </div>

    <!-- 처리 프로세스 -->
    <div class="card">
      <div class="card-title">하자보수 처리 프로세스</div>
      <div class="process-steps">
        <div class="ps-item"><div class="psi-num">1</div><div><div class="psi-title">신고 접수</div><div class="psi-desc">제작사에 하자보수 신고가 통보됩니다.</div></div></div>
        <div class="ps-item"><div class="psi-num">2</div><div><div class="psi-title">제작사 확인 (3영업일)</div><div class="psi-desc">제작사가 하자 내용을 확인하고 수용/이의 여부를 결정합니다.</div></div></div>
        <div class="ps-item"><div class="psi-num">3</div><div><div class="psi-title">보수 작업 (협의)</div><div class="psi-desc">수용 시 하자보수 작업 후 재납품합니다. 이의 시 플랫폼 운영자가 중재합니다.</div></div></div>
        <div class="ps-item"><div class="psi-num">4</div><div><div class="psi-title">최종 확인 및 종결</div><div class="psi-desc">발주처 확인 완료 시 하자보수 절차가 종결됩니다.</div></div></div>
      </div>
    </div>

    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:4px;">
      <button class="btn btn-ghost" onclick="nav('마이페이지_발주처.html')">취소</button>
      <button class="btn btn-danger" style="padding:10px 28px;" onclick="submitDefect()" ${remainDays===0?'disabled':''}>하자보수 신고 접수</button>
    </div>`;
}

function renderSuccess(){
  return`
    <div class="success-card">
      <span class="sc-icon">📋</span>
      <div style="font-family:var(--serif);font-size:20px;font-weight:700;margin-bottom:8px;">하자보수 신고 접수 완료</div>
      <div style="font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:20px;">
        ${PROJECT.maker}에 하자보수 신고가 전달되었습니다.<br>
        3영업일 내 처리 결과를 알려드립니다.
      </div>
      <div style="background:var(--surface2);border-radius:10px;padding:14px;text-align:left;margin-bottom:20px;font-size:12px;">
        <div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);">
          <span style="color:var(--text3);">신고 번호</span>
          <span style="font-family:var(--mono);font-weight:600;">HZ-${Date.now().toString().slice(-6)}</span>
        </div>
        <div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);">
          <span style="color:var(--text3);">접수 일시</span>
          <span style="font-weight:500;">${new Date().toLocaleString('ko-KR')}</span>
        </div>
        <div style="display:flex;justify-content:space-between;padding:5px 0;">
          <span style="color:var(--text3);">처리 기한</span>
          <span style="font-weight:500;color:var(--amber);">3영업일 내</span>
        </div>
      </div>
      <button class="btn btn-primary" style="width:100%;justify-content:center;padding:12px;" onclick="nav('마이페이지_발주처.html')">마이페이지로 이동</button>
    </div>`;
}

function selectType(id){ selectedType=id; render(); }
function setSeverity(s){ selectedSeverity=s; render(); }
function attachEvidence(){ toast('파일 첨부 기능은 실제 서비스에서 제공됩니다.'); }

function submitDefect(){
  const desc = document.getElementById('defect-desc')?.value?.trim();
  if(!selectedType){ toast('하자 유형을 선택해주세요'); return; }
  if(!selectedSeverity){ toast('심각도를 선택해주세요'); return; }
  if(!desc){ toast('하자 상세 내용을 입력해주세요'); return; }
  // 알림 push
  try{
    const list = JSON.parse(sessionStorage.getItem('pcm_notifs')||'[]');
    list.unshift({icon:'⚠️',title:'하자보수 신고 접수',sub:`${PROJECT.title} — ${PROJECT.maker}에 통보됨`,time:'방금',unread:true,id:'n-'+Date.now()});
    sessionStorage.setItem('pcm_notifs',JSON.stringify(list));
  }catch(e){}
  PCM.pushNotif({icon:'⚠️',title:'하자보수 신고 접수',sub:'제작사에게 하자보수 신고가 전달되었습니다. 3영업일 내 처리됩니다.',time:'방금'}); submitted=true; render(); window.scrollTo(0,0);
}

function toast(msg){
  let t=document.getElementById('t');
  if(!t){t=document.createElement('div');t.id='t';t.style.cssText='position:fixed;bottom:24px;right:24px;background:#1a1f2e;color:#fff;border-radius:10px;padding:11px 16px;font-size:13px;z-index:400;';document.body.appendChild(t);}
  t.textContent=msg;t.style.opacity='1';clearTimeout(t._t);t._t=setTimeout(()=>t.style.opacity='0',2500);
}

render();
</script>
</body>
</html>
