<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>에스크로 대금 예치 — 공공콘텐츠마켓</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@600;700&family=JetBrains+Mono:wght@400;500&display=swap');
:root{
  --bg:#f4f2ed;--surface:#fff;--surface2:#f9f8f5;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);
  --text:#1a1f2e;--text2:#4a5568;--text3:#8492a6;
  --accent:#1a6b4a;--accent2:#2d9e72;--accent-light:#e8f5ef;
  --amber:#b45309;--amber-light:#fef3c7;
  --blue:#1a56db;--blue-light:#e8f0fe;
  --red:#dc3545;
  --serif:'Noto Serif KR',serif;--sans:'Noto Sans KR',sans-serif;
  --mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;min-height:100vh;display:flex;flex-direction:column;}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:58px;display:flex;align-items:center;justify-content:space-between;}
.logo{display:flex;align-items:center;gap:10px;cursor:pointer;}
.logo-mark{width:28px;height:28px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-weight:700;font-size:12px;color:#fff;}
.logo-name{font-family:var(--serif);font-size:14px;font-weight:700;}
.btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:none;font-family:var(--sans);transition:all .15s;display:inline-flex;align-items:center;gap:6px;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{background:var(--accent2);}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--text2);}
.btn-ghost:hover{background:var(--surface2);}
.btn-sm{padding:5px 12px;font-size:12px;}

.main{flex:1;display:flex;align-items:flex-start;justify-content:center;padding:40px 24px;}
.wrap{width:100%;max-width:560px;}

.page-title{font-family:var(--serif);font-size:22px;font-weight:700;text-align:center;margin-bottom:4px;}
.page-sub{font-size:13px;color:var(--text2);text-align:center;margin-bottom:28px;font-weight:300;}

/* 금액 요약 카드 */
.amount-hero{background:var(--text);border-radius:16px;padding:24px;margin-bottom:20px;text-align:center;position:relative;overflow:hidden;}
.amount-hero::before{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;border-radius:50%;background:rgba(26,107,74,.15);}
.ah-label{font-size:11px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;}
.ah-amount{font-family:var(--mono);font-size:40px;font-weight:700;color:#fff;margin-bottom:4px;}
.ah-note{font-size:12px;color:rgba(255,255,255,.5);}
.ah-breakdown{display:grid;grid-template-columns:repeat(3,1fr);gap:0;margin-top:18px;padding-top:16px;border-top:1px solid rgba(255,255,255,.1);}
.ahb-item{text-align:center;padding:0 8px;}
.ahb-item+.ahb-item{border-left:1px solid rgba(255,255,255,.1);}
.ahb-val{font-family:var(--mono);font-size:14px;font-weight:700;margin-bottom:2px;}
.ahb-val.green{color:#1dd9a0;}
.ahb-val.amber{color:#f5c842;}
.ahb-val.white{color:#fff;}
.ahb-label{font-size:10px;color:rgba(255,255,255,.4);}

/* 카드 */
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:14px;}
.card-title{font-size:14px;font-weight:700;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.card-num{width:22px;height:22px;border-radius:50%;background:var(--accent-light);color:var(--accent);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;}

/* 계좌 정보 */
.bank-box{background:var(--surface2);border:1.5px solid var(--accent);border-radius:10px;padding:16px;display:flex;align-items:center;gap:16px;}
.bb-icon{font-size:28px;flex-shrink:0;}
.bb-info{}
.bb-name{font-size:13px;font-weight:700;margin-bottom:2px;}
.bb-account{font-family:var(--mono);font-size:16px;font-weight:700;color:var(--accent);margin-bottom:2px;}
.bb-copy{font-size:11px;color:var(--accent);cursor:pointer;text-decoration:underline;text-underline-offset:2px;}
.bb-note{font-size:11px;color:var(--text3);}

/* 결제 방법 */
.pay-methods{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.pm-item{border:1.5px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;transition:all .15s;text-align:center;}
.pm-item:hover{border-color:var(--accent);}
.pm-item.selected{border-color:var(--accent);background:var(--accent-light);}
.pm-icon{font-size:24px;margin-bottom:6px;}
.pm-name{font-size:13px;font-weight:600;margin-bottom:2px;}
.pm-desc{font-size:11px;color:var(--text3);}

/* 확인 체크 */
.confirm-checks{display:flex;flex-direction:column;gap:8px;}
.cc-item{display:flex;align-items:flex-start;gap:10px;font-size:12px;color:var(--text2);cursor:pointer;}
input[type=checkbox]{width:16px;height:16px;accent-color:var(--accent);margin-top:1px;flex-shrink:0;cursor:pointer;}

/* NOTICE */
.notice{border-radius:10px;padding:12px 14px;margin-bottom:14px;font-size:12px;line-height:1.65;}
.notice-info{background:var(--blue-light);border:1px solid rgba(26,86,219,.15);color:var(--blue);}
.notice-warn{background:var(--amber-light);border:1px solid rgba(180,83,9,.15);color:var(--amber);}

/* SUCCESS */
.success-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:36px;text-align:center;margin-bottom:16px;}
.sc-icon{font-size:56px;margin-bottom:14px;display:block;animation:pop .5s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes pop{from{opacity:0;transform:scale(.5)}to{opacity:1;transform:scale(1)}}
.sc-title{font-family:var(--serif);font-size:20px;font-weight:700;margin-bottom:6px;}
.sc-sub{font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:20px;}
.sc-info{background:var(--accent-light);border-radius:8px;padding:14px;text-align:left;}
.sci-row{display:flex;justify-content:space-between;font-size:12px;padding:5px 0;border-bottom:1px solid rgba(26,107,74,.1);}
.sci-row:last-child{border-bottom:none;}
.sci-key{color:var(--text3);}
.sci-val{font-weight:600;font-family:var(--mono);}
.sci-val.accent{color:var(--accent);}

.toast{position:fixed;bottom:24px;right:24px;background:var(--text);color:#fff;border-radius:10px;padding:11px 16px;font-size:13px;transform:translateY(60px);opacity:0;transition:all .3s;z-index:300;}
.toast.show{transform:translateY(0);opacity:1;}

/* ── 모바일 반응형 ── */
@media(max-width:768px){
  .layout, .main-layout { grid-template-columns:1fr!important; }
  .sidebar { position:static!important; height:auto!important; border-right:none!important; border-bottom:1px solid var(--border); }
  .preview-panel,.right-panel { display:none; }
  .main,.left-panel,.main-area { padding:16px!important; }
  .stat-row { grid-template-columns:1fr 1fr!important; }
  .header { padding:0 14px!important; }
  .nav-links { display:none!important; }
  .mob-menu-btn { display:flex!important; }
  .form-grid, .spec-grid { grid-template-columns:1fr!important; }
  .type-grid { grid-template-columns:repeat(2,1fr)!important; }
  .score-grid { grid-template-columns:1fr!important; }
  .compare-table { font-size:11px; }
  .compare-table th, .compare-table td { padding:8px 8px!important; }
  .eb-options { grid-template-columns:1fr!important; }
  .sign-grid { grid-template-columns:1fr!important; gap:20px!important; }
  .chat-layout { grid-template-columns:1fr!important; }
  .file-preview-grid { grid-template-columns:1fr 1fr!important; }
  .podium { grid-template-columns:1fr!important; }
  .makers-grid { grid-template-columns:1fr!important; }
  .summary-grid { grid-template-columns:1fr 1fr!important; }
  .ql-grid { grid-template-columns:1fr!important; }
  .filter-panel { display:none; }
  .page { grid-template-columns:1fr!important; }
}
@media(max-width:480px){
  .stat-row { grid-template-columns:1fr!important; }
  .summary-grid { grid-template-columns:1fr!important; }
  .hero-title { font-size:24px!important; }
  .btn { padding:7px 12px!important; font-size:12px!important; }
}
/* ── END 모바일 ── */


/* ── 다크모드 ── */
[data-theme="dark"]{
  --bg:#0d1117;--surface:#161b27;--surface2:#1c2333;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --text:#e8eaf2;--text2:#8b92b3;--text3:#4a5270;
}
[data-theme="dark"] .logo-name,[data-theme="dark"] .page-title{color:var(--text);}
[data-theme="dark"] input,[data-theme="dark"] select,[data-theme="dark"] textarea{background:var(--surface2);color:var(--text);border-color:var(--border2);}
[data-theme="dark"] .header{background:var(--surface);border-color:var(--border);}
/* ── END 다크모드 ── */

</style>

<script>
/* ================================================================
   PCM.js — 공공콘텐츠마켓 공통 상태 관리 모듈 v3
   모든 HTML에서 <\x3cscript src="pcm.js"><\/script>로 로드
   ================================================================ */

const PCM = (() => {
  /* ── 기본 스토리지 ── */
  const KEY = k => 'pcm_' + k;
  const set  = (k, v)  => { try { sessionStorage.setItem(KEY(k), JSON.stringify(v)); } catch(e) {} };
  const get  = (k, d=null) => { try { const v = sessionStorage.getItem(KEY(k)); return v != null ? JSON.parse(v) : d; } catch(e) { return d; } };
  const del  = k => sessionStorage.removeItem(KEY(k));

  /* ── 금액 계산 ── */
  const breakdown = vatIncl => {
    const supply = Math.round(vatIncl / 1.1);
    return { vatIncl, supply, vat: vatIncl - supply, comm: Math.round(supply * 0.05), biz: Math.round(supply * 0.95) };
  };
  const fw  = v => Math.round(v).toLocaleString() + '원';
  const fmw = v => (Math.round(v) / 10000).toLocaleString() + '만원';

  /* ── 과업 / 견적 공유 ── */
  const saveTask   = t => set('currentTask', t);
  const getTask    = ()  => get('currentTask', null);
  const saveQuote  = q => set('latestQuote', q);
  const getQuote   = ()  => get('latestQuote', null);
  const getConfirmedAmount = () => get('confirmedAmount', null);

  /* ── 프로젝트 목록 ── */
  const getProjects = () => get('projects', []);
  const saveProject = p => {
    const list = getProjects();
    const idx = list.findIndex(x => x.id === p.id);
    if (idx >= 0) list[idx] = p; else list.unshift(p);
    set('projects', list.slice(0, 50));
  };

  /* ── 알림 시스템 ── */
  const pushNotif = n => {
    const list = get('notifs', []);
    list.unshift({ id: 'n-' + Date.now(), unread: true, time: '방금', ...n });
    set('notifs', list.slice(0, 50));
    _updateBadge();
  };
  const getNotifs  = () => get('notifs', []);
  const markRead   = () => { set('notifs', getNotifs().map(n => ({ ...n, unread: false }))); _updateBadge(); };
  const unreadCount = () => getNotifs().filter(n => n.unread).length;
  const _updateBadge = () => {
    const cnt = unreadCount();
    document.querySelectorAll('[data-notif-badge]').forEach(el => {
      el.textContent = cnt || '';
      el.style.display = cnt ? '' : 'none';
    });
  };

  /* ── 로딩 버튼 ── */
  const showLoading = (btn, text = '처리 중...') => {
    if (!btn) return;
    btn._origHTML = btn.innerHTML;
    btn.disabled = true;
    if (!document.getElementById('pcmSpinStyle')) {
      const s = document.createElement('style');
      s.id = 'pcmSpinStyle';
      s.textContent = '@keyframes pcmSpin{to{transform:rotate(360deg)}}';
      document.head.appendChild(s);
    }
    btn.innerHTML = `<span style="display:inline-block;width:14px;height:14px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:pcmSpin .7s linear infinite;vertical-align:middle;margin-right:6px;"></span>${text}`;
  };
  const hideLoading = btn => {
    if (btn && btn._origHTML != null) { btn.disabled = false; btn.innerHTML = btn._origHTML; }
  };

  /* ── 토스트 ── */
  const toast = (msg, type = 'info') => {
    const colors = { info: '#1a1f2e', success: '#1a6b4a', error: '#dc3545', warn: '#b45309' };
    const icons  = { info: 'ℹ️', success: '✅', error: '❌', warn: '⚠️' };
    let t = document.getElementById('pcmToast');
    if (!t) {
      t = document.createElement('div');
      t.id = 'pcmToast';
      t.style.cssText = 'position:fixed;bottom:24px;right:24px;border-radius:10px;padding:12px 18px;font-size:13px;font-family:sans-serif;z-index:9999;transition:all .3s;opacity:0;transform:translateY(60px);display:flex;align-items:center;gap:8px;max-width:340px;box-shadow:0 4px 24px rgba(0,0,0,.22);color:#fff;pointer-events:none;';
      document.body.appendChild(t);
    }
    t.style.background = colors[type] || colors.info;
    t.innerHTML = `<span style="flex-shrink:0;">${icons[type] || ''}</span><span>${msg}</span>`;
    t.style.opacity = '1';
    t.style.transform = 'translateY(0)';
    clearTimeout(t._timer);
    t._timer = setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateY(60px)'; }, 3400);
  };

  /* ── 폼 유효성 검사 ── */
  const validate = rules => {
    let ok = true;
    rules.forEach(({ id, label, required, minLen, type: ftype }) => {
      const el = document.getElementById(id);
      if (!el) return;
      const v = (el.value || '').trim();
      let msg = '';
      if (required && !v) msg = `${label}을(를) 입력해주세요.`;
      else if (minLen && v.length < minLen) msg = `${label}은(는) ${minLen}자 이상이어야 합니다.`;
      else if (ftype === 'email' && v && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v)) msg = '올바른 이메일 형식이 아닙니다.';
      let errEl = document.getElementById(id + '-err');
      if (!errEl) {
        errEl = document.createElement('div');
        errEl.id = id + '-err';
        errEl.style.cssText = 'font-size:11px;color:#dc3545;margin-top:3px;';
        if (el.parentNode) el.parentNode.appendChild(errEl);
      }
      if (msg) { ok = false; errEl.textContent = msg; el.style.setProperty('border-color', '#dc3545', 'important'); }
      else { errEl.textContent = ''; el.style.removeProperty('border-color'); }
    });
    return ok;
  };

  /* ── 폼 자동 임시저장 ── */
  const autoSave = (formId, storageKey) => {
    const form = document.getElementById(formId);
    if (!form) return;
    const save = () => {
      const data = {};
      form.querySelectorAll('input, select, textarea').forEach(el => { if (el.id) data[el.id] = el.value; });
      set(storageKey, data);
    };
    form.addEventListener('input', save);
    form.addEventListener('change', save);
    // 새로고침 경고
    window.addEventListener('beforeunload', e => {
      const saved = get(storageKey, {});
      if (Object.values(saved).some(v => v)) {
        e.preventDefault();
        e.returnValue = '작성 중인 내용이 있습니다. 페이지를 떠나시겠습니까?';
      }
    });
    // 기존 임시저장 복원
    const saved = get(storageKey, {});
    if (saved) {
      Object.entries(saved).forEach(([k, v]) => {
        const el = document.getElementById(k);
        if (el && !el.value) el.value = v;
      });
    }
  };

  /* ── 로그아웃 (세션 완전 정리) ── */
  const logout = () => {
    // PCM 키 전부 삭제
    const keys = Object.keys(sessionStorage).filter(k => k.startsWith('pcm_'));
    keys.forEach(k => sessionStorage.removeItem(k));
    // 기타 앱 키
    ['userType', 'userEmail', 'onboarded', 'onboarding_from'].forEach(k => sessionStorage.removeItem(k));
    window.location.href = '로그인.html';
  };

  /* ── 알림 렌더 헬퍼 (마이페이지 등에서 사용) ── */
  const renderNotifList = (containerId) => {
    const el = document.getElementById(containerId);
    if (!el) return;
    const notifs = getNotifs();
    markRead();
    if (!notifs.length) {
      el.innerHTML = '<div style="text-align:center;padding:32px;color:#8492a6;font-size:13px;">알림이 없습니다</div>';
      return;
    }
    el.innerHTML = notifs.slice(0, 20).map(n => `
      <div style="display:flex;gap:12px;padding:14px 0;border-bottom:1px solid rgba(0,0,0,0.08);cursor:pointer;">
        <div style="font-size:20px;flex-shrink:0;">${n.icon || '🔔'}</div>
        <div style="flex:1;">
          <div style="font-size:13px;font-weight:500;margin-bottom:2px;">${n.title || ''}</div>
          <div style="font-size:12px;color:#8492a6;">${n.sub || ''}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
          <div style="font-size:11px;color:#8492a6;white-space:nowrap;">${n.time || ''}</div>
          ${n.unread ? '<div style="width:8px;height:8px;border-radius:50%;background:#1a6b4a;flex-shrink:0;"></div>' : ''}
        </div>
      </div>`).join('');
  };

  /* ── 공개 API ── */
  return {
    set, get, del,
    breakdown, fw, fmw,
    saveTask, getTask, saveQuote, getQuote, getConfirmedAmount,
    saveProject, getProjects,
    pushNotif, getNotifs, markRead, unreadCount, renderNotifList,
    showLoading, hideLoading,
    toast, validate, autoSave, logout,
    _updateBadge,
  };
})();

/* 페이지 로드 시 뱃지 갱신 */
document.addEventListener('DOMContentLoaded', () => PCM._updateBadge());

</script>
<script src="api.js"></script>
</head>
<body>
<div class="header">
  <div class="logo" onclick="nav('계약서.html')">
    <div class="logo-mark">공</div>
    <div class="logo-name">공공콘텐츠마켓</div>
  </div>
  <button class="btn btn-ghost btn-sm" onclick="nav('계약서.html')">← 계약서로</button>
</div>

<div class="main">
  <div class="wrap" id="main-wrap"></div>
</div>
<div class="toast" id="toast"></div>

<script>
function nav(p){window.location.href=p;}

// 무통장 입금 안내 API 연동
async function submitEscrow() {
  const projectId     = PCM.get('currentTask')?.projectId || null;
  const depositorName = document.getElementById('depositor-name')?.value
                     || sessionStorage.getItem('userName') || '입금자';

  if (API.isLoggedIn() && projectId) {
    const res = await API.payments.initiate(projectId, depositorName);
    if (res?.success) {
      const info = res.data;
      // 입금 안내 UI 업데이트
      const bankEl    = document.getElementById('bank-name');
      const accountEl = document.getElementById('account-number');
      const amountEl  = document.getElementById('deposit-amount');
      const codeEl    = document.getElementById('deposit-code');
      if (bankEl)    bankEl.textContent    = info.guide.bankName;
      if (accountEl) accountEl.textContent = info.guide.accountNumber;
      if (amountEl)  amountEl.textContent  = info.guide.amount.toLocaleString() + '원';
      if (codeEl)    codeEl.textContent    = info.guide.depositCode;

      PCM.pushNotif({icon:'💳',title:'입금 안내',sub:'입금 코드: '+info.guide.depositCode,time:'방금'});
      showStep(3); // 입금 안내 단계로 이동
    }
  } else {
    // 더미 모드 — 기존 UI 그대로
    PCM.toast('무통장 입금 안내가 생성되었습니다.', 'success');
    PCM.pushNotif({icon:'💳',title:'무통장 입금 안내',sub:'계좌로 입금해주세요.',time:'방금'});
    if (typeof showStep === 'function') showStep(3);
  }
}


// 견적서_수락에서 확정 금액 읽기
(function(){
  try {
    var confirmed = sessionStorage.getItem('pcm_confirmedAmount');
    if(confirmed) {
      var amt = JSON.parse(confirmed);
      var amtEl = document.getElementById('escrow-amount');
      var amtEl2 = document.getElementById('total-amount');
      if(amtEl && amt) amtEl.textContent = parseInt(amt).toLocaleString() + '원';
      if(amtEl2 && amt) amtEl2.textContent = parseInt(amt).toLocaleString() + '원';
    }
  } catch(e){}
  // pcm_confirmedAmount 저장 확인용
  sessionStorage.setItem('pcm_confirmedAmount_checked', '1');
})();


/* ── 다크모드 토글 ── */
(function(){
  var saved = localStorage.getItem('pcm_theme') || 'light';
  document.documentElement.setAttribute('data-theme', saved);
})();
function toggleDarkMode(){
  var cur = document.documentElement.getAttribute('data-theme')||'light';
  var next = cur==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('pcm_theme', next);
  var btn = document.getElementById('dark-toggle');
  if(btn) btn.textContent = next==='dark'?'☀️':'🌙';
}
/* ── END 다크모드 ── */

let selectedMethod='transfer';
let allChecked=false;

function selectMethod(m){
  selectedMethod=m;
  render();
  checkAll();
}

function checkAll(){
  const c1=document.getElementById('chk1')?.checked;
  const c2=document.getElementById('chk2')?.checked;
  const c3=document.getElementById('chk3')?.checked;
  allChecked=c1&&c2&&c3;
  const btn=document.getElementById('submit-btn');
  if(btn) btn.disabled=!allChecked;
}

function copyAccount(){
  navigator.clipboard.writeText('301123456789 NH농협은행').catch(()=>{});
  showToast('계좌번호가 복사되었습니다 ✓');
}

function submitEscrow(){
  const btn=document.getElementById('submit-btn');
  if(typeof PCM!=='undefined') PCM.showLoading(btn,'예치 처리 중...');
  if(!allChecked){showToast('모든 확인 사항에 동의해주세요');return;}
  // 실제 서비스: 결제 PG 또는 계좌이체 확인 API 호출
  PCM.pushNotif({icon:'🔒',title:'에스크로 예치 완료',sub:'계약 대금이 안전하게 보관되었습니다. 제작이 시작됩니다.',time:'방금'});
  step='success'; render();
  window.scrollTo(0,0);
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}


// 세션에서 확정금액 읽기
(function(){
  try {
    const amt = PCM.getConfirmedAmount() || PCM.get('confirmedAmount') ||
                (PCM.getQuote() && PCM.getQuote().amount);
    if(amt) {
      const el = document.querySelector('.ah-amount');
      if(el) el.textContent = Math.round(amt).toLocaleString() + '원';
      const bd = PCM.breakdown(amt);
      ['bd-supply','bd-vat-amt','bd-comm','bd-biz'].forEach(function(id,i){
        const e2=document.getElementById(id);
        if(!e2) return;
        const vals=[bd.supply,bd.vat,-bd.comm,bd.biz];
        e2.textContent=(vals[i]<0?'-':'')+Math.abs(vals[i]).toLocaleString()+'원';
      });
    }
  } catch(e){}
})();

render();
</script>
